<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>gitmark</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
  <style>
    /* ── 라이트 (기본) ──────────────────────────────────────────── */
    :root {
      --bg:         #fafaf9;
      --bg-surface: #f5f5f4;
      --bg-elevated:#ececea;
      --border:     #e5e5e4;
      --border-sub: #ededeb;
      --text:       #1c1917;
      --text-muted: #78716c;
      --text-dim:   #a8a29e;
      --text-body:  #44403c;
      --text-faint: #78716c;
    }
    /* ── 다크 ───────────────────────────────────────────────────── */
    body.dark {
      --bg:         #0d0d0d;
      --bg-surface: #1a1a1a;
      --bg-elevated:#111111;
      --border:     #2a2a2a;
      --border-sub: #1e1e1e;
      --text:       #e8e8e8;
      --text-muted: #555555;
      --text-dim:   #333333;
      --text-body:  #cccccc;
      --text-faint: #aaaaaa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 13px;
      min-height: 100vh;
      transition: background .2s, color .2s;
    }
    /* 본문 전용 폰트: 한글 Noto Sans KR, 영문 Inter */
    .body-font {
      font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
      font-weight: 400;
    }
    /* 도트 배경 패턴 */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: .45;
    }
    /* 좌/우 워터마크 */
    body::after {
      content: 'gitmark · 흔적 · gitmark · 흔적 · gitmark · 흔적';
      position: fixed; left: 14px; top: 50%; z-index: 0; pointer-events: none;
      writing-mode: vertical-rl; letter-spacing: .3em;
      font-size: 10px; color: var(--border); transform: translateY(-50%);
      white-space: nowrap; user-select: none;
    }
    #app {
      max-width: 680px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative; z-index: 1;
    }
    input, textarea, button {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }
    ::-webkit-scrollbar { width: 0; }
    .screen { animation: fi .12s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
    .btn-ghost {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 11px; padding: 0;
      transition: color .15s;
    }
    .btn-ghost:hover { color: var(--text); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }
    .input-field {
      width: 100%; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 9px 12px; font-size: 13px;
      color: var(--text); outline: none;
      transition: border-color .15s;
    }
    .input-field:focus { border-color: var(--text-muted); }
    .input-field::placeholder { color: var(--text-dim); }
    .tab-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 680px;
      background: var(--bg); border-top: 0.5px solid var(--border);
      display: flex; z-index: 20;
    }
    .tab-bar button {
      flex: 1; padding: 10px 0 13px;
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: color .15s;
    }
    .tab-bar button i { font-size: 20px; }
    .tab-bar button span { font-size: 10px; }
    .sticky-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg); border-bottom: 0.5px solid var(--border);
      padding: 10px 20px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .write-pill {
      font-size: 11px; color: var(--text-muted);
      background: none; border: 0.5px solid var(--border);
      border-radius: 20px; padding: 5px 12px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: border-color .15s, color .15s;
    }
    .write-pill:hover { border-color: var(--text-muted); color: var(--text); }
    .avatar {
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 500; flex-shrink: 0;
    }
    .like-btn {
      cursor: pointer; display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      padding: 3px 10px; border-radius: 20px;
      border: 0.5px solid var(--border);
      background: var(--bg-elevated);
      transition: color .15s, border-color .15s, background .15s;
    }
    .like-btn.liked { color: #f472b6; border-color: #f472b6; background: rgba(244,114,182,.08); }
    .del-btn { background: none; border: none; cursor: pointer; padding: 0; font-size: 11px; color: var(--text-dim); transition: color .15s; }
    .del-btn:hover { color: #f87171; }
    textarea { resize: none; background: transparent; border: none; outline: none; color: var(--text); width: 100%; line-height: 1.7; }

    /* ── 3D 스파인 ─────────────────────────────────────────────── */
    .feed-spine-wrap {
      position: relative; padding-left: 64px; padding-right: 20px;
    }
    .spine {
      position: absolute; left: 22px; top: 0; bottom: 0; width: 14px;
    }
    .spine-s { position: absolute; left: 0;   top:0; bottom:0; width: 2px;   background: var(--text-dim);    border-radius: 2px; opacity: .4; }
    .spine-m { position: absolute; left: 3px; top:0; bottom:0; width: 2.5px; background: var(--text-muted);  border-radius: 2px; }
    .spine-h { position: absolute; left: 7px; top:0; bottom:0; width: 1.5px; background: var(--bg);          border-radius: 2px; opacity: .6; }
    .spine-e { position: absolute; left: 10px;top:0; bottom:0; width: 1.5px; background: var(--text-dim);    border-radius: 2px; opacity: .3; }

    /* ── 타일 카드 ─────────────────────────────────────────────── */
    .card-row { position: relative; margin-bottom: 10px; }

    .tile-node {
      position: absolute; left: -42px; top: 18px;
      width: 18px; height: 18px; pointer-events: none;
    }
    .tile-node-s { position:absolute; inset:2px; border-radius:50%; background:var(--text-dim); opacity:.35; }
    .tile-node-b { position:absolute; inset:1px; border-radius:50%; background:var(--bg-surface); border:1.5px solid var(--border); }
    .tile-node-h { position:absolute; top:3px; left:4px; width:5px; height:3px; border-radius:50%; background:var(--bg); opacity:.75; }

    .tile-conn {
      position: absolute; left: -24px; top: 27px;
      width: 24px; height: 1.5px; background: var(--border); opacity: .7;
      pointer-events: none;
    }

    .tile {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .12s;
      border-left-width: 3px;
    }
    .tile:hover { transform: translateX(3px); }

    /* 상단 헤더: 내용 + 시간 */
    .tile-head {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      padding: 12px 14px 10px;
    }
    .tile-txt {
      font-size: 13px; font-weight: 500;
      color: var(--text-body); line-height: 1.65;
      word-break: break-word; flex: 1;
    }
    .tile-since {
      font-size: 10px; color: var(--text-dim);
      white-space: nowrap; flex-shrink: 0;
      margin-top: 3px;
    }

    /* 하단 메타 영역: 흰 배경 */
    .tile-rows {
      background: var(--bg-surface);
      border-top: 0.5px solid var(--border);
    }
    .tile-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 14px;
      font-size: 12px; color: var(--text-muted);
    }
    .tile-row + .tile-row { border-top: 0.5px solid var(--border); }
    .tile-row-icon {
      width: 16px; flex-shrink: 0; font-size: 12px;
      color: var(--text-dim); text-align: center;
    }
    .tile-row-val {
      display: flex; align-items: center; gap: 6px; flex: 1;
      color: var(--text);
    }

    /* 삭제된 카드 */
    .tile-del-head {
      padding: 11px 14px 9px;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-dim);
    }
    .tile-del-sub { font-size: 10px; font-style: italic; }
    .tile-del-rows {
      background: var(--bg-surface);
      border-top: 0.5px solid var(--border);
      padding: 7px 14px;
      font-size: 10px; color: var(--text-dim); font-style: italic;
    }

    /* ── 테마 토글 버튼 ─────────────────────────────────────────── */
    #theme-toggle {
      position: fixed; top: 10px; right: 12px; z-index: 100;
      background: none; border: none; cursor: pointer;
      font-size: 16px; padding: 4px 6px;
      border-radius: 6px;
      transition: background .15s;
      line-height: 1;
    }
    #theme-toggle:hover { background: var(--bg-elevated); }
  </style>
</head>
<body>
<button id="theme-toggle" title="테마 전환">☀️</button>
<div id="app"><div style="text-align:center;padding:60px;color:var(--text-dim);font-size:11px;">로딩 중...</div></div>
<script>
'use strict';

// ── 상수 ────────────────────────────────────────────────────────────
var MAX = 280;
var SURNAMES = ['김','이','박','최','정','강','조','윤','장','임','한','오','서','신','권','황','안','송','류','전','홍','고','문','양','손','배','백','허','유','남'];
var EN_NAMES = ['james','john','robert','michael','william','david','mary','patricia','jennifer','minho','junho','jinho','soyeon','minji','hyunji'];
// ── 유틸 ────────────────────────────────────────────────────────────
function mkId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function isPseudo(nick) {
  var t = nick.trim();
  if (/^[가-힣]{2,4}$/.test(t) && SURNAMES.indexOf(t[0]) >= 0) return true;
  if (EN_NAMES.indexOf(t.toLowerCase()) >= 0) return true;
  return false;
}

function nick2color(nick) {
  var h = 0;
  for (var i = 0; i < nick.length; i++) h = nick.charCodeAt(i) + ((h << 5) - h);
  var hue = Math.abs(h) % 360;
  return {
    hue: hue,
    border:  'hsl('+hue+',60%,60%)',
    tint:    'hsla('+hue+',70%,52%,0.09)',
    avBg:    'hsl('+hue+',40%,22%)',
    avText:  'hsl('+hue+',70%,82%)'
  };
}

function getInitial(nick) { return (nick || '?')[0].toUpperCase(); }

function relTime(ts) {
  var d = Date.now() - ts, s = Math.floor(d/1000), m = Math.floor(s/60), h = Math.floor(m/60), day = Math.floor(h/24);
  if (s < 60) return '방금 전';
  if (m < 60) return m + '분 전';
  if (h < 24) return h + '시간 전';
  if (day < 7) return day + '일 전';
  return new Date(ts).toLocaleDateString('ko-KR');
}

function absTime(ts) {
  return new Date(ts).toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function avatar(nick, size) {
  size = size || 36;
  var c = nick2color(nick), fs = size < 30 ? 11 : size < 50 ? 14 : 20;
  return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;background:'+c.avBg+';color:'+c.avText+';font-size:'+fs+'px;">'+getInitial(nick)+'</div>';
}

function nickHtml(nick, pseudo) {
  return esc(nick) + (pseudo ? ' <span style="color:#ca8a04;font-size:10px;">(가명)</span>' : '');
}

// ── 스토어 ──────────────────────────────────────────────────────────
var S = {
  get: function(k) { try { return JSON.parse(localStorage.getItem('gm2_'+k)||'null'); } catch(e){ return null; } },
  set: function(k,v) { try { localStorage.setItem('gm2_'+k, JSON.stringify(v)); } catch(e){} },
  me: function() { return S.get('me'); },
  setMe: function(u) { S.set('me', u); },
  users: function() { return S.get('users') || {}; },
  saveUser: function(u) { var m = S.users(); m[u.uid] = u; S.set('users', m); },
  posts: function() { return S.get('posts') || []; },
  setPosts: function(ps) { S.set('posts', ps); },
  addPost: function(p) { var ps = S.posts(); ps.unshift(p); S.set('posts', ps); },
  getPost: function(id) { return S.posts().find(function(p){ return p.id === id; }); },
  deletePost: function(id) { var ps = S.posts(); var i = ps.findIndex(function(p){return p.id===id;}); if(i>=0){ps[i].del=Date.now(); S.set('posts',ps);} },
  comments: function(pid) { return (S.get('comments')||{})[pid]||[]; },
  addComment: function(pid, c) { var all = S.get('comments')||{}; all[pid]=all[pid]||[]; all[pid].push(c); S.set('comments',all); },
  delComment: function(pid, cid) { var all = S.get('comments')||{}; var cs=all[pid]||[]; var i=cs.findIndex(function(c){return c.id===cid;}); if(i>=0){cs[i].del=Date.now(); S.set('comments',all);} },
  likes: function() { return S.get('likes')||{}; },
  isLiked: function(pid,uid) { return !!(S.likes()[pid+'_'+uid]); },
  toggleLike: function(pid,uid) {
    var key=pid+'_'+uid, likes=S.likes(), ps=S.posts(), i=ps.findIndex(function(p){return p.id===pid;});
    if(likes[key]){ delete likes[key]; if(i>=0)ps[i].likes=Math.max(0,(ps[i].likes||0)-1); }
    else { likes[key]=true; if(i>=0)ps[i].likes=(ps[i].likes||0)+1; }
    S.set('likes',likes); S.set('posts',ps);
    return !!likes[key];
  },
  incComments: function(pid, n) {
    var ps=S.posts(), i=ps.findIndex(function(p){return p.id===pid;});
    if(i>=0){ps[i].comments=Math.max(0,(ps[i].comments||0)+n); S.set('posts',ps);}
  },
  theme: function() { return S.get('theme') || 'light'; },
  setTheme: function(t) { S.set('theme', t); },
  nextNick: function() {
    var n = (S.get('nickCounter') || 0) + 1;
    S.set('nickCounter', n);
    return '객' + n;
  },
  updateNick: function(nick) {
    var me = S.me(); if (!me) return;
    var pseudo = isPseudo(nick);
    var updated = Object.assign({}, me, { nick: nick, pseudo: pseudo });
    S.setMe(updated);
    S.saveUser(updated);
  }
};

// ── 테마 ────────────────────────────────────────────────────────────
function applyTheme(t) {
  var btn = document.getElementById('theme-toggle');
  if (t === 'dark') {
    document.body.classList.add('dark');
    if (btn) btn.textContent = '🌙';
  } else {
    document.body.classList.remove('dark');
    if (btn) btn.textContent = '☀️';
  }
}

document.getElementById('theme-toggle').onclick = function() {
  var next = S.theme() === 'dark' ? 'light' : 'dark';
  S.setTheme(next);
  applyTheme(next);
};

// ── 라우터 (해시 기반) ───────────────────────────────────────────────
var R = {
  path: function() { return location.hash.replace(/^#/,'') || '/'; },
  go: function(p) { location.hash = p; },
  render: function() {
    var p = R.path(), me = S.me();
    var app = document.getElementById('app');
    if (!app) return;
    if (!me && p !== '/auth') { R.go('/auth'); return; }
    if (me && p === '/auth') { R.go('/'); return; }
    app.innerHTML = '';
    if (p === '/auth') app.appendChild(authPage());
    else if (p === '/write') app.appendChild(writePage());
    else if (p.indexOf('/post/') === 0) app.appendChild(detailPage(p.slice(6)));
    else if (p === '/my') app.appendChild(myPage());
    else app.appendChild(feedPage());
  }
};
window.addEventListener('hashchange', function() { R.render(); });

// ── DEV: 로그인 스킵 ──────────────────────────────────────────────────
var DEV_SKIP_AUTH = true;
if (DEV_SKIP_AUTH && !S.me()) {
  var devNick = S.nextNick();
  S.setMe({ uid: 'dev_001', nick: devNick, pseudo: false });
}

// ── 공통: 탭바 ──────────────────────────────────────────────────────
function tabBar(active) {
  var tabs = [
    {icon:'ti-home',     label:'피드',  path:'/'},
    {icon:'ti-pencil',   label:'쓰기',  path:'/write'},
    {icon:'ti-user',     label:'내 글', path:'/my'}
  ];
  var nav = document.createElement('nav');
  nav.className = 'tab-bar';
  tabs.forEach(function(t) {
    var btn = document.createElement('button');
    btn.innerHTML = '<i class="ti '+t.icon+'" aria-hidden="true"></i><span>'+t.label+'</span>';
    btn.style.color = active === t.path ? 'var(--text)' : 'var(--text-muted)';
    btn.onclick = function() { R.go(t.path); };
    nav.appendChild(btn);
  });
  return nav;
}

// ── 인증 페이지 ──────────────────────────────────────────────────────
function authPage() {
  var mode = 'login';
  var wrap = document.createElement('div');
  wrap.className = 'screen';

  function render() {
    wrap.innerHTML = [
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">',
      '<div style="width:100%;max-width:340px;">',

      '<div style="text-align:center;margin-bottom:28px;">',
      '<div style="font-size:20px;letter-spacing:.35em;color:var(--text);margin-bottom:6px;">g i t m a r k</div>',
      '<div style="font-size:11px;color:var(--text-muted);">왔다 갔다는 흔적을 남기는 곳</div>',
      '</div>',

      mode==='signup' ? [
        '<div id="av-wrap" style="display:flex;flex-direction:column;align-items:center;margin-bottom:20px;">',
        '<div id="av-circle" style="width:52px;height:52px;background:#2d1b69;color:#c4b5fd;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;">?</div>',
        '<div id="av-label" style="font-size:11px;color:var(--text-muted);margin-top:6px;min-height:16px;"></div>',
        '</div>'
      ].join('') : '',

      '<div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;">',
      '<button onclick="__setMode(\'login\')" style="flex:1;padding:8px;font-size:12px;background:none;border:none;border-bottom:'+(mode==='login'?'1px solid var(--text)':'none')+';color:'+(mode==='login'?'var(--text)':'var(--text-muted)')+';cursor:pointer;">로그인</button>',
      '<button onclick="__setMode(\'signup\')" style="flex:1;padding:8px;font-size:12px;background:none;border:none;border-bottom:'+(mode==='signup'?'1px solid var(--text)':'none')+';color:'+(mode==='signup'?'var(--text)':'var(--text-muted)')+';cursor:pointer;">가입하기</button>',
      '</div>',

      mode==='signup' ? '<div style="margin-bottom:12px;"><div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;">닉네임 <span style="color:var(--text-dim);">(미입력 시 자동 배정)</span></div><input id="f-nick" class="input-field" type="text" placeholder="객N 자동 배정" maxlength="20" oninput="__updateAv()"></div>' : '',
      '<div style="margin-bottom:12px;"><div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;">이메일</div><input id="f-email" class="input-field" type="email" placeholder="you@email.com"></div>',
      '<div style="margin-bottom:18px;"><div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;">비밀번호</div>',
      '<div style="position:relative;">',
      '<input id="f-pw" class="input-field" type="password" placeholder="6자 이상" style="padding-right:44px;">',
      '<button onclick="__togglePw()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);font-size:10px;cursor:pointer;">표시</button>',
      '</div></div>',
      '<div id="f-err" style="color:#f87171;font-size:11px;margin-bottom:10px;display:none;"></div>',
      '<button onclick="__doAuth()" style="width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:4px;padding:11px;font-size:13px;color:var(--text);cursor:pointer;transition:border-color .15s;" onmouseover="this.style.borderColor=\'var(--text-muted)\'" onmouseout="this.style.borderColor=\'var(--border)\'">',
      mode==='login' ? '로그인' : '▶ 흔적 남기기 시작',
      '</button>',
      '</div></div>'
    ].join('');
  }

  window.__setMode = function(m) { mode = m; render(); };
  window.__togglePw = function() { var el = document.getElementById('f-pw'); if(el) el.type = el.type==='password'?'text':'password'; };
  window.__updateAv = function() {
    var nick = (document.getElementById('f-nick')||{value:''}).value.trim();
    var circle = document.getElementById('av-circle'), label = document.getElementById('av-label');
    if (!circle) return;
    if (nick) {
      var c = nick2color(nick);
      circle.style.background = c.avBg; circle.style.color = c.avText;
      circle.textContent = getInitial(nick);
      if (label) label.innerHTML = esc(nick) + (isPseudo(nick) ? ' <span style="color:#ca8a04">(가명)</span>' : '');
    } else {
      circle.style.background = '#2d1b69'; circle.style.color = '#c4b5fd';
      circle.textContent = '?';
      if (label) label.innerHTML = '';
    }
  };
  window.__doAuth = function() {
    var email = (document.getElementById('f-email')||{}).value.trim();
    var pw = (document.getElementById('f-pw')||{}).value;
    var nick = (document.getElementById('f-nick')||{}).value.trim();
    var err = document.getElementById('f-err');
    function showErr(msg) { if(err){ err.textContent=msg; err.style.display='block'; } }

    if (!email || !pw) { showErr('이메일과 비밀번호를 입력해주세요.'); return; }
    if (pw.length < 6) { showErr('비밀번호는 6자 이상이어야 합니다.'); return; }

    var users = S.users();
    if (mode === 'signup') {
      var dup = Object.values(users).find(function(u){ return u.email===email; });
      if (dup) { showErr('이미 사용 중인 이메일입니다.'); return; }
      var finalNick = nick || S.nextNick();
      var user = { uid: mkId(), email: email, pw: pw, nick: finalNick, pseudo: isPseudo(finalNick), at: Date.now() };
      S.saveUser(user); S.setMe(user); R.go('/');
    } else {
      var found = Object.values(users).find(function(u){ return u.email===email && u.pw===pw; });
      if (!found) { showErr('이메일 또는 비밀번호가 올바르지 않습니다.'); return; }
      S.setMe(found); R.go('/');
    }
  };

  render();
  return wrap;
}

function postOpacity(post) {
  if (post.del) return 0.45;
  var h = (Date.now() - (post.upd || post.at)) / 3600000;
  if (h < 1) return 1;
  if (h < 6) return 0.88;
  if (h < 24) return 0.72;
  if (h < 72) return 0.58;
  return 0.46;
}

function makeCard(post, me) {
  var row = document.createElement('div');
  row.className = 'card-row';

  // 노드 (구체)
  row.innerHTML = '<div class="tile-node"><div class="tile-node-s"></div><div class="tile-node-b"></div><div class="tile-node-h"></div></div><div class="tile-conn"></div>';

  var c = nick2color(post.nick);
  var op = postOpacity(post);
  var tile = document.createElement('div');
  tile.className = 'tile';
  tile.style.cssText = 'border-left-color:'+c.border+';opacity:'+op+';';

  if (post.del) {
    tile.innerHTML = [
      '<div class="tile-del-head"><span>╳</span><span class="tile-del-sub">삭제됨 · '+absTime(post.del)+'</span></div>',
      '<div class="tile-del-rows">이 흔적은 지워졌습니다</div>'
    ].join('');
    row.appendChild(tile);
    var remain = 60000 - (Date.now() - post.del);
    if (remain > 0) setTimeout(function(){ if(row.parentNode) row.parentNode.removeChild(row); }, remain);
    return row;
  }

  var liked = S.isLiked(post.id, me.uid);
  tile.innerHTML = [
    /* 상단 헤더: 내용(3줄 클램프) + 시간 */
    '<div class="tile-head">',
    '<div class="tile-txt body-font" id="txt-'+post.id+'" style="-webkit-line-clamp:3;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;">'+esc(post.txt)+'</div>',
    '<div class="tile-since">'+relTime(post.upd||post.at)+'</div>',
    '</div>',
    post.txt.length > 80 ? '<button id="more-'+post.id+'" style="display:block;width:100%;text-align:left;padding:2px 14px 8px;font-size:10px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:\'JetBrains Mono\',monospace;">더 보기 →</button>' : '',

    /* 하단 메타 행 */
    '<div class="tile-rows">',

    /* 행 1 — 작성자 (내 글이면 편집 아이콘) */
    '<div class="tile-row">',
    '<span class="tile-row-icon">'+avatar(post.nick, 16)+'</span>',
    '<span class="tile-row-val">'+nickHtml(post.nick, post.pseudo)+
      (me.uid===post.uid ? ' <button id="nick-edit-'+post.id+'" style="background:none;border:none;cursor:pointer;font-size:10px;color:var(--text-dim);padding:0 0 0 4px;">✏</button>' : '')+
    '</span>',
    '</div>',

    /* 행 2 — 좋아요 · 댓글 · 삭제 */
    '<div class="tile-row">',
    '<span class="tile-row-val" style="gap:8px;">',
    '<button class="like-btn'+(liked?' liked':'')+'" id="lbtn-'+post.id+'">',
    '<span id="lico-'+post.id+'">'+(liked?'♥':'♡')+'</span>',
    '<span id="lcnt-'+post.id+'">'+(post.likes||0)+'</span>',
    '</button>',
    '<span style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px;"><i class="ti ti-message" aria-hidden="true" style="font-size:13px;"></i>'+(post.comments||0)+'</span>',
    me.uid===post.uid ? '<button class="del-btn" style="margin-left:auto;" id="delbtn-'+post.id+'">삭제</button>' : '',
    '</span>',
    '</div>',

    '</div>'
  ].join('');

  tile.querySelector('#lbtn-'+post.id).onclick = function(e) {
    e.stopPropagation();
    var now = S.toggleLike(post.id, me.uid);
    this.classList.toggle('liked', now);
    document.getElementById('lico-'+post.id).textContent = now ? '♥' : '♡';
    document.getElementById('lcnt-'+post.id).textContent = (S.getPost(post.id)||{}).likes||0;
  };
  var moreBtn = tile.querySelector('#more-'+post.id);
  if (moreBtn) {
    var expanded = false;
    moreBtn.onclick = function(e) {
      e.stopPropagation();
      expanded = !expanded;
      var txtEl = document.getElementById('txt-'+post.id);
      if (expanded) {
        txtEl.style.webkitLineClamp = 'unset';
        txtEl.style.display = 'block';
        this.textContent = '접기 ↑';
      } else {
        txtEl.style.webkitLineClamp = '3';
        txtEl.style.display = '-webkit-box';
        this.textContent = '더 보기 →';
      }
    };
  }
  if (me.uid===post.uid) {
    tile.querySelector('#nick-edit-'+post.id).onclick = function(e) {
      e.stopPropagation();
      R.go('/my');
    };
    tile.querySelector('#delbtn-'+post.id).onclick = function(e) {
      e.stopPropagation();
      if (!confirm('이 흔적을 지우시겠어요? 60초 후 완전히 사라집니다.')) return;
      S.deletePost(post.id); R.render();
    };
  }
  tile.onclick = function() { R.go('/post/'+post.id); };
  row.appendChild(tile);
  return row;
}

    if (bar) { bar.style.width = pct+'%'; bar.style.background = len>MAX?'#ef4444':pct>90?'#eab308':'var(--text-muted)'; }
    if (cnt) { cnt.textContent = rem; cnt.style.color = len>MAX?'#f87171':rem<20?'#eab308':'var(--text-muted)'; }

  footer.innerHTML = '<div style="display:flex;align-items:center;gap:10px;"><div style="flex:1;height:3px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;"><div id="w-bar" style="height:100%;width:0;background:var(--text-muted);border-radius:2px;transition:width .1s,background .1s;"></div></div><span id="w-cnt" style="font-size:11px;color:var(--text-muted);min-width:28px;text-align:right;">'+MAX+'</span></div>';
  wrap.appendChild(footer);

  setTimeout(function() { var ta=document.getElementById('write-ta'); if(ta) ta.focus(); }, 50);

}

      '<div style="display:flex;align-items:center;gap:14px;">',
      '<button class="like-btn" id="d-lbtn" style="color:'+(liked?'#f472b6':'var(--text-muted)')+'"><span id="d-lico">'+(liked?'♥':'♡')+'</span><span style="font-size:12px;" id="d-lcnt">'+(post.likes||0)+'</span></button>',
      '<span style="font-size:12px;color:var(--text-muted);">💬 <span id="d-cmt-cnt">'+(post.comments||0)+'</span></span>',
      me.uid===post.uid ? '<button class="del-btn" id="d-del">삭제</button>' : '',
      '</div>'
    ].join('');
    postEl.querySelector('#d-lbtn').onclick = function() {

      this.style.color = now?'#f472b6':'var(--text-muted)';
      document.getElementById('d-lico').textContent = now?'♥':'♡';
      document.getElementById('d-lcnt').textContent = (S.getPost(pid)||{}).likes||0;
    };

    var all = S.comments(pid);
    var top = all.filter(function(c){ return !c.parent; });
    cList.innerHTML = '';
    top.forEach(function(c) {
      cList.appendChild(mkComment(c, all.filter(function(r){ return r.parent===c.id; })));
    });
  }

  function mkComment(c, replies) {
    var el = document.createElement('div');
    if (c.del) {
      el.innerHTML = '<div style="padding:10px 16px;border-bottom:1px solid var(--border-sub);color:var(--text-dim);font-size:11px;">● 삭제됨 · '+absTime(c.del)+'</div>';
    } else {
      var isOwner = c.uid === me.uid;
      el.innerHTML = [
        '<div style="padding:10px 16px;border-bottom:1px solid var(--border-sub);">',
        '<div style="display:flex;gap:8px;">',

        '<span style="font-size:10px;color:var(--text-dim);">· '+relTime(c.at)+'</span></div>',
        '<div style="font-size:12px;color:var(--text-body);line-height:1.55;word-break:break-word;">'+esc(c.txt)+'</div>',
        '<div style="display:flex;gap:10px;margin-top:6px;">',
        '<button class="btn-ghost" id="rep-'+c.id+'">답글</button>',
        isOwner ? '<button class="del-btn" style="margin-left:0;" id="dc-'+c.id+'">삭제</button>' : '',
        '</div></div></div></div>'
      ].join('');
      el.querySelector('#rep-'+c.id).onclick = function() { replyTo = c.id; var inp=document.getElementById('d-inp'); if(inp){inp.placeholder='@'+c.nick+'에 답글'; inp.focus();} };
      if (isOwner) {
        el.querySelector('#dc-'+c.id).onclick = function() {
          if (!confirm('댓글을 삭제할까요?')) return;
          S.delComment(pid, c.id); S.incComments(pid,-1); renderComments();
          var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=(S.getPost(pid)||{}).comments||0;
        };
      }
    }
    replies.forEach(function(r) { el.appendChild(mkReply(r)); });
    return el;
  }

  function mkReply(r) {
    var el = document.createElement('div');
    if (r.del) {
      el.innerHTML = '<div style="padding:8px 16px 8px 52px;border-bottom:1px solid var(--border-sub);color:var(--text-dim);font-size:10px;">● 삭제됨 · '+absTime(r.del)+'</div>';
      return el;
    }
    var isOwner = r.uid === me.uid;
    el.innerHTML = [
      '<div style="padding:8px 16px 8px 52px;border-bottom:1px solid var(--border-sub);">',
      '<div style="display:flex;gap:8px;">',
      avatar(r.nick, 24),
      '<div style="flex:1;"><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:3px;">',
      '<span style="font-size:11px;color:var(--text);">'+nickHtml(r.nick,r.pseudo)+'</span>',
      '<span style="font-size:10px;color:var(--text-dim);">· '+relTime(r.at)+'</span></div>',
      '<div style="font-size:11px;color:var(--text-faint);line-height:1.5;word-break:break-word;">'+esc(r.txt)+'</div>',
      isOwner ? '<button class="del-btn" style="margin-left:0;margin-top:4px;" id="dr-'+r.id+'">삭제</button>' : '',
      '</div></div></div>'
    ].join('');
    if (isOwner) {
      el.querySelector('#dr-'+r.id).onclick = function() {
        if (!confirm('댓글을 삭제할까요?')) return;
        S.delComment(pid, r.id); S.incComments(pid,-1); renderComments();
        var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=(S.getPost(pid)||{}).comments||0;
      };
    }
    return el;
  }

  var cInput = document.createElement('div');
  cInput.style.cssText = 'position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:680px;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;z-index:10;';
  var inp = document.createElement('input');
  inp.id = 'd-inp';
  inp.type = 'text';
  inp.className = 'input-field';
  inp.placeholder = '흔적을 남기세요';
  inp.style.cssText = 'width:calc(100% - 36px);padding-right:8px;';
  var sendBtn = document.createElement('button');
  sendBtn.textContent = '↑';
  sendBtn.style.cssText = 'background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);padding:0 0 0 8px;vertical-align:middle;transition:color .15s;';
  sendBtn.onmouseover = function(){this.style.color='var(--text)';};
  sendBtn.onmouseout = function(){this.style.color='var(--text-muted)';};

  var _submitting = false;
  function submit() {
    if (_submitting) return;
    var txt = inp.value.trim();
    if (!txt) return;
    _submitting = true;
    inp.value = ''; inp.placeholder = '흔적을 남기세요'; replyTo = null;
    S.addComment(pid, { id:mkId(), pid:pid, parent:replyTo, uid:me.uid, nick:me.nick, pseudo:me.pseudo, txt:txt, at:Date.now(), del:null });
    S.incComments(pid, 1);
    renderComments();
    var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=(S.getPost(pid)||{}).comments||0;
    setTimeout(function(){ _submitting = false; }, 300);
  }
  inp.onkeydown = function(e){ if(e.key==='Enter'){ e.preventDefault(); submit(); } };
  sendBtn.onclick = function(e){ e.preventDefault(); submit(); };
  cInput.appendChild(inp);
  cInput.appendChild(sendBtn);
  wrap.appendChild(cInput);

  renderComments();
  return wrap;
}

  wrap.appendChild(hdr);

  var prof = document.createElement('div');
  prof.style.cssText = 'display:flex;flex-direction:column;align-items:center;padding:24px 16px;border-bottom:1px solid var(--border);gap:10px;';

  function renderProf(editing) {
    me = S.me();
    if (editing) {
      prof.innerHTML = [
        '<div id="prof-av-wrap">'+avatar(me.nick, 52)+'</div>',
        '<div style="width:100%;max-width:240px;">',
        '<input id="prof-nick-inp" class="input-field" type="text" value="'+esc(me.nick)+'" maxlength="20" placeholder="닉네임 입력" style="text-align:center;margin-bottom:8px;">',
        '<div id="prof-nick-preview" style="text-align:center;font-size:11px;color:var(--text-muted);min-height:16px;margin-bottom:10px;">'+nickHtml(me.nick, me.pseudo)+'</div>',
        '<div style="display:flex;gap:8px;">',
        '<button id="prof-save" style="flex:1;background:var(--bg-surface);border:1px solid var(--border);border-radius:4px;padding:7px;font-size:12px;color:var(--text);cursor:pointer;">저장</button>',
        '<button id="prof-cancel" class="btn-ghost" style="flex:1;padding:7px;border:1px solid var(--border);border-radius:4px;">취소</button>',
        '</div></div>'
      ].join('');

      var inp = prof.querySelector('#prof-nick-inp');
      var preview = prof.querySelector('#prof-nick-preview');
      var avWrap = prof.querySelector('#prof-av-wrap');
      inp.focus(); inp.select();
      inp.oninput = function() {
        var v = this.value.trim() || me.nick;
        var c = nick2color(v);
        avWrap.innerHTML = '<div class="avatar" style="width:52px;height:52px;background:'+c.avBg+';color:'+c.avText+';font-size:20px;">'+getInitial(v)+'</div>';
        preview.innerHTML = nickHtml(v, isPseudo(v));
      };
      prof.querySelector('#prof-save').onclick = function() {
        var newNick = inp.value.trim();
        if (!newNick) { inp.focus(); return; }
        S.updateNick(newNick);
        me = S.me();
        renderProf(false);
      };
      prof.querySelector('#prof-cancel').onclick = function() { renderProf(false); };
    } else {
      var postCount = S.posts().filter(function(p){ return p.uid===me.uid && !p.del; }).length;
      prof.innerHTML = [
        avatar(me.nick, 52),
        '<div style="text-align:center;">',
        '<div style="display:flex;align-items:center;gap:6px;justify-content:center;">',
        '<span style="font-size:13px;color:var(--text);">'+nickHtml(me.nick, me.pseudo)+'</span>',
        '<button id="prof-edit-btn" style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-dim);padding:0 2px;" title="닉네임 수정">✏</button>',
        '</div>',
        '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;">내가 남긴 흔적 '+postCount+'개</div>',
        '</div>'
      ].join('');
      prof.querySelector('#prof-edit-btn').onclick = function() { renderProf(true); };
    }
  }

  renderProf(false);
  wrap.appendChild(prof);

  var tabLabel = document.createElement('div');
  tabLabel.style.cssText = 'padding:10px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text-muted);';
  tabLabel.textContent = '내 글 ('+posts.length+')';
  wrap.appendChild(tabLabel);

  if (posts.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:40px;color:var(--text-dim);font-size:11px;';
    empty.textContent = '아직 남긴 흔적이 없어요.';
    wrap.appendChild(empty);
  } else {
    var spineWrap = document.createElement('div');
    spineWrap.className = 'feed-spine-wrap';
    spineWrap.style.cssText = 'padding-top:16px;';
    var spine = document.createElement('div');
    spine.className = 'spine';
    spine.innerHTML = '<div class="spine-s"></div><div class="spine-m"></div><div class="spine-h"></div><div class="spine-e"></div>';
    spineWrap.appendChild(spine);
    var now60m = Date.now();
    posts.filter(function(p){ return !(p.del && now60m - p.del >= 60000); })
         .forEach(function(p) { spineWrap.appendChild(makeCard(p, me)); });
    wrap.appendChild(spineWrap);
  }

  wrap.appendChild(tabBar('/my'));
  return wrap;
}

// ── 시작 ────────────────────────────────────────────────────────────
applyTheme(S.theme());
R.render();
</script>
</body>
</html>

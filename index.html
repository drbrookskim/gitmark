<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>gitmark</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── 라이트 (기본) ──────────────────────────────────────────── */
    :root {
      --bg:         #fafaf9;
      --bg-surface: #f5f5f4;
      --bg-elevated:#ececea;
      --border:     #e5e5e4;
      --border-sub: #ededeb;
      --text:       #1c1917;
      --text-muted: #78716c;
      --text-dim:   #a8a29e;
      --text-body:  #44403c;
      --text-faint: #78716c;
    }
    /* ── 다크 ───────────────────────────────────────────────────── */
    body.dark {
      --bg:         #0d0d0d;
      --bg-surface: #1a1a1a;
      --bg-elevated:#111111;
      --border:     #2a2a2a;
      --border-sub: #1e1e1e;
      --text:       #e8e8e8;
      --text-muted: #555555;
      --text-dim:   #333333;
      --text-body:  #cccccc;
      --text-faint: #aaaaaa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 13px;
      min-height: 100vh;
      transition: background .2s, color .2s;
    }
    /* 본문 전용 폰트: 한글 Noto Sans KR, 영문 Inter */
    .body-font {
      font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
      font-weight: 400;
    }
    /* 도트 배경 패턴 */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: .45;
    }
    body::after {
      content: 'gitmark · 흔적 · gitmark · 흔적 · gitmark · 흔적';
      position: fixed; left: 14px; top: 50%; z-index: 0; pointer-events: none;
      writing-mode: vertical-rl; letter-spacing: .3em;
      font-size: 10px; color: var(--border); transform: translateY(-50%);
      white-space: nowrap; user-select: none;
    }
    #app {
      max-width: 680px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative; z-index: 1;
    }
    @media (min-width: 768px) {
      #app {
        max-width: 960px;
        margin-left: max(108px, calc((100vw - 960px) / 2));
        margin-right: auto;
      }
    }
    input, textarea, button {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }
    ::-webkit-scrollbar { width: 0; }
    .screen { animation: fi .12s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
    .btn-ghost {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 11px; padding: 0;
      transition: color .15s;
    }
    .btn-ghost:hover { color: var(--text); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }
    .input-field {
      width: 100%; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 9px 12px; font-size: 13px;
      color: var(--text); outline: none;
      transition: border-color .15s;
    }
    .input-field:focus { border-color: var(--text-muted); }
    .input-field::placeholder { color: var(--text-dim); }
    .tab-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 680px;
      background: var(--bg); border-top: 0.5px solid var(--border);
      display: flex; z-index: 20;
    }
    .tab-bar button {
      flex: 1; padding: 10px 0 13px;
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: color .15s;
    }
    .tab-bar button i { font-size: 20px; }
    .tab-bar button span { font-size: 10px; }
    @media (min-width: 768px) {
      .tab-bar {
        bottom: auto; top: 50%;
        left: 20px; transform: translateY(-50%);
        flex-direction: column;
        border-radius: 20px;
        width: 72px; padding: 6px 4px; gap: 2px;
      }
      .tab-bar button {
        padding: 12px 8px; border-radius: 14px; width: 100%;
      }
      .tab-hidden { display: flex !important; }
      .feed-tab-switcher { display: none !important; }
    }
    .sticky-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg); border-bottom: 0.5px solid var(--border);
      padding: 10px 20px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .write-pill {
      font-size: 11px; color: var(--text-muted);
      background: none; border: 0.5px solid var(--border);
      border-radius: 20px; padding: 5px 12px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: border-color .15s, color .15s;
    }
    .write-pill:hover { border-color: var(--text-muted); color: var(--text); }
    .edit-pill {
      font-size: 10px; color: var(--text-dim);
      background: none; border: 0.5px solid var(--border);
      border-radius: 20px; padding: 2px 8px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: border-color .15s, color .15s;
    }
    .edit-pill:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── 커스텀 모달 ─────────────────────────────────────────────── */
    .gm-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .gm-dialog {
      background: var(--bg-surface);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 24px 20px 18px;
      width: 100%; max-width: 300px;
      font-family: 'JetBrains Mono', monospace;
    }
    .gm-msg {
      font-size: 13px; color: var(--text-body);
      line-height: 1.6; margin-bottom: 18px; text-align: center;
    }
    .gm-btns { display: flex; gap: 8px; }
    .gm-btn {
      flex: 1; padding: 9px; border-radius: 8px; cursor: pointer;
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      border: 0.5px solid var(--border); transition: opacity .15s;
    }
    .gm-btn:hover { opacity: .8; }
    .gm-btn-cancel { background: var(--bg-elevated); color: var(--text-muted); }
    .gm-btn-confirm { background: var(--text); color: var(--bg); }
    .avatar {
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 500; flex-shrink: 0;
    }
    .like-btn {
      cursor: pointer; display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      padding: 3px 10px; border-radius: 20px;
      border: 0.5px solid var(--border);
      background: var(--bg-elevated);
      transition: color .15s, border-color .15s, background .15s;
    }
    .like-btn.liked { color: #f472b6; border-color: #f472b6; background: rgba(244,114,182,.08); }
    .del-btn { background: none; border: none; cursor: pointer; padding: 0; font-size: 11px; color: var(--text-dim); transition: color .15s; }
    .del-btn:hover { color: #f87171; }
    textarea { resize: none; background: transparent; border: none; outline: none; color: var(--text); width: 100%; line-height: 1.7; }

    /* ── 인덱스 피드 레이아웃 ───────────────────────────────────── */
    .feed-index-wrap {
      padding: 20px 20px 0 20px;
    }
    .card-row {
      display: flex; align-items: flex-start;
      gap: 12px; margin-bottom: 10px;
    }
    .card-idx {
      font-size: 11px; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      min-width: 28px; text-align: right;
      padding-top: 13px; flex-shrink: 0;
      user-select: none;
    }
    .card-tile-wrap { flex: 1; min-width: 0; }

    .tile {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s;
    }
    .tile:hover { transform: translateX(2px); }

    /* 상단 헤더: 내용 + 시간 */
    .tile-head {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      padding: 14px 16px 12px;
    }
    .tile-txt {
      font-size: 14px; font-weight: 500;
      color: var(--text-body); line-height: 1.7;
      word-break: break-word; flex: 1;
    }
    .tile-since {
      font-size: 11px; color: var(--text-dim);
      white-space: nowrap; flex-shrink: 0;
      margin-top: 2px;
    }

    /* 하단 메타 영역: 흰 배경 */
    .tile-rows {
      background: var(--bg-surface);
      border-top: 0.5px solid var(--border);
    }
    .tile-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      font-size: 12px; color: var(--text-muted);
      flex-wrap: wrap;
    }
    .tile-row-icon {
      width: 20px; flex-shrink: 0; font-size: 13px;
      color: var(--text-dim); text-align: center;
    }
    .tile-row-val {
      display: flex; align-items: center; gap: 6px; flex: 1;
      color: var(--text);
    }
    .tile-sep { color: var(--border-sub); font-size: 10px; }

    /* 삭제된 카드 */
    .tile-del-head {
      padding: 11px 14px 9px;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-dim);
    }
    .tile-del-sub { font-size: 10px; font-style: italic; }
    .tile-del-rows {
      background: var(--bg-surface);
      border-top: 0.5px solid var(--border);
      padding: 7px 14px;
      font-size: 10px; color: var(--text-dim); font-style: italic;
    }

    /* ── 테마 토글 버튼 ─────────────────────────────────────────── */

    /* ── 분기 타임라인 피드 ──────────────────────────────────── */
    .feed-branch-header {
      display: grid; grid-template-columns: 1fr 0.5px 1fr;
      background: var(--bg-surface); border-bottom: 0.5px solid var(--border);
      font-size: 9px; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace; letter-spacing: .05em;
      position: sticky; top: 45px; z-index: 9;
    }
    .fbh-left  { padding: 5px 12px; text-align: right; }
    .fbh-sep   { background: var(--border); }
    .fbh-right { padding: 5px 12px; }
    .feed-branch-wrap {
      position: relative; padding: 14px 0 14px;
      border: 0.5px solid var(--border);
      border-radius: 20px;
      margin: 12px 4px 90px;
      overflow: hidden;
    }
    .feed-branch-wrap::before {
      content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
      width: 2px; background: var(--border);
      transform: translateX(-50%); pointer-events: none;
    }
    .branch-row {
      display: flex; margin-bottom: 14px; position: relative;
    }
    .branch-row::before {
      content: ''; position: absolute; left: 50%; top: 15px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border);
      transform: translateX(-50%); z-index: 2;
    }
    .branch-row.casual {
      justify-content: flex-start;
      padding-left: 14px; padding-right: calc(50% + 10px);
    }
    .branch-row.info {
      justify-content: flex-end;
      padding-right: 14px; padding-left: calc(50% + 10px);
    }
    .branch-tile-wrap { flex: 1; min-width: 0; }
    .tile.info-tile { border-color: var(--border-sub); }
    /* ── 모바일 피드 탭 스타일 ──────────────────────────────── */
    .feed-tab-switcher { display: none; }
    @media (max-width: 767px) {
      .feed-tab-switcher {
        display: flex;
        position: sticky; top: 45px; z-index: 10;
        background: var(--bg);
        border-bottom: 0.5px solid var(--border);
      }
      .feed-tab-btn {
        flex: 1; padding: 9px 0;
        background: none; border: none; border-bottom: 2px solid transparent;
        cursor: pointer;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px; color: var(--text-dim); letter-spacing: .05em;
        transition: color .15s, border-color .15s;
      }
      .feed-tab-btn.active { color: var(--text); border-bottom-color: var(--text); }
      .sticky-header { padding-right: 48px; }
      .feed-branch-header { display: none; }
      .feed-branch-wrap {
        border: none; border-radius: 0; margin: 0 0 90px;
        padding: 6px 0 6px;
      }
      /* casual 탭: 좌측 라인만 */
      .feed-branch-wrap::before {
        left: 18px; transform: none; width: 1px; z-index: 0;
      }
      .feed-branch-wrap::after { display: none; }
      /* link 탭 활성화 시: 우측 라인만 */
      .feed-branch-wrap.tab-link-active::before { display: none; }
      .feed-branch-wrap.tab-link-active::after {
        content: ''; position: absolute; right: 18px; top: 0; bottom: 0;
        width: 1px; background: var(--border); pointer-events: none; display: block;
        z-index: 0;
      }
      /* 타일을 라인 위로 */
      .branch-row { position: relative; z-index: 1; }
      .branch-row.casual {
        padding-left: 36px; padding-right: 10px;
        justify-content: flex-start;
      }
      .branch-row.info {
        padding-left: 10px; padding-right: 36px;
        justify-content: flex-start;
      }
      /* casual: 닷 좌측 */
      .branch-row.casual::before {
        left: 14px; transform: none;
      }
      /* link: 닷 우측 */
      .branch-row.info::before {
        left: auto; right: 14px; transform: none;
      }
      .tab-hidden { display: none !important; }
    }
    .info-url-bar {
      display: block; padding: 5px 12px; font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim); background: var(--bg-surface);
      border-bottom: 0.5px solid var(--border);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-decoration: none; cursor: pointer;
    }
    .info-url-bar:hover { color: var(--text-body); }

    /* ── UX 인터랙션 효과 ──────────────────────────────────── */
    .ink-overlay {
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      background: var(--bg-surface);
      transition: clip-path .42s cubic-bezier(.4,0,.2,1);
    }
    .tile { transition: transform .12s; }
  </style>
</head>

<div id="app"><div style="text-align:center;padding:60px;color:var(--text-dim);font-size:11px;">로딩 중...</div></div>
<script>
'use strict';

// ── 상수 ────────────────────────────────────────────────────────────
var MAX = 280;
var SURNAMES = ['김','이','박','최','정','강','조','윤','장','임','한','오','서','신','권','황','안','송','류','전','홍','고','문','양','손','배','백','허','유','남'];
var EN_NAMES = ['james','john','robert','michael','william','david','mary','patricia','jennifer','minho','junho','jinho','soyeon','minji','hyunji'];
// ── 유틸 ────────────────────────────────────────────────────────────
function mkId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function isPseudo(nick) {
  var t = nick.trim();
  if (/^[가-힣]{2,4}$/.test(t) && SURNAMES.indexOf(t[0]) >= 0) return true;
  if (EN_NAMES.indexOf(t.toLowerCase()) >= 0) return true;
  return false;
}

function nick2color(nick) {
  var h = 0;
  for (var i = 0; i < nick.length; i++) h = nick.charCodeAt(i) + ((h << 5) - h);
  var n = Math.abs(h);
  var l = 22 + (n % 32); // 22–53% lightness
  return {
    border: 'hsl(0,0%,' + l + '%)',
    tint:   'hsla(0,0%,' + l + '%,0.13)',
    avBg:   'hsl(0,0%,' + l + '%)',
    avText: l > 38 ? 'hsl(0,0%,8%)' : 'hsl(0,0%,92%)'
  };
}

function getInitial(nick) { return (nick || '?')[0].toUpperCase(); }

function relTime(ts) {
  var d = Date.now() - ts, s = Math.floor(d/1000), m = Math.floor(s/60), h = Math.floor(m/60), day = Math.floor(h/24);
  if (s < 60) return '방금 전';
  if (m < 60) return m + '분 전';
  if (h < 24) return h + '시간 전';
  if (day < 7) return day + '일 전';
  return new Date(ts).toLocaleDateString('ko-KR');
}

function absTime(ts) {
  return new Date(ts).toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function avatar(nick, size) {
  size = size || 36;
  var c = nick2color(nick), fs = size < 30 ? 11 : size < 50 ? 14 : 20;
  return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;background:'+c.avBg+';color:'+c.avText+';font-size:'+fs+'px;">'+getInitial(nick)+'</div>';
}

function nickHtml(nick, pseudo) {
  return esc(nick) + (pseudo ? ' <span style="color:#ca8a04;font-size:10px;">(가명)</span>' : '');
}

function extractUrl(txt) {
  var m = (txt || '').match(/https?:\/\/[^\s]+/);
  return m ? m[0] : null;
}

function linkify(txt) {
  return (txt || '').split(/(https?:\/\/[^\s]+)/g).map(function(part) {
    if (/^https?:\/\//.test(part)) {
      var disp = part.replace(/^https?:\/\//, '').replace(/\/$/, '');
      if (disp.length > 42) disp = disp.slice(0, 42) + '…';
      return '<a href="'+esc(part)+'" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="color:var(--text-dim);text-decoration:underline;text-underline-offset:2px;word-break:break-all;">'+esc(disp)+'</a>';
    }
    return esc(part);
  }).join('');
}

// ── 스토어 ──────────────────────────────────────────────────────────
// ── Supabase 클라이언트 ──────────────────────────────────────────────
var SB = window.supabase.createClient(

);

// ── 테마(로컬 유지) ──────────────────────────────────────────────────
var S = {
  theme: function() { try { return localStorage.getItem('gm2_theme') || 'light'; } catch(e) { return 'light'; } },
  setTheme: function(t) { try { localStorage.setItem('gm2_theme', t); } catch(e) {} }
};

// ── 첫 로그인 프로필 생성 ────────────────────────────────────────────
async function getOrCreateProfile(user) {
  var meta = user.user_metadata || {};
  var avatarUrl = meta.avatar_url || meta.picture || null;
  var { data } = await SB.from('profiles').select('*').eq('id', user.id).maybeSingle();
  if (data) {
    var updates = {};
    if (avatarUrl && data.avatar_url !== avatarUrl) updates.avatar_url = avatarUrl;
    // nick 컬럼이 비어있으면 구글 이름으로 채움
    if (!data.nick) {
      updates.nick = meta.full_name || meta.name || ('객' + Math.floor(Math.random() * 9000 + 1000));
      updates.pseudo = false;
    }
    if (Object.keys(updates).length) {
      await SB.from('profiles').update(updates).eq('id', user.id);
      Object.assign(data, updates);
    }
    return data;
  }
  var nick = meta.full_name || meta.name || ('객' + Math.floor(Math.random() * 9000 + 1000));
  var profile = { id: user.id, email: user.email || '', nick: nick, pseudo: false, avatar_url: avatarUrl };
  await SB.from('profiles').upsert(profile);
  return profile;
}

// A: 잉크 방울 전환 — 탭한 지점에서 잉크가 번지며 화면 전환
function inkTransition(x, y, cb) {
  // prefers-reduced-motion 또는 클립패스 미지원 시 즉시 이동
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    cb(); return;
  }
  var ov = document.createElement('div');
  ov.className = 'ink-overlay';
  ov.style.clipPath = 'circle(0% at '+x+'px '+y+'px)';
  document.body.appendChild(ov);
  ov.getBoundingClientRect(); // force reflow
  ov.style.clipPath = 'circle(200% at '+x+'px '+y+'px)';
  var fired = false;
  function finish() {
    if (fired) return; fired = true;
    cb();
    setTimeout(function() {
      ov.style.transition = 'opacity .25s ease';
      ov.style.opacity = '0';
      setTimeout(function(){ if(ov.parentNode) document.body.removeChild(ov); }, 280);
    }, 30);
  }
  ov.addEventListener('transitionend', finish, {once:true});
  setTimeout(finish, 600); // 폴백: transitionend 미발화 시 강제 진행
}

// B: 글자 해체 삭제 — 각 글자가 사방으로 흩어지며 소멸
function scatterAndDelete(tile, onDone) {
  var txtEl = tile.querySelector('.tile-txt');
  if (!txtEl) { onDone(); return; }
  var txt = txtEl.textContent || '';
  txtEl.style.overflow = 'visible';
  txtEl.style.webkitLineClamp = 'unset';
  txtEl.style.display = 'block';
  var spans = txt.split('').map(function(ch) {
    var s = document.createElement('span');
    s.textContent = ch;
    s.style.display = 'inline-block';
    s.style.transition = 'transform .65s ease, opacity .65s ease';
    return s;
  });
  txtEl.innerHTML = '';
  spans.forEach(function(s){ txtEl.appendChild(s); });
  requestAnimationFrame(function() {
    spans.forEach(function(s) {
      var dx = (Math.random()-0.5)*300;
      var dy = (Math.random()-0.5)*200;
      var rot = (Math.random()-0.5)*640;
      s.style.transform = 'translate('+dx+'px,'+dy+'px) rotate('+rot+'deg)';
      s.style.opacity = '0';
    });
    setTimeout(onDone, 750);
  });
}

function stopOpacityLoop() {} // no-op (opacity loop removed)

// D: 타이핑 리듬 출현 — 자연스러운 타이핑 패턴으로 글자가 한 자씩 등장
function typewriterReveal(el, txt, onDone) {
  var i = 0;
  el.textContent = '';
  function tick() {
    if (i >= txt.length) { if (onDone) onDone(); return; }
    var ch = txt[i++];
    if (ch === '\n') el.appendChild(document.createElement('br'));
    else el.appendChild(document.createTextNode(ch));
    var delay;
    if ('.,。！？\n'.indexOf(ch) >= 0) delay = 260 + Math.random()*200;
    else if (Math.random() < 0.06) delay = 130 + Math.random()*90;
    else delay = 16 + Math.random()*42;
    setTimeout(tick, delay);
  }
  tick();
}

// ── 라우터 (해시 기반) ───────────────────────────────────────────────
var R = {
  path: function() { return location.hash.replace(/^#/,'') || '/'; },
  go: function(p) { location.hash = p; },
  render: async function() {
    stopOpacityLoop();
    var app = document.getElementById('app');
    if (!app) return;

    // 첫 로드 시에만 로딩 표시
    if (!_cachedMe) {
      app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-dim);font-family:\'JetBrains Mono\',monospace;font-size:11px;">loading…</div>';
    }

    if (!_cachedMe) {
      var { data: { session } } = await SB.auth.getSession();
      if (!session) { app.innerHTML = ''; app.appendChild(authPage()); return; }
      var profile = await getOrCreateProfile(session.user);
      var meta = session.user.user_metadata || {};
      _cachedMe = {
        uid: session.user.id,
        nick: profile.nick,
        pseudo: profile.pseudo,
        avatar_url: meta.avatar_url || meta.picture || null,
        google_name: meta.full_name || meta.name || null,
        email: session.user.email || null
      };
    }

    var me = _cachedMe;
    var p = R.path();
    var newPage;
    if (p === '/write') newPage = writePage(me);
    else if (p.indexOf('/post/') === 0) newPage = await detailPage(p.slice(6), me);
    else if (p === '/my') newPage = await myPage(me);
    else if (p === '/profile') newPage = await profilePage(me);
    else newPage = await feedPage(me);

    // 콘텐츠가 준비된 후에만 화면 교체
    app.innerHTML = '';
    app.appendChild(newPage);
  }
};
window.addEventListener('hashchange', function() { R.render(); });
SB.auth.onAuthStateChange(function(event) {
  if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') { _cachedMe = null; R.render(); }
});

      ['.##......','.######..','.######..','.##.###..','.######.','##.#.####','...######','...####..'],
      ['.##..##.','########','########','#.##.###','########','##.##.##','.######.','.######.','##....##'],
      ['..##..##','.########','.########','..######.','..######.','####..###','.##....##','...#..#..']
    ];

    function catMirror(scene) {
      return scene.map(function(row){ return row.split('').reverse().join(''); });
    }
    function catDraw(ctx, scene, sx, sy, sc, alpha) {
      ctx.fillStyle = 'rgba(40,40,58,' + alpha + ')';
      scene.forEach(function(row, ry) {
        for (var c = 0; c < row.length; c++) {
          if (row[c] === '#') ctx.fillRect(sx + c*sc, sy + ry*sc, sc - 0.5, sc - 0.5);
        }
      });
    }
    function catPickN(n, total, exclude) {
      var pool = [];
      for (var i = 0; i < total; i++) if (exclude.indexOf(i) < 0) pool.push(i);
      var result = [];
      while (result.length < n && pool.length) {
        var ri = Math.floor(Math.random() * pool.length);
        result.push(pool.splice(ri, 1)[0]);
      }
      return result;
    }

    var catEntries = [], catGroundLines = [];
    var CAT_SC = 3, CAT_ALPHA = 0.30;
    var catRafRunning = false;

    function catRedrawAll(ctx, W) {
      ctx.clearRect(0, 0, W, ctx.canvas.height);
      catGroundLines.forEach(function(gl) {
        ctx.fillStyle = 'rgba(40,40,58,0.06)';
        ctx.fillRect(gl.x, gl.y, gl.w, 1);
      });
      catEntries.forEach(function(se) {
        var dx = 0, dy = 0, mirror = false;
        if (se.anim) {
          var el = Date.now() - se.anim.startT;
          var t = Math.min(el / se.anim.dur, 1);
          var ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
          var mt = t < 0.8 ? ease*(t/0.8) : ease*(1-(t-0.8)/0.2);
          dx = Math.round(se.anim.dir * mt * se.zoneW * 0.22);
          dy = Math.round(-Math.abs(Math.sin(el/55*Math.PI))*5);
          mirror = se.anim.dir < 0 && Math.floor(el/120)%2===0;
          if (t >= 1) se.anim = null;
        }
        var scene = mirror ? catMirror(CAT_SCENES[se.sceneIdx]) : CAT_SCENES[se.sceneIdx];
        catDraw(ctx, scene, se.origX + dx, se.origY + dy, CAT_SC, CAT_ALPHA);
      });
    }

    function catRunRaf(ctx, W) {
      if (catRafRunning) return;
      catRafRunning = true;
      function frame() {
        catRedrawAll(ctx, W);
        var anyActive = catEntries.some(function(se){ return !!se.anim; });
        if (anyActive) requestAnimationFrame(frame);
        else catRafRunning = false;
      }
      requestAnimationFrame(frame);
    }

    function catTrigger(se, ctx, W, delay) {
      setTimeout(function() {
        se.anim = {
          startT: Date.now(),
          dir: Math.random() < 0.5 ? 1 : -1,
          dur: 1800 + Math.random() * 700
        };
        catRunRaf(ctx, W);
      }, delay || 0);
    }

    // DOM 삽입 후 실제 크기로 고양이 배치 (모바일 제외)
    requestAnimationFrame(function() {
      if (window.innerWidth < 768) return; // 모바일 미적용
      var W = indexWrap.offsetWidth, H = indexWrap.offsetHeight;
      if (!W || !H) return;
      catCanvas.width = W; catCanvas.height = H;
      var ctx = catCanvas.getContext('2d');
      var CX = W / 2;
      var usedPrev = [];
      var cardEls = indexWrap.querySelectorAll('.branch-row');

      cardEls.forEach(function(row) {
        var top = row.offsetTop, rH = row.offsetHeight;
        if (rH < 30) return;
        var isCasual = row.classList.contains('casual');
        var zoneX = isCasual ? CX + 6 : 6, zoneW = CX - 12;
        var count = Math.random() < 0.4 ? 3 : 2;
        var picked = catPickN(count, CAT_SCENES.length, usedPrev.slice(-2));
        usedPrev = usedPrev.concat(picked).slice(-4);
        var maxSH = 0;
        picked.forEach(function(i){ maxSH = Math.max(maxSH, CAT_SCENES[i].length * CAT_SC); });
        var groundY = top + (rH - maxSH) / 2 + maxSH + 4;
        var totalW = 0;
        picked.forEach(function(i){ totalW += CAT_SCENES[i][0].length * CAT_SC; });
        var gap = Math.max(10, Math.min(24, (zoneW - totalW) / (picked.length + 1)));
        var curX = zoneX + (zoneW - totalW - gap * (picked.length - 1)) / 2;
        catGroundLines.push({x: zoneX, y: groundY + 1, w: zoneW});
        picked.forEach(function(idx) {
          var scene = CAT_SCENES[idx];
          var sW = scene[0].length * CAT_SC, sH = scene.length * CAT_SC;
          var sy = groundY - sH + (Math.random() - 0.5) * 8;
          catEntries.push({
            sceneIdx: idx, origX: Math.round(curX), origY: Math.round(sy),
            groundY: groundY, zoneX: zoneX, zoneW: zoneW, isCasual: isCasual, sW: sW, sH: sH
          });
          curX += sW + gap;
        });
      });

      catRedrawAll(ctx, W);
      // 캔버스는 pointer-events:none 유지 — indexWrap에서 이벤트 수신
      // (.branch-row z-index:2가 canvas z-index:1을 덮기 때문)

      function catHandleInteract(mx, my) {
        // indexWrap 기준 좌표 → canvas 좌표 변환 (canvas는 indexWrap 상단 기준)
        var wrapRect = indexWrap.getBoundingClientRect();
        var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        // canvas 좌표 = 클릭의 문서 좌표 - canvas(=indexWrap) 문서 상단
        var cx = mx - wrapRect.left;
        var cy = my + scrollTop - (wrapRect.top + scrollTop);

        var hit = null;
        catEntries.forEach(function(se) {
          if (!hit &&
              cx >= se.origX - 6 && cx <= se.origX + se.sW + 6 &&
              cy >= se.origY - 6 && cy <= se.origY + se.sH + 6) {
            hit = se;
          }
        });
        if (!hit) return;

        catTrigger(hit, ctx, W, 0);

        var others = catEntries.filter(function(se){ return se !== hit && !se.anim; });
        others.sort(function(){ return Math.random() - 0.5; });
        var ripple = Math.min(Math.floor(Math.random() * 2) + 1, others.length);
        for (var i = 0; i < ripple; i++) {
          catTrigger(others[i], ctx, W, 280 + i * (200 + Math.random() * 250));
        }
      }

      indexWrap.addEventListener('click', function(e) {
        catHandleInteract(e.clientX, e.clientY);
      });
      indexWrap.addEventListener('touchstart', function(e) {
        var t = e.touches[0];
        catHandleInteract(t.clientX, t.clientY);
      }, {passive: true});
    });

    btnCasual.onclick = function() {
      _feedTab = 'casual';
      btnCasual.classList.add('active'); btnLink.classList.remove('active');
      indexWrap.classList.remove('tab-link-active');
      indexWrap.querySelectorAll('.branch-row.info').forEach(function(r){ r.classList.add('tab-hidden'); });
      indexWrap.querySelectorAll('.branch-row.casual').forEach(function(r){ r.classList.remove('tab-hidden'); });
    };
    btnLink.onclick = function() {
      _feedTab = 'link';
      btnLink.classList.add('active'); btnCasual.classList.remove('active');
      indexWrap.classList.add('tab-link-active');
      indexWrap.querySelectorAll('.branch-row.casual').forEach(function(r){ r.classList.add('tab-hidden'); });
      indexWrap.querySelectorAll('.branch-row.info').forEach(function(r){ r.classList.remove('tab-hidden'); });
    };
    // 이전 탭 상태 복원
    if (_feedTab === 'link') btnLink.onclick();
  }
  wrap.appendChild(tabBar('/', me));
  return wrap;
}


function makeCard(post, me, idx, likedSet, avatarMap) {
  var branchMode = (idx == null);
  var url = branchMode ? extractUrl(post.txt) : null;
  var isInfo = !!url;

  var row = document.createElement('div');
  var tileWrap = document.createElement('div');

  if (branchMode) {
    row.className = 'branch-row ' + (isInfo ? 'info' : 'casual');
    tileWrap.className = 'branch-tile-wrap';
  } else {
    row.className = 'card-row';
    var idxEl = document.createElement('div');
    idxEl.className = 'card-idx';
    idxEl.textContent = String(idx).padStart(2, '0');
    row.appendChild(idxEl);
    tileWrap.className = 'card-tile-wrap';
  }

  var c = nick2color(post.nick);
  var tile = document.createElement('div');
  tile.className = 'tile' + (isInfo ? ' info-tile' : '');

  if (post.del) {
    tile.innerHTML = [
      '<div class="tile-del-head"><span>╳</span><span class="tile-del-sub">삭제됨 · '+absTime(post.del)+'</span></div>',
      '<div class="tile-del-rows">이 흔적은 지워졌습니다</div>'
    ].join('');
    tileWrap.appendChild(tile);
    row.appendChild(tileWrap);
    var remain = 60000 - (Date.now() - post.del);
    if (remain > 0) setTimeout(function(){ if(row.parentNode) row.parentNode.removeChild(row); }, remain);
    return row;
  }


  var infoBar = '';
  if (isInfo) {
    var disp = url.replace(/^https?:\/\//, '').replace(/\/$/, '');
    if (disp.length > 38) disp = disp.slice(0, 38) + '…';
    infoBar = '<a class="info-url-bar" href="'+esc(url)+'" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">'+esc(disp)+'</a>';
  }

  var liked = likedSet ? likedSet.has(post.id) : false;
  tile.innerHTML = [
    infoBar,
    '<div class="tile-head">',
    '<div class="tile-txt body-font" id="txt-'+post.id+'" style="-webkit-line-clamp:3;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;">'+linkify(post.txt)+'</div>',
    '<div class="tile-since">'+relTime(post.upd||post.at)+'</div>',
    '</div>',
    post.txt.length > 80 ? '<button id="more-'+post.id+'" style="display:block;width:100%;text-align:left;padding:2px 14px 8px;font-size:10px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:\'JetBrains Mono\',monospace;">더 보기 →</button>' : '',
    '<div class="tile-rows" style="background:'+c.tint+';">',
    '<div class="tile-row">',
    '<span class="tile-row-icon">'+(avatarMap && avatarMap[post.uid] ? '<img src="'+esc(avatarMap[post.uid])+'" referrerpolicy="no-referrer" style="width:20px;height:20px;border-radius:50%;object-fit:cover;vertical-align:middle;">' : avatar(post.nick, 20))+'</span>',
    '<span class="tile-row-val">'+nickHtml(post.nick, post.pseudo)+'</span>',
    '<span class="tile-sep">·</span>',
    '<button class="like-btn'+(liked?' liked':'')+'" id="lbtn-'+post.id+'">',
    '<span id="lico-'+post.id+'">'+(liked?'♥':'♡')+'</span>',
    '<span id="lcnt-'+post.id+'">'+(post.likes_count||0)+'</span>',
    '</button>',
    '<span style="display:flex;align-items:center;gap:3px;color:var(--text-dim);font-size:12px;"><i class="ti ti-message" aria-hidden="true" style="font-size:13px;"></i>'+(Array.isArray(post._cmt)?post._cmt[0]?.count||0:post.comments_count||0)+'</span>',
    me.uid===post.uid ? '<button class="del-btn" id="delbtn-'+post.id+'">삭제</button>' : '',
    '</div>',
    '</div>'
  ].join('');

  tile.querySelector('#lbtn-'+post.id).onclick = async function(e) {
    e.stopPropagation();
    var btn = this;
    var wasLiked = btn.classList.contains('liked');
    btn.classList.toggle('liked', !wasLiked);
    document.getElementById('lico-'+post.id).textContent = !wasLiked ? '♥' : '♡';
    var cntEl = document.getElementById('lcnt-'+post.id);
    cntEl.textContent = !wasLiked ? (parseInt(cntEl.textContent)||0)+1 : Math.max(0,(parseInt(cntEl.textContent)||0)-1);
    var { data: nowLiked } = await SB.rpc('toggle_like', { p_post_id: post.id, p_uid: me.uid });
    if (typeof nowLiked === 'boolean' && nowLiked !== !wasLiked) {
      btn.classList.toggle('liked', nowLiked);
      document.getElementById('lico-'+post.id).textContent = nowLiked ? '♥' : '♡';
    }
  };
  var moreBtn = tile.querySelector('#more-'+post.id);
  if (moreBtn) {
    var expanded = false;
    moreBtn.onclick = function(e) {
      e.stopPropagation();
      expanded = !expanded;
      var txtEl = document.getElementById('txt-'+post.id);
      if (expanded) {
        txtEl.style.webkitLineClamp = 'unset';
        txtEl.style.display = 'block';
        this.textContent = '접기 ↑';
      } else {
        txtEl.style.webkitLineClamp = '3';
        txtEl.style.display = '-webkit-box';
        this.textContent = '더 보기 →';
      }
    };
  }
  if (me.uid===post.uid) {
    tile.querySelector('#delbtn-'+post.id).onclick = function(e) {
      e.stopPropagation();
      var pid = post.id;
      gModal('이 흔적을 지울까요?<br><span style="font-size:10px;color:var(--text-dim);">60초 후 완전히 사라집니다</span>', function() {
        scatterAndDelete(tile, async function() {
          await SB.from('posts').update({ del: Date.now() }).eq('id', pid);
          R.render();
        });
      }, '삭제');
    };
  }
  tile.onclick = function(e) {
    inkTransition(e.clientX, e.clientY, function() { R.go('/post/'+post.id); });
  };
  tileWrap.appendChild(tile);
  row.appendChild(tileWrap);
  return row;
}

// ── 글쓰기 페이지 ────────────────────────────────────────────────────
function writePage(me) {
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;display:flex;flex-direction:column;';

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn-ghost';
  cancelBtn.style.fontSize = '12px';
  cancelBtn.textContent = '취소';
  cancelBtn.onclick = function() {
    var ta = document.getElementById('write-ta');
    if (ta && ta.value.trim()) {
      gModal('작성 중인 내용이 사라집니다.<br>취소할까요?', function() { history.back() || R.go('/'); });
      return;
    }
    history.back() || R.go('/');
  };
  var submitBtn = document.createElement('button');
  submitBtn.id = 'submit-btn';
  submitBtn.textContent = '남기기';
  submitBtn.disabled = true;
  submitBtn.style.cssText = 'background:var(--bg-surface);border:1px solid var(--border);border-radius:4px;padding:6px 14px;font-size:12px;color:var(--text);cursor:pointer;opacity:.3;';
  submitBtn.onclick = async function() {
    var ta = document.getElementById('write-ta');
    if (!ta) return;
    var txt = ta.value.trim();
    if (!txt || txt.length > MAX) return;
    submitBtn.disabled = true;
    submitBtn.style.opacity = '.3';
    var now = Date.now();
    await SB.from('posts').insert({ id: mkId(), uid: me.uid, nick: me.nick, pseudo: me.pseudo, txt: txt, at: now, upd: now, likes_count: 0, comments_count: 0 });
    _writeDraft = '';
    R.go('/');
  };
  hdr.appendChild(cancelBtn);
  hdr.appendChild(submitBtn);
  wrap.appendChild(hdr);

  var body = document.createElement('div');
  body.style.cssText = 'padding:14px 16px;flex:1;';

  var nickBar = document.createElement('div');
  nickBar.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:12px;';

  function writeAvatar() {
    return me.avatar_url
      ? '<img src="'+esc(me.avatar_url)+'" style="width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;" referrerpolicy="no-referrer">'
      : avatar(me.nick, 24);
  }

  function renderWriteNick(editing) {
    if (editing) {
      nickBar.innerHTML = [
        writeAvatar(),
        '<input id="w-nick-inp" class="input-field" type="text" value="'+esc(me.nick)+'" maxlength="20"',
        ' style="flex:1;padding:3px 8px;font-size:12px;height:28px;">',
        '<button id="w-nick-save" style="font-size:11px;padding:3px 8px;background:var(--bg-surface);border:0.5px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text);">저장</button>',
        '<button id="w-nick-cancel" style="font-size:11px;padding:3px 8px;background:none;border:none;cursor:pointer;color:var(--text-dim);">취소</button>'
      ].join('');
      var inp = nickBar.querySelector('#w-nick-inp');
      inp.focus(); inp.select();
      nickBar.querySelector('#w-nick-save').onclick = async function() {
        var v = inp.value.trim();
        if (!v) return;
        var pseudo = isPseudo(v);
        await SB.rpc('update_nick', { p_uid: me.uid, p_nick: v, p_pseudo: pseudo });
        me = Object.assign({}, me, { nick: v, pseudo: pseudo });
        renderWriteNick(false);
      };
      nickBar.querySelector('#w-nick-cancel').onclick = function() { renderWriteNick(false); };
    } else {
      nickBar.innerHTML = [
        writeAvatar(),
        '<span style="font-size:12px;">'+nickHtml(me.nick, me.pseudo)+'</span>',
        '<button id="w-nick-edit" class="edit-pill"><i class="ti ti-pencil" style="font-size:11px;"></i></button>'
      ].join('');
      nickBar.querySelector('#w-nick-edit').onclick = function() { renderWriteNick(true); };
    }
  }
  renderWriteNick(false);
  body.appendChild(nickBar);
  var ta = document.createElement('textarea');
  ta.id = 'write-ta';
  ta.placeholder = '왔다 갔다는 흔적을 남기세요';
  ta.style.cssText = 'min-height:calc(100vh - 180px);font-size:13px;';
  if (_writeDraft) ta.value = _writeDraft;
  ta.oninput = function() {
    _writeDraft = this.value;
    var len = this.value.length, rem = MAX - len, pct = Math.min(len/MAX*100,100);
    var bar = document.getElementById('w-bar'), cnt = document.getElementById('w-cnt'), btn = document.getElementById('submit-btn');
    if (bar) { bar.style.width = pct+'%'; bar.style.background = len>MAX?'#ef4444':pct>90?'#eab308':'var(--text-muted)'; }
    if (cnt) { cnt.textContent = rem; cnt.style.color = len>MAX?'#f87171':rem<20?'#eab308':'var(--text-muted)'; }
    if (btn) { var ok = len>0&&len<=MAX; btn.disabled=!ok; btn.style.opacity=ok?'1':'.3'; }
  };
  body.appendChild(ta);
  wrap.appendChild(body);

  var footer = document.createElement('div');
  footer.style.cssText = 'position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;';
  footer.innerHTML = '<div style="display:flex;align-items:center;gap:10px;"><div style="flex:1;height:3px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;"><div id="w-bar" style="height:100%;width:0;background:var(--text-muted);border-radius:2px;transition:width .1s,background .1s;"></div></div><span id="w-cnt" style="font-size:11px;color:var(--text-muted);min-width:28px;text-align:right;">'+MAX+'</span></div>';
  wrap.appendChild(footer);

  setTimeout(function() { var ta=document.getElementById('write-ta'); if(ta) ta.focus(); }, 50);
  return wrap;
}

  var hdr = document.createElement('div');

    SB.from('posts').select('*').eq('id', pid).maybeSingle(),

    SB.from('comments').select('*').eq('post_id', pid).order('at')

  if (post.del) {
    postEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">╳ 삭제됨 · '+absTime(post.del)+'</div><div style="font-size:11px;color:var(--text-dim);margin-top:4px;">이 흔적은 지워졌습니다</div>';

      '<div style="display:flex;align-items:center;gap:14px;">',
      '<button class="like-btn'+(liked?' liked':'')+'" id="d-lbtn"><span id="d-lico">'+(liked?'♥':'♡')+'</span><span style="font-size:12px;" id="d-lcnt">'+(post.likes_count||0)+'</span></button>',
      '<span style="font-size:12px;color:var(--text-muted);">💬 <span id="d-cmt-cnt">'+(post.comments_count||0)+'</span></span>',
      me.uid===post.uid ? '<button class="del-btn" id="d-del">삭제</button>' : '',

    ].join('');

      var wasLiked = this.classList.contains('liked');
      this.classList.toggle('liked', !wasLiked);
      document.getElementById('d-lico').textContent = !wasLiked?'♥':'♡';
      var cntEl = document.getElementById('d-lcnt');
      cntEl.textContent = !wasLiked?(parseInt(cntEl.textContent)||0)+1:Math.max(0,(parseInt(cntEl.textContent)||0)-1);
      await SB.rpc('toggle_like', { p_post_id: pid, p_uid: me.uid });
    };
    if (me.uid===post.uid) {
      postEl.querySelector('#d-del').onclick = function() {
        gModal('이 흔적을 지울까요?<br><span style="font-size:10px;color:var(--text-dim);">60초 후 완전히 사라집니다</span>', async function() {
          await SB.from('posts').update({ del: Date.now() }).eq('id', pid);
          R.go('/');
        }, '삭제');
      };
    }
  }
  wrap.appendChild(postEl);
  var bodyEl = postEl.querySelector('#d-post-body');
  if (bodyEl) typewriterReveal(bodyEl, post.txt, function() { bodyEl.innerHTML = linkify(post.txt); });

  // ── 댓글 입력창 (포스트 바로 아래, 인라인) ──
  var cInput = document.createElement('div');
  cInput.style.cssText = 'display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);';
  var myAv = me.avatar_url
    ? '<img src="'+esc(me.avatar_url)+'" referrerpolicy="no-referrer" style="width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;">'
    : avatar(me.nick, 26);
  cInput.innerHTML = myAv;
  var inp = document.createElement('input');
  inp.id = 'd-inp';
  inp.type = 'text';
  inp.className = 'input-field';
  inp.placeholder = '댓글을 남기세요…';
  inp.style.cssText = 'flex:1;padding:6px 10px;font-size:12px;height:32px;';
  var sendBtn = document.createElement('button');
  sendBtn.innerHTML = '<i class="ti ti-send" style="font-size:14px;"></i>';
  sendBtn.style.cssText = 'background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;transition:color .15s;flex-shrink:0;';
  sendBtn.onmouseover = function(){this.style.color='var(--text)';};
  sendBtn.onmouseout = function(){this.style.color='var(--text-muted)';};
  cInput.appendChild(inp);
  cInput.appendChild(sendBtn);
  wrap.appendChild(cInput);

  // ── 댓글 목록 ──
  var cList = document.createElement('div');
  cList.id = 'd-clist';
  wrap.appendChild(cList);

  var replyTo = null;
  var allComments = cmtRes.data || [];

  // 댓글 작성자 프로필 사진 맵
  var cmtAvatarMap = {};
  cmtAvatarMap[me.uid] = me.avatar_url || null;
  var cmtUids = [...new Set(allComments.map(function(c){ return c.uid; }).filter(function(uid){ return uid !== me.uid; }))];
  if (cmtUids.length) {
    var { data: cmtProfs } = await SB.rpc('get_public_profiles', { user_ids: cmtUids });
    (cmtProfs || []).forEach(function(p){ if (p.avatar_url) cmtAvatarMap[p.id] = p.avatar_url; });
  }

  function cmtAvatar(uid, nick, size) {
    return cmtAvatarMap[uid]
      ? '<img src="'+esc(cmtAvatarMap[uid])+'" referrerpolicy="no-referrer" style="width:'+size+'px;height:'+size+'px;border-radius:50%;object-fit:cover;flex-shrink:0;">'
      : avatar(nick, size);
  }

  function appendCommentEl(c) {
    var replies = allComments.filter(function(r){ return r.parent_id===c.id; });
    cList.appendChild(c.parent_id ? mkReply(c) : mkComment(c, replies));
  }

  function renderComments() {
    var top = allComments.filter(function(c){ return !c.parent_id; });
    cList.innerHTML = '';
    top.forEach(function(c) {
      cList.appendChild(mkComment(c, allComments.filter(function(r){ return r.parent_id===c.id; })));
    });
  }

  function mkComment(c, replies) {
    var el = document.createElement('div');
    if (c.del) {
      el.innerHTML = '<div style="padding:10px 16px;border-bottom:1px solid var(--border-sub);color:var(--text-dim);font-size:11px;">● 삭제됨 · '+absTime(c.del)+'</div>';
    } else {
      var isOwner = c.uid === me.uid;
      el.innerHTML = [
        '<div style="padding:10px 16px;border-bottom:1px solid var(--border-sub);">',
        '<div style="display:flex;gap:8px;">',
        cmtAvatar(c.uid, c.nick, 28),
        '<div style="flex:1;"><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px;">',
        '<span style="font-size:12px;color:var(--text);">'+nickHtml(c.nick,c.pseudo)+'</span>',
        '<span style="font-size:10px;color:var(--text-dim);">· '+relTime(c.at)+'</span></div>',
        '<div id="ctxt-'+c.id+'" style="font-size:12px;color:var(--text-body);line-height:1.55;word-break:break-word;min-height:1.2em;"></div>',
        '<div style="display:flex;gap:10px;margin-top:6px;">',
        '<button class="btn-ghost" id="rep-'+c.id+'">답글</button>',
        isOwner ? '<button class="del-btn" style="margin-left:0;" id="dc-'+c.id+'">삭제</button>' : '',
        '</div></div></div></div>'
      ].join('');
      typewriterReveal(el.querySelector('#ctxt-'+c.id), c.txt);
      el.querySelector('#rep-'+c.id).onclick = function() { replyTo = c.id; inp.placeholder='@'+c.nick+'에 답글'; inp.focus(); };
      if (isOwner) {
        el.querySelector('#dc-'+c.id).onclick = (function(cid) { return function() {
          gModal('이 댓글을 삭제할까요?', async function() {
            await SB.from('comments').update({ del: Date.now() }).eq('id', cid);
            allComments = allComments.map(function(cm){ return cm.id===cid ? Object.assign({},cm,{del:Date.now()}) : cm; });
            post.comments_count = Math.max(0,(post.comments_count||0)-1);
            await SB.from('posts').update({ comments_count: post.comments_count }).eq('id', pid);
            var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=post.comments_count;
            renderComments();
          }, '삭제');
        }; })(c.id);
      }
    }
    replies.forEach(function(r) { el.appendChild(mkReply(r)); });
    return el;
  }

  function mkReply(r) {
    var el = document.createElement('div');
    if (r.del) {
      el.innerHTML = '<div style="padding:8px 16px 8px 52px;border-bottom:1px solid var(--border-sub);color:var(--text-dim);font-size:10px;">● 삭제됨 · '+absTime(r.del)+'</div>';
      return el;
    }
    var isOwner = r.uid === me.uid;
    el.innerHTML = [
      '<div style="padding:8px 16px 8px 52px;border-bottom:1px solid var(--border-sub);">',
      '<div style="display:flex;gap:8px;">',
      cmtAvatar(r.uid, r.nick, 24),
      '<div style="flex:1;"><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:3px;">',
      '<span style="font-size:11px;color:var(--text);">'+nickHtml(r.nick,r.pseudo)+'</span>',
      '<span style="font-size:10px;color:var(--text-dim);">· '+relTime(r.at)+'</span></div>',
      '<div id="rtxt-'+r.id+'" style="font-size:11px;color:var(--text-faint);line-height:1.5;word-break:break-word;min-height:1.1em;"></div>',
      isOwner ? '<button class="del-btn" style="margin-left:0;margin-top:4px;" id="dr-'+r.id+'">삭제</button>' : '',
      '</div></div></div>'
    ].join('');
    typewriterReveal(el.querySelector('#rtxt-'+r.id), r.txt);
    if (isOwner) {
      el.querySelector('#dr-'+r.id).onclick = (function(rid) { return function() {
        gModal('이 댓글을 삭제할까요?', async function() {
          await SB.from('comments').update({ del: Date.now() }).eq('id', rid);
          allComments = allComments.map(function(cm){ return cm.id===rid ? Object.assign({},cm,{del:Date.now()}) : cm; });
          post.comments_count = Math.max(0,(post.comments_count||0)-1);
          await SB.from('posts').update({ comments_count: post.comments_count }).eq('id', pid);
          var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=post.comments_count;
          renderComments();
        }, '삭제');
      }; })(r.id);
    }
    return el;
  }

  var _submitting = false;
  function submit() {
    if (_submitting) return;
    var txt = inp.value.trim();
    if (!txt) return;
    _submitting = true;
    var parentId = replyTo;
    inp.value = ''; inp.placeholder = '댓글을 남기세요…'; replyTo = null;
    var newComment = { id: mkId(), post_id: pid, parent_id: parentId, uid: me.uid, nick: me.nick, pseudo: me.pseudo, txt: txt, at: Date.now(), del: null };
    // 즉시 UI에 추가
    allComments.push(newComment);
    if (parentId) {
      renderComments();
    } else {
      cList.appendChild(mkComment(newComment, []));
    }
    // 서버에 저장
    SB.from('comments').insert(newComment).then(function() {
      post.comments_count = (post.comments_count||0)+1;
      SB.from('posts').update({ comments_count: post.comments_count }).eq('id', pid);
      var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=post.comments_count;
    });
    setTimeout(function(){ _submitting = false; }, 300);
  }
  inp.onkeydown = function(e){ if(e.key==='Enter'){ e.preventDefault(); submit(); } };
  sendBtn.onclick = function(e){ e.preventDefault(); submit(); };

  // ── Supabase Realtime: 다른 사용자 댓글 실시간 반영 ──
  var channel = SB.channel('comments-'+pid)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments', filter: 'post_id=eq.'+pid },
      function(payload) {
        var c = payload.new;
        if (allComments.some(function(x){ return x.id===c.id; })) return; // 내가 올린 것 중복 방지
        allComments.push(c);
        if (c.parent_id) {
          renderComments();
        } else {
          cList.appendChild(mkComment(c, []));
        }
        post.comments_count = (post.comments_count||0)+1;
        var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=post.comments_count;
      }
    ).subscribe();

  // 페이지 이동 시 구독 해제
  var _unsubDetail = function() { SB.removeChannel(channel); };
  window.addEventListener('hashchange', _unsubDetail, { once: true });

  renderComments();
  return wrap;
}

// ── 마이페이지 ───────────────────────────────────────────────────────
async function profilePage(me) {
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;padding-bottom:64px;';

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  hdr.innerHTML = '<span style="font-size:13px;letter-spacing:.05em;">마이페이지</span>';
  var logoutBtn = document.createElement('button');
  logoutBtn.className = 'btn-ghost';
  logoutBtn.textContent = '로그아웃';
  logoutBtn.onclick = async function() { await SB.auth.signOut(); R.render(); };
  hdr.appendChild(logoutBtn);
  wrap.appendChild(hdr);

  var prof = document.createElement('div');
  prof.style.cssText = 'display:flex;flex-direction:column;align-items:center;padding:32px 16px 24px;border-bottom:0.5px solid var(--border);gap:12px;';

  function renderProf(editing) {
    if (editing) {
      var editAvatar = me.avatar_url
        ? '<img src="'+esc(me.avatar_url)+'" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:0.5px solid var(--border);" referrerpolicy="no-referrer">'
        : avatar(me.nick, 64);
      prof.innerHTML = [
        '<div id="prof-av-wrap">'+editAvatar+'</div>',
        '<div style="width:100%;max-width:260px;">',
        '<input id="prof-nick-inp" class="input-field" type="text" value="'+esc(me.nick)+'" maxlength="20" placeholder="닉네임 입력" style="text-align:center;margin-bottom:6px;">',
        '<div id="prof-nick-preview" style="text-align:center;font-size:11px;color:var(--text-muted);min-height:16px;margin-bottom:12px;">'+nickHtml(me.nick, me.pseudo)+'</div>',
        '<div style="display:flex;gap:8px;">',
        '<button id="prof-save" style="flex:1;background:var(--bg-surface);border:0.5px solid var(--border);border-radius:6px;padding:8px;font-size:12px;color:var(--text);cursor:pointer;">저장</button>',
        '<button id="prof-cancel" class="btn-ghost" style="flex:1;padding:8px;border:0.5px solid var(--border);border-radius:6px;">취소</button>',
        '</div></div>'
      ].join('');
      var inp = prof.querySelector('#prof-nick-inp');
      var preview = prof.querySelector('#prof-nick-preview');
      var avWrap = prof.querySelector('#prof-av-wrap');
      inp.focus(); inp.select();
      inp.oninput = function() {
        var v = this.value.trim() || me.nick;
        if (!me.avatar_url) {
          var c = nick2color(v);
          avWrap.innerHTML = '<div class="avatar" style="width:64px;height:64px;background:'+c.avBg+';color:'+c.avText+';font-size:24px;">'+getInitial(v)+'</div>';
        }
        preview.innerHTML = nickHtml(v, isPseudo(v));
      };
      prof.querySelector('#prof-save').onclick = async function() {
        var newNick = inp.value.trim();
        if (!newNick) { inp.focus(); return; }
        var pseudo = isPseudo(newNick);
        await SB.rpc('update_nick', { p_uid: me.uid, p_nick: newNick, p_pseudo: pseudo });
        me = Object.assign({}, me, { nick: newNick, pseudo: pseudo });
        renderProf(false);
      };
      prof.querySelector('#prof-cancel').onclick = function() { renderProf(false); };
    } else {
      var gAvatar = me.avatar_url
        ? '<img src="'+esc(me.avatar_url)+'" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:0.5px solid var(--border);" referrerpolicy="no-referrer">'
        : avatar(me.nick, 64);
      var gNameLine = me.google_name
        ? '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">'+esc(me.google_name)+'</div>'
        : '';
      var emailLine = me.email
        ? '<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">'+esc(me.email)+'</div>'
        : '';
      prof.innerHTML = [
        gAvatar,
        '<div style="text-align:center;">',
        '<div style="display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:2px;">',
        '<span style="font-size:15px;font-weight:500;">'+nickHtml(me.nick, me.pseudo)+'</span>',
        '<button id="prof-edit-btn" class="edit-pill"><i class="ti ti-pencil" style="font-size:11px;"></i></button>',
        '</div>',
        gNameLine,
        emailLine,
        '</div>'
      ].join('');
      prof.querySelector('#prof-edit-btn').onclick = function() { renderProf(true); };
    }
  }
  renderProf(false);
  wrap.appendChild(prof);
  wrap.appendChild(tabBar('/profile', me));
  return wrap;
}

async function myPage(me) {
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;padding-bottom:64px;';

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  hdr.innerHTML = '<span style="font-size:13px;letter-spacing:.05em;">내 흔적</span>';
  wrap.appendChild(hdr);

  var now60m = Date.now() - 60000;
  var [postsRes, likesRes] = await Promise.all([
    SB.from('posts').select('*').eq('uid', me.uid).or('del.is.null,del.gt.'+now60m).order('at', { ascending: false }),
    SB.from('likes').select('post_id').eq('uid', me.uid)
  ]);
  var posts = postsRes.data || [];
  var likedSet = new Set((likesRes.data || []).map(function(l){ return l.post_id; }));

  // 테마 설정 섹션
  var themeOpts = [
    { key: 'light',  label: 'light',          svg: _SVG_SUN },
    { key: 'dark',   label: 'dark',            svg: _SVG_MOON },
    { key: 'system', label: 'system setting',  svg: _SVG_SYSTEM }
  ];
  var themeSec = document.createElement('div');
  themeSec.style.cssText = 'border-bottom:0.5px solid var(--border);padding:4px 0 6px;';
  var themeHdr = document.createElement('div');
  themeHdr.style.cssText = 'padding:10px 16px 4px;font-size:9px;color:var(--text-dim);letter-spacing:.12em;font-family:"JetBrains Mono",monospace;';
  themeHdr.textContent = 'THEME';
  themeSec.appendChild(themeHdr);

  function renderThemeRows() {
    var cur = S.theme();
    themeSec.querySelectorAll('.theme-opt-row').forEach(function(el){ el.remove(); });
    themeOpts.forEach(function(opt) {
      var row = document.createElement('button');
      row.className = 'theme-opt-row';
      row.style.cssText = 'display:flex;align-items:center;width:100%;background:none;border:none;padding:9px 16px;cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--text);gap:10px;text-align:left;transition:background .12s;';
      row.onmouseenter = function(){ row.style.background = 'var(--bg-elevated)'; };
      row.onmouseleave = function(){ row.style.background = 'none'; };

      var icon = document.createElement('span');
      icon.innerHTML = opt.svg;
      icon.style.cssText = 'display:flex;align-items:center;flex-shrink:0;';
      row.appendChild(icon);

      var lbl = document.createElement('span');
      lbl.textContent = opt.label;
      lbl.style.flex = '1';
      row.appendChild(lbl);

      if (cur === opt.key) {
        var chk = document.createElement('span');
        chk.textContent = '✓';
        chk.style.cssText = 'font-size:13px;color:var(--text-dim);';
        row.appendChild(chk);
      }

      row.onclick = function() {
        S.setTheme(opt.key);
        applyTheme(opt.key);
        renderThemeRows();
      };
      themeSec.appendChild(row);
    });
  }
  renderThemeRows();
  wrap.appendChild(themeSec);

  var tabLabel = document.createElement('div');
  tabLabel.style.cssText = 'padding:10px 16px;border-bottom:0.5px solid var(--border);font-size:11px;color:var(--text-muted);';
  tabLabel.textContent = '총 '+posts.length+'개';
  wrap.appendChild(tabLabel);

  if (posts.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:40px;color:var(--text-dim);font-size:11px;';
    empty.textContent = '아직 남긴 흔적이 없어요.';
    wrap.appendChild(empty);
  } else {
    var indexWrapM = document.createElement('div');
    indexWrapM.className = 'feed-index-wrap';
    var totalM = posts.length;
    var myAvatarMap = {}; myAvatarMap[me.uid] = me.avatar_url || null;
    posts.forEach(function(p, i) {
      indexWrapM.appendChild(makeCard(p, me, totalM - i, likedSet, myAvatarMap));
    });
    wrap.appendChild(indexWrapM);
  }

  wrap.appendChild(tabBar('/my', me));
  return wrap;
}

// ── 시작 ────────────────────────────────────────────────────────────
applyTheme(S.theme());
R.render();

</script>

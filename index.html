<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>gitmark</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1E3932">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="gitmark">
  <link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── 라이트 — Starbucks ─────────────────────────────────────── */
    :root {
      --paper:      #ffffff;
      --bg:         #f9f9f9;
      --bg-surface: #edebe9;
      --bg-elevated:#f9f9f9;
      --border:     #e0ddd7;
      --border-sub: #e8e5df;
      --accent:     #00754A;
      --rail:       #006241;
      --text:       #1a1a1a;
      --text-muted: #696969;
      --text-dim:   #a0a0a0;
      --text-body:  #2d2d2d;
      --text-faint: #c0bcb8;
      /* 피드 카드 전용 (라이트에서는 일반 톤과 동일) */
      --card-paper:      var(--paper);
      --card-border:     var(--border);
      --card-surface:    var(--bg-surface);
      --card-text-muted: var(--text-muted);
      --card-text-dim:   var(--text-dim);
      --card-text-body:  var(--text-body);
      --card-text-faint: var(--text-faint);
    }
    /* ── 다크 — 일반 UI는 다크 그레이, 피드 카드만 House Green 유지 ──── */
    body.dark {
      --paper:      #1c1c1c;
      --bg:         #121212;
      --bg-surface: #262626;
      --bg-elevated:#2a2a2a;
      --border:     #3a3a3a;
      --border-sub: #2e2e2e;
      --accent:     #00754A;
      --rail:       #d4e9e2;
      --text:       #ffffff;
      --text-muted: #a8a8a8;
      --text-dim:   #707070;
      --text-body:  #e5e5e5;
      --text-faint: #555555;
      /* 피드 카드 전용: 기존 다크 그린 톤 유지 */
      --card-paper:      #1E3932;
      --card-border:     #3a5c52;
      --card-surface:    #263d34;
      --card-text-muted: #b3d4c8;
      --card-text-dim:   #6a9e8e;
      --card-text-body:  #e8f5f0;
      --card-text-faint: #4a7a6a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      font-size: 13px;
      min-height: 100vh;
      transition: background .2s, color .2s;
    }
    /* 본문 전용 폰트: 한글 Noto Sans KR, 영문 Inter */
    .body-font {
      font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
      font-weight: 400;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(0,98,65,.10) 1.1px, transparent 1.1px);
      background-size: 19px 19px;
    }
    #app {
      max-width: 680px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative; z-index: 1;
    }
    @media (min-width: 768px) {
      #app {
        max-width: 1200px;
        margin-left: max(108px, calc((100vw - 1200px) / 2));
        margin-right: auto;
      }
    }
    input, textarea, button {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
    }
    ::-webkit-scrollbar { width: 0; }
    .screen { animation: fi .12s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }

    /* 피드 → 상세 등 라우트 전환 (View Transitions API 지원 브라우저) */
    ::view-transition-old(root) {
      animation: vt-out .32s cubic-bezier(.4,0,.2,1) both;
    }
    ::view-transition-new(root) {
      animation: vt-in .38s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes vt-out { to { opacity: 0; transform: scale(.97); } }
    @keyframes vt-in { from { opacity: 0; transform: scale(1.03) translateY(6px); } }
    .btn-ghost {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 11px; padding: 0;
      transition: color .15s;
    }
    .btn-ghost:hover { color: var(--text); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }
    .input-field {
      width: 100%; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 9px 12px; font-size: 13px;
      color: var(--text); outline: none;
      transition: border-color .15s;
    }
    .input-field:focus { border-color: var(--text-muted); }
    .input-field::placeholder { color: var(--text-dim); }
    .tab-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 680px;
      background: var(--paper); border-top: 1px solid var(--border);
      display: flex; z-index: 20;
      transition: transform .25s ease, opacity .25s ease;
    }
    .tab-bar.hide-bar {
      transform: translateX(-50%) translateY(100%);
      opacity: 0; pointer-events: none;
    }
    .tab-bar button {
      flex: 1; padding: 9px 0 11px;
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: var(--text-muted);
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      transition: color .15s;
    }
    .tab-bar button i { font-size: 16px; line-height: 1; }
    .tab-bar button span { font-size: 10px; font-weight: 500; }
    @media (min-width: 768px) {
      .tab-bar {
        bottom: auto; top: 50%;
        left: 20px; transform: translateY(-50%);
        flex-direction: column;
        border-radius: 20px; border: 1px solid var(--border);
        width: 72px; padding: 6px 4px; gap: 2px; max-width: none;
      }
      .tab-bar button { padding: 12px 8px; border-radius: 14px; width: 100%; }
      .tab-hidden { display: flex !important; }
      .feed-tab-switcher { display: none !important; }
    }
    .sticky-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--paper); border-bottom: 1px solid var(--rail);
      padding: 14px 16px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .logo-tagline {
      display: -webkit-box;
      font: 400 9px 'JetBrains Mono', monospace;
      color: var(--text-muted);
      margin-left: 8px; padding-left: 8px;
      border-left: 1px solid var(--border);
      line-height: 1.3;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      max-width: 30vw;
      flex-shrink: 1;
    }
    @media (min-width: 768px) {
      .logo-tagline {
        display: inline-block;
        font-size: 12px;
        margin-left: 10px; padding-left: 10px;
        max-width: none;
        white-space: nowrap;
      }
    }
    /* 피드 전용: 두 헤더를 묶는 fixed 래퍼 */
    .feed-hdr-wrap {
      position: fixed; top: 0; z-index: 20;
      left: 0; right: 0;
      background: var(--paper);
    }
    @media (min-width: 768px) {
      .feed-hdr-wrap {
        left: max(108px, calc((100vw - 1200px) / 2));
        right: auto;
        width: min(1200px, calc(100vw - max(108px, calc((100vw - 1200px) / 2))));
      }
    }
    .feed-fixed-hdr { position: static !important; }
    .write-pill {
      font-size: 13px; font-weight: 700;
      color: #ffffff;
      background: #1E3932;
      border: none;
      border-radius: 100px; padding: 6px 16px; cursor: pointer;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      transition: opacity .15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .write-pill:hover { opacity: .85; }
    .edit-pill {
      font-size: 10px; color: var(--text-dim);
      background: none; border: 0.5px solid var(--border);
      border-radius: 20px; padding: 2px 8px; cursor: pointer;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      transition: border-color .15s, color .15s;
    }
    .edit-pill:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── 커스텀 모달 ─────────────────────────────────────────────── */
    .gm-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .gm-dialog {
      background: var(--bg-surface);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 24px 20px 18px;
      width: 100%; max-width: 300px;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
    }
    .gm-msg {
      font-size: 13px; color: var(--text-body);
      line-height: 1.6; margin-bottom: 18px; text-align: center;
    }
    .gm-btns { display: flex; gap: 8px; }
    .gm-btn {
      flex: 1; padding: 9px; border-radius: 8px; cursor: pointer;
      font-size: 12px; font-family: 'Inter', 'Noto Sans KR', sans-serif;
      border: 0.5px solid var(--border); transition: opacity .15s;
    }
    .gm-btn:hover { opacity: .8; }
    .gm-btn-cancel { background: var(--bg-elevated); color: var(--text-muted); }
    .gm-btn-confirm { background: var(--text); color: var(--bg); }
    .avatar {
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 500; flex-shrink: 0;
    }
    .like-btn {
      cursor: pointer; display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-family: 'Inter', 'Noto Sans KR', sans-serif;
      padding: 3px 10px; border-radius: 20px;
      border: 0.5px solid var(--border);
      background: var(--bg-elevated);
      transition: color .15s, border-color .15s, background .15s;
    }
    .like-btn.liked { color: var(--accent); border-color: var(--accent); background: rgba(0,117,74,.08); }

    /* ── 새 카드 스타일 ─────────────────────────────────────────── */
    .gcard {
      background: var(--card-paper);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      position: relative;
      box-shadow: 0 0 0.5px rgba(0,0,0,.14), 0 1px 1px rgba(0,0,0,.24);
      cursor: pointer;
      transition: box-shadow .15s;
    }
    .gcard:hover { box-shadow: 0 0 1px rgba(0,0,0,.14), 0 2px 4px rgba(0,0,0,.24); }
    .gcard.lnk { border-top: 3px solid var(--text); }
    .gcard .gnode {
      position: absolute; right: -22px; left: auto; top: 22px;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--rail); z-index: 3;
    }
    /* 모바일 link 탭: 닷 좌측 */
    .branch-row.info .gcard .gnode { right: auto; left: -22px; }
    .gc-body { padding: 14px 15px 12px; }
    .gc-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .gc-av { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font: 700 11px 'JetBrains Mono',monospace; color: #fff; flex-shrink: 0; }
    .gc-meta { display: flex; flex-direction: column; gap: 1px; }
    .gc-who { font: 700 12.5px 'JetBrains Mono',monospace; color: var(--text); }
    .gc-ago { font: 400 10.5px 'JetBrains Mono',monospace; color: var(--card-text-muted); }
    .gc-cas { font: 400 15px/1.6 'Inter','Noto Sans KR',sans-serif; color: var(--text); margin: 0; white-space: pre-line; word-break: break-word; }
    .gc-txt { font: 400 15px/1.6 'Inter','Noto Sans KR',sans-serif; color: var(--text); margin: 0; word-break: break-word; }
    .gc-link-url { display: block; font: 500 12px 'JetBrains Mono',monospace; color: var(--card-text-muted); text-decoration: underline; margin: 8px 0 0; word-break: break-all; }
    .gc-foot { display: flex; align-items: center; padding: 7px 10px; border-top: 1px solid var(--card-border); gap: 4px; }
    .gc-foot-spacer { flex: 1; }
    .gc-icon-btn { cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-size: 13.8px; font-family: 'Inter','Noto Sans KR',sans-serif; padding: 4px 9px; border-radius: 100px; border: 1px solid transparent; background: transparent; color: var(--card-text-muted); transition: all .15s; }
    .gc-icon-btn:hover { background: var(--card-surface); }
    .gc-like-btn { cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-size: 13.8px; font-family: 'Inter','Noto Sans KR',sans-serif; padding: 4px 9px; border-radius: 100px; border: 1px solid transparent; background: transparent; color: var(--card-text-muted); transition: all .15s; }
    .gc-like-btn:hover { background: var(--card-surface); }
    .gc-like-btn.liked { color: var(--accent); background: rgba(0,117,74,.10); border-color: rgba(0,117,74,.28); }
    /* URL tab above link card */
    .gurl-tab { font: 500 10.5px 'JetBrains Mono',monospace; color: var(--card-text-muted); background: var(--card-surface); border: 1px solid var(--card-border); border-bottom: none; border-radius: 9px 9px 0 0; padding: 4px 12px; margin-left: 16px; display: inline-block; max-width: 78%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
    .gurl-tab:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .gcard-wrap { display: flex; flex-direction: column; align-items: flex-start; }
    .del-btn { background: none; border: none; cursor: pointer; padding: 0; font-size: 11px; color: var(--text-dim); transition: color .15s; }
    .del-btn:hover { color: #f87171; }
    textarea { resize: none; background: transparent; border: none; outline: none; color: var(--text); width: 100%; line-height: 1.7; }

    /* ── 인덱스 피드 레이아웃 ───────────────────────────────────── */
    .feed-index-wrap {
      padding: 20px 20px 0 20px;
      position: relative;
    }
    .feed-index-wrap::before {
      content: ''; position: absolute; left: 48px; top: 26px; bottom: 26px;
      border-left: 1px solid var(--rail); z-index: 0;
    }
    .card-row {
      display: flex; align-items: flex-start;
      gap: 24px; margin-bottom: 10px;
      position: relative; z-index: 1;
    }
    .card-idx {
      font-size: 11px; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      min-width: 16px; text-align: right;
      padding-top: 22px; flex-shrink: 0;
      user-select: none;
    }
    .card-tile-wrap { flex: 1; min-width: 0; }
    .card-row .gcard .gnode { left: -16px; right: auto; }
    /* 내 글 피드: dot↔카드 연결 가로선 */
    .card-row .gcard::after {
      content: ''; position: absolute; top: 26px; left: -16px;
      width: 12px; border-top: 1px solid var(--rail);
    }

    .tile {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s;
    }
    .tile:hover { transform: translateX(2px); }

    /* 상단 헤더: 내용 + 시간 */
    .tile-head {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      padding: 14px 16px 12px;
    }
    .tile-txt {
      font-size: 14px; font-weight: 500;
      color: var(--text-body); line-height: 1.7;
      word-break: break-word; flex: 1;
    }
    .tile-since {
      font-size: 11px; color: var(--text-dim);
      white-space: nowrap; flex-shrink: 0;
      margin-top: 2px;
    }

    /* 하단 메타 영역: 흰 배경 */
    .tile-rows {
      background: var(--bg-surface);
      border-top: 0.5px solid var(--border);
    }
    .tile-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      font-size: 12px; color: var(--text-muted);
      flex-wrap: wrap;
    }
    .tile-row-icon {
      width: 20px; flex-shrink: 0; font-size: 13px;
      color: var(--text-dim); text-align: center;
    }
    .tile-row-val {
      display: flex; align-items: center; gap: 6px; flex: 1;
      color: var(--text);
    }
    .tile-sep { color: var(--border-sub); font-size: 10px; }

    /* 삭제된 카드 */
    .tile-del-head {
      padding: 11px 14px 9px;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-dim);
    }
    .tile-del-sub { font-size: 10px; font-style: italic; }
    .tile-del-rows {
      background: var(--bg-surface);
      border-top: 0.5px solid var(--border);
      padding: 7px 14px;
      font-size: 10px; color: var(--text-dim); font-style: italic;
    }

    /* ── 테마 토글 버튼 ─────────────────────────────────────────── */

    /* ── 분기 타임라인 피드 ──────────────────────────────────── */
    .feed-branch-header {
      display: flex; position: relative;
      background: var(--paper);
      border-bottom: 1px solid #006241;
      font-size: 13px; font-weight: 700; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .feed-branch-header::before {
      content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
      border-left: 1px solid #006241; pointer-events: none;
    }
    .s-hl { background: var(--text); color: var(--bg); border-radius: 2px; padding: 0 1px; }
    .fbh-left  { flex: 1; padding: 13px 16px; text-align: right; }
    .fbh-sep   { display: none; }
    .fbh-right { flex: 1; padding: 13px 16px; }
    .feed-branch-wrap {
      position: relative; padding: 16px 0 16px;
      margin: 8px 0 90px;
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }
    .feed-branch-wrap::before {
      content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
      border-left: 1px solid #006241; pointer-events: none; z-index: 0;
    }
    .feed-branch-wrap.tab-link-active::before { left: auto; right: 5px; border-left: none; border-right: 2px solid #006241; }
    .branch-row {
      display: flex; margin-bottom: 15px; position: relative; z-index: 1;
    }
    .branch-row.casual {
      justify-content: flex-start;
      padding-left: 10px; padding-right: calc(50% + 6px);
    }
    .branch-row.info {
      justify-content: flex-end;
      padding-right: 10px; padding-left: calc(50% + 6px);
    }
    /* 모바일: dot↔카드 연결 가로선 */
    .branch-row.casual .gcard::after {
      content: ''; position: absolute; top: 26px; right: -13px;
      width: 13px; border-top: 1px solid var(--rail);
    }
    .branch-row.info .gcard::after {
      content: ''; position: absolute; top: 26px; left: -13px;
      width: 13px; border-top: 1px solid var(--rail);
    }
    /* 데스크탑: casual 닷 우측(중앙 방향), info 닷 좌측(중앙 방향) */
    @media (min-width: 768px) {
      .branch-row.casual .gcard .gnode { left: auto; right: -30px; top: 22px; }
      .branch-row.info   .gcard .gnode { left: -30px; right: auto; top: 22px; }
      .branch-row.casual .gcard::after {
        content: ''; position: absolute; top: 26px; left: auto; right: -26px;
        width: 26px; border-top: 2px solid var(--rail);
      }
      .branch-row.info .gcard::after {
        content: ''; position: absolute; top: 26px; right: auto; left: -26px;
        width: 26px; border-top: 2px solid var(--rail);
      }
    }
    .branch-tile-wrap { flex: 1; min-width: 0; }
    .tile.info-tile { border-color: var(--border-sub); }
    /* ── 모바일 피드 탭 스타일 ──────────────────────────────── */
    .feed-tab-switcher { display: none; }
    .feed-tab-btn {
      flex: 1; padding: 14px 0;
      background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 600; color: var(--text-muted);
      transition: color .15s, border-color .15s;
    }
    .feed-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    @media (max-width: 767px) {
      .feed-branch-wrap { border: none; border-radius: 0; margin: 0 0 90px; }
      .feed-tab-switcher {
        display: flex;
        background: var(--paper);
        border-bottom: 1px solid var(--border);
      }
      .feed-branch-header { display: none; }
      .feed-branch-wrap::before {
        left: auto; right: 5px; border-left: none; border-right: 2px solid #006241;
      }
      .feed-branch-wrap.tab-link-active::before { left: 5px; right: auto; border-right: none; border-left: 2px solid #006241; }
      .branch-row.casual {
        padding-left: 10px; padding-right: 28px;
      }
      .branch-row.casual::before { left: auto; right: 14px; }
      .branch-row.info {

// ── 상수 ────────────────────────────────────────────────────────────
var MAX = 500;
var SURNAMES = ['김','이','박','최','정','강','조','윤','장','임','한','오','서','신','권','황','안','송','류','전','홍','고','문','양','손','배','백','허','유','남'];
var EN_NAMES = ['james','john','robert','michael','william','david','mary','patricia','jennifer','minho','junho','jinho','soyeon','minji','hyunji'];
// ── 유틸 ────────────────────────────────────────────────────────────
function mkId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function isPseudo(nick) {
  var t = nick.trim();
  if (/^[가-힣]{2,4}$/.test(t) && SURNAMES.indexOf(t[0]) >= 0) return true;
  if (EN_NAMES.indexOf(t.toLowerCase()) >= 0) return true;
  return false;
}

function nick2color(nick) {
  var h = 0;
  for (var i = 0; i < nick.length; i++) h = nick.charCodeAt(i) + ((h << 5) - h);
  var n = Math.abs(h);
  var l = 22 + (n % 32); // 22–53% lightness
  return {
    border: 'hsl(0,0%,' + l + '%)',
    tint:   'hsla(0,0%,' + l + '%,0.13)',
    avBg:   'hsl(0,0%,' + l + '%)',
    avText: l > 38 ? 'hsl(0,0%,8%)' : 'hsl(0,0%,92%)'
  };
}

function getInitial(nick) { return (nick || '?')[0].toUpperCase(); }

function relTime(ts) {
  var d = Date.now() - ts, s = Math.floor(d/1000), m = Math.floor(s/60), h = Math.floor(m/60), day = Math.floor(h/24);
  if (s < 60) return '방금 전';
  if (m < 60) return m + '분 전';
  if (h < 24) return h + '시간 전';
  if (day < 7) return day + '일 전';
  return new Date(ts).toLocaleDateString('ko-KR');
}

function absTime(ts) {
  return new Date(ts).toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\n/g,'<br>'); }
// textarea 내용 등 줄바꿈을 그대로 유지해야 하는 곳에서 사용 (esc처럼 <br> 변환하지 않음)
function escText(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Tabler 웹폰트에는 filled 하트가 없어, liked 상태는 직접 그린 SVG로 표시

function urlBase64ToUint8Array(base64String) {
  var padding = '='.repeat((4 - base64String.length % 4) % 4);
  var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  var raw = atob(base64);
  var out = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);

}

  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return null;

}

async function subscribeToPush(uid) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return false;
  var permission = await Notification.requestPermission();
  if (permission !== 'granted') return false;
  var reg = await navigator.serviceWorker.ready;
  var sub = await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
  });
  var json = sub.toJSON();
  await SB.from('push_subscriptions').upsert({
    uid: uid, endpoint: json.endpoint, p256dh: json.keys.p256dh, auth: json.keys.auth
  }, { onConflict: 'uid,endpoint' });
  return true;
}

async function unsubscribeFromPush(uid) {
  var sub = await getPushSubscription();
  if (!sub) return;
  var endpoint = sub.endpoint;
  await sub.unsubscribe();
  await SB.from('push_subscriptions').delete().eq('uid', uid).eq('endpoint', endpoint);

      updates.nick = meta.full_name || meta.name || ('객' + Math.floor(Math.random() * 9000 + 1000));
      updates.pseudo = false;
    }
    if (Object.keys(updates).length) {
      await SB.from('profiles').update(updates).eq('id', user.id);
      Object.assign(data, updates);
    }
    return data;
  }
  var nick = meta.full_name || meta.name || ('객' + Math.floor(Math.random() * 9000 + 1000));
  var profile = { id: user.id, email: user.email || '', nick: nick, pseudo: false, avatar_url: avatarUrl };

  return profile;
}

// A: 잉크 방울 전환 — 탭한 지점에서 잉크가 번지며 화면 전환
function inkTransition(x, y, cb) {
  // prefers-reduced-motion 또는 클립패스 미지원 시 즉시 이동
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    cb(); return;
  }
  var ov = document.createElement('div');
  ov.className = 'ink-overlay';
  ov.style.clipPath = 'circle(0% at '+x+'px '+y+'px)';
  document.body.appendChild(ov);
  ov.getBoundingClientRect(); // force reflow
  ov.style.clipPath = 'circle(200% at '+x+'px '+y+'px)';
  var fired = false;
  function finish() {
    if (fired) return; fired = true;
    cb();
    setTimeout(function() {
      ov.style.transition = 'opacity .25s ease';
      ov.style.opacity = '0';
      setTimeout(function(){ if(ov.parentNode) document.body.removeChild(ov); }, 280);
    }, 30);
  }
  ov.addEventListener('transitionend', finish, {once:true});
  setTimeout(finish, 600); // 폴백: transitionend 미발화 시 강제 진행
}

// View Transitions API 지원 브라우저는 그쪽 전환에 맡기고(중복 연출 방지),
// 미지원 브라우저에서만 잉크 리플로 대체
function navigateWithTransition(x, y, path) {
  if (document.startViewTransition) {
    R.go(path);
  } else {
    inkTransition(x, y, function() { R.go(path); });
  }
}

function scatterAndDelete(tile, onDone) {
  var txtEl = tile.querySelector('.tile-txt');
  if (!txtEl) { onDone(); return; }
  var txt = txtEl.textContent || '';
  txtEl.style.overflow = 'visible';
  txtEl.style.webkitLineClamp = 'unset';
  txtEl.style.display = 'block';
  var spans = txt.split('').map(function(ch) {
    var s = document.createElement('span');
    s.textContent = ch;
    s.style.display = 'inline-block';
    s.style.transition = 'transform .65s ease, opacity .65s ease';
    return s;
  });
  txtEl.innerHTML = '';
  spans.forEach(function(s){ txtEl.appendChild(s); });
  requestAnimationFrame(function() {
    spans.forEach(function(s) {
      var dx = (Math.random()-0.5)*300;
      var dy = (Math.random()-0.5)*200;
      var rot = (Math.random()-0.5)*640;
      s.style.transform = 'translate('+dx+'px,'+dy+'px) rotate('+rot+'deg)';
      s.style.opacity = '0';
    });
    setTimeout(onDone, 750);
  });
}

// 모바일 스크롤 시 하단 바 자동 hide/show
(function() {
  var lastY = 0, ticking = false;
  window.addEventListener('scroll', function() {
    if (window.innerWidth >= 768) return;
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(function() {
      var y = window.pageYOffset;
      var bar = document.querySelector('.tab-bar');
      if (bar) bar.classList.toggle('hide-bar', y > lastY && y > 60);
      lastY = y;
      ticking = false;
    });
  }, {passive: true});
})();

// ── 라우터 (해시 기반) ───────────────────────────────────────────────
var R = {
  path: function() { return location.hash.replace(/^#/,'') || '/'; },
  go: function(p) { location.hash = p; },
  render: async function() {
    stopOpacityLoop();
    var app = document.getElementById('app');
    if (!app) return;

    // 첫 로드 시에만 로딩 표시
    if (!_cachedMe) {
      app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-dim);font-family:\'Inter\',\'Noto Sans KR\',sans-serif;font-size:11px;">loading…</div>';
    }

    if (!_cachedMe) {
      var { data: { session } } = await SB.auth.getSession();
      if (!session) { app.innerHTML = ''; app.appendChild(authPage()); return; }
      var profile = await getOrCreateProfile(session.user);
      var meta = session.user.user_metadata || {};
      _cachedMe = {
        uid: session.user.id,
        nick: profile.nick,
        pseudo: profile.pseudo,
        avatar_url: meta.avatar_url || meta.picture || null,
        google_name: meta.full_name || meta.name || null,
        email: session.user.email || null
      };
    }

    var me = _cachedMe;
    var p = R.path();
    var newPage;
    if (p === '/write') newPage = writePage(me);
    else if (p.indexOf('/post/') === 0) newPage = await detailPage(p.slice(6), me);
    else if (p === '/my') newPage = await myPage(me);
    else if (p === '/profile') newPage = await profilePage(me);
    else newPage = await feedPage(me);

    // 콘텐츠가 준비된 후에만 화면 교체
    app.innerHTML = '';
    app.appendChild(newPage);
  }
};
window.addEventListener('hashchange', function() {
  if (document.startViewTransition) {
    document.startViewTransition(function() { return R.render(); });
  } else {
    R.render();
  }
});
SB.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_OUT') { _cachedMe = null; R.render(); return; }
  if (event === 'SIGNED_IN') {
    // 탭 복귀 등으로 토큰이 갱신되며 같은 사용자에 대해 재발생하는 경우,
    // 화면을 초기화하지 않아 보고 있던 페이지(예: 상세)가 로딩으로 되돌아가지 않게 함
    if (_cachedMe && session && session.user && session.user.id === _cachedMe.uid) return;
    _cachedMe = null;
    R.render();
  }
});

      S.setMe(found); R.go('/');
    }

}

  [898,  361, 394, 221],  // 2: 달리는

  [2940, 423, 283, 167],  // 7: 잠자는

  [127,  778, 240, 226],  // 9: 앉아있는 v2
  [898,  784, 394, 220],  // 10: 달리는 v2
  [1339, 633, 337, 249],  // 11: 점프하는 v2
  [2121, 797, 311, 208],  // 12: 그루밍 v2
  [2901, 764, 345, 240],  // 13: 잠자는 v2
];
var CAT_MAX_H = 52, CAT_MAX_W = 84;
var catSpriteImg = (function() { var img = new Image(); img.src = 'assets/cat-sprites.png'; return img; })();
function catSpriteSize(i) {
  var sp = CAT_SPRITES[i], sc = Math.min(CAT_MAX_H / sp[3], CAT_MAX_W / sp[2]);
  return { w: Math.round(sp[2] * sc), h: Math.round(sp[3] * sc) };
}
function catDraw(ctx, spriteIdx, dx, dy, mirror, alpha) {
  var sp = CAT_SPRITES[spriteIdx], sz = catSpriteSize(spriteIdx);
  ctx.save();
  ctx.globalAlpha = alpha;
  if (mirror) {
    ctx.translate(dx + sz.w, dy);
    ctx.scale(-1, 1);
    ctx.drawImage(catSpriteImg, sp[0], sp[1], sp[2], sp[3], 0, 0, sz.w, sz.h);
  } else {
    ctx.drawImage(catSpriteImg, sp[0], sp[1], sp[2], sp[3], dx, dy, sz.w, sz.h);
  }
  ctx.restore();
}
function catPickN(n, total, exclude) {
  var pool = [];
  for (var i = 0; i < total; i++) if (exclude.indexOf(i) < 0) pool.push(i);
  var result = [];
  while (result.length < n && pool.length) {
    var ri = Math.floor(Math.random() * pool.length);
    result.push(pool.splice(ri, 1)[0]);
  }
  return result;
}

    var tagSuggestBox = document.createElement('div');
    tagSuggestBox.style.cssText = 'display:none;border-top:1px solid var(--border-sub);max-height:220px;overflow-y:auto;';
    searchWrap.appendChild(tagSuggestBox);
    _searchWrap = searchWrap;
    hdr.style.position = 'relative';
    hdr.appendChild(searchWrap);
    searchBarEl.focus();

    // 해시태그 검색 (# 로 시작하면 태그 자동완성 목록 표시)
    function renderTagSuggest(prefix) {
      var tagCounts = {};
      posts.forEach(function(p) {
        (p.tags || []).forEach(function(t) {
          if (!prefix || t.indexOf(prefix) === 0) tagCounts[t] = (tagCounts[t] || 0) + 1;
        });
      });
      var tags = Object.keys(tagCounts).sort(function(a, b) { return tagCounts[b] - tagCounts[a]; }).slice(0, 8);
      if (tags.length === 0) {
        tagSuggestBox.style.display = 'block';
        tagSuggestBox.innerHTML = '<div style="padding:10px 14px;font-size:11px;color:var(--text-dim);">일치하는 해시태그가 없어요.</div>';
        return;
      }
      tagSuggestBox.style.display = 'block';
      tagSuggestBox.innerHTML = tags.map(function(t) {
        return '<button class="tag-suggest-row" data-tag="'+esc(t)+'" style="display:flex;align-items:center;width:100%;padding:9px 14px;background:none;border:none;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:12px;color:var(--accent);text-align:left;gap:8px;">'
          + '<span style="flex:1;">#'+esc(t)+'</span>'
          + '<span style="font-size:10px;color:var(--text-dim);">'+tagCounts[t]+'</span>'
          + '</button>';
      }).join('');
      tagSuggestBox.querySelectorAll('.tag-suggest-row').forEach(function(row) {
        row.onmouseenter = function() { row.style.background = 'var(--bg-surface)'; };
        row.onmouseleave = function() { row.style.background = 'none'; };
        row.onclick = function() {
          _setTagFilter(row.dataset.tag);
          _closeSearch();
        };
      });
    }
    _searchOutsideHandler = function(e) {
      if (!searchWrap.contains(e.target) && e.target !== searchBtn && !searchBtn.contains(e.target)) {
        _closeSearch();
      }
    };
    setTimeout(function() { document.addEventListener('pointerdown', _searchOutsideHandler, true); }, 0);
    function hlApply(container, q) {
      // 기존 하이라이트 제거 후 normalize로 분리된 텍스트 노드 병합
      container.querySelectorAll('.s-hl').forEach(function(el) {
        el.parentNode.replaceChild(document.createTextNode(el.textContent), el);
      });
      container.normalize();
      if (!q) return;
      var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
        acceptNode: function(n) {
          var tag = n.parentNode.nodeName;
          return (tag === 'SCRIPT' || tag === 'STYLE') ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT;
        }
      });
      var nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(function(node) {
        if (!node.textContent.toLowerCase().includes(q)) return;
        var span = document.createElement('span');
        span.innerHTML = node.textContent.replace(re, '<mark class="s-hl">$1</mark>');
        node.parentNode.replaceChild(span, node);
      });
    }
    var _searchComposing = false;
    searchBarEl.addEventListener('compositionstart', function() { _searchComposing = true; });
    searchBarEl.addEventListener('compositionend', function() {
      _searchComposing = false;
      searchBarEl.dispatchEvent(new Event('input'));
    });
    searchBarEl.oninput = function(e) {
      if (_searchComposing) return;
      var raw = searchBarEl.value.trim().toLowerCase();
      if (raw.indexOf('#') === 0) {
        tagSuggestBox.style.display = 'block';
        if (indexWrap) indexWrap.querySelectorAll('.branch-row').forEach(function(r) { r.style.display = ''; });
        renderTagSuggest(raw.slice(1));
        return;
      }
      tagSuggestBox.style.display = 'none';
      var q = raw;
      if (!indexWrap) return;
      indexWrap.querySelectorAll('.branch-row').forEach(function(r) {
        var txt = r.innerText.toLowerCase();
        var show = !q || txt.includes(q);
        r.style.display = show ? '' : 'none';
        if (show) hlApply(r, q);
        else r.querySelectorAll('.s-hl').forEach(function(el) {
          el.parentNode.replaceChild(document.createTextNode(el.textContent), el);
        });
      });
    };
    searchBarEl.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { _closeSearch(); return; }
      if (e.key === 'Enter') {
        var q = searchBarEl.value.trim().toLowerCase();
        if (q.indexOf('#') === 0 && q.length > 1) {
          _setTagFilter(q.slice(1));
          _closeSearch();
        }
      }
    });
  };
  hdrActions.appendChild(searchBtn);
  hdr.appendChild(hdrActions);

  // 두 헤더를 하나의 fixed 래퍼로 묶기 (나중에 colHdr도 여기에 추가됨)
  var feedHdrWrap = document.createElement('div');
  feedHdrWrap.className = 'feed-hdr-wrap';
  feedHdrWrap.appendChild(hdr);
  wrap.appendChild(feedHdrWrap);

  var now60 = Date.now() - 60000;
  var [postsRes, likesRes] = await Promise.all([
    SB.from('posts').select('*, _cmt:comments(count)').or('del.is.null,del.gt.'+now60).order('at', { ascending: false }).limit(100),
    SB.from('likes').select('post_id').eq('uid', me.uid)
  ]);
  var posts = postsRes.data || [];
  var likedSet = new Set((likesRes.data || []).map(function(l){ return l.post_id; }));
  var uids = [...new Set(posts.map(function(p){ return p.uid; }))];
  var avatarMap = {};
  if (uids.length) {
    var { data: profs } = await SB.rpc('get_public_profiles', { user_ids: uids });
    (profs || []).forEach(function(p){ if (p.avatar_url) avatarMap[p.id] = p.avatar_url; });
  }
  avatarMap[me.uid] = me.avatar_url || avatarMap[me.uid];

  if (posts.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:80px 20px;color:var(--text-dim);';
    empty.innerHTML = '<div style="margin-bottom:14px;">아직 아무도 다녀가지 않았어요.</div><button onclick="R.go(\'/write\')" style="font-size:11px;color:var(--text-muted);background:none;border:none;cursor:pointer;">첫 번째 흔적을 남겨보세요 →</button>';
    wrap.appendChild(empty);
  } else {
    var tabSwitcher = document.createElement('div');
    tabSwitcher.className = 'feed-tab-switcher';
    var btnCasual = document.createElement('button');
    btnCasual.className = 'feed-tab-btn active';
    btnCasual.textContent = 'casual mark';
    var btnLink = document.createElement('button');
    btnLink.className = 'feed-tab-btn';
    btnLink.textContent = 'link mark';
    tabSwitcher.appendChild(btnCasual);
    tabSwitcher.appendChild(btnLink);
    feedHdrWrap.appendChild(tabSwitcher);

    var colHdr = document.createElement('div');
    colHdr.className = 'feed-branch-header';
    colHdr.innerHTML = '<div class="fbh-left">casual mark ←</div><div class="fbh-sep"></div><div class="fbh-right">→ link mark</div>';
    feedHdrWrap.appendChild(colHdr);

    // 래퍼 높이만큼 콘텐츠 padding-top 동적 적용
    requestAnimationFrame(function() {
      wrap.style.paddingTop = feedHdrWrap.offsetHeight + 'px';
    });
    // 태그 필터 칩
    if (_activeTag) {
      var tagChip = document.createElement('div');
      tagChip.style.cssText = 'display:flex;align-items:center;gap:6px;padding:6px 16px;background:var(--bg);border-bottom:1px solid var(--border-sub);';
      tagChip.innerHTML = '<span style="font:600 12px \'JetBrains Mono\',monospace;color:var(--accent);">#'+esc(_activeTag)+'</span>'
        + '<span style="font-size:11px;color:var(--text-dim);">로 필터 중</span>'
        + '<button onclick="_setTagFilter(\''+esc(_activeTag)+'\')" style="margin-left:auto;font-size:11px;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:2px 6px;border-radius:4px;">✕ 해제</button>';
      feedHdrWrap.appendChild(tagChip);
      requestAnimationFrame(function() { wrap.style.paddingTop = feedHdrWrap.offsetHeight + 'px'; });
    }

    var filteredPosts = _activeTag
      ? posts.filter(function(p) { return (p.tags || []).indexOf(_activeTag) !== -1; })
      : posts;

    var indexWrap = document.createElement('div');
    indexWrap.className = 'feed-branch-wrap';

    // 고양이 픽셀아트 canvas (데스크탑 전용)
    var catCanvas = document.createElement('canvas');
    catCanvas.className = 'center-dot-art';
    catCanvas.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:1;cursor:pointer;';
    indexWrap.appendChild(catCanvas);

    if (filteredPosts.length === 0) {
      var noTag = document.createElement('div');
      noTag.style.cssText = 'text-align:center;padding:60px 20px;color:var(--text-dim);font-size:13px;';
      noTag.textContent = '#' + _activeTag + ' 태그가 달린 흔적이 없어요.';
      indexWrap.appendChild(noTag);
    }
    filteredPosts.forEach(function(post) {
      var card = makeCard(post, me, null, likedSet, avatarMap);
      if (card.classList.contains('info')) card.classList.add('tab-hidden');
      indexWrap.appendChild(card);
    });
    wrap.appendChild(indexWrap);


    var catEntries = [], catGroundLines = [];
    var CAT_ALPHA = 0.12;
    var CAT_RUN_FRAMES = [2, 10, 3, 10]; // 달리기 프레임 사이클
    var CAT_FRAME_MS  = 160;             // 프레임당 ms
    var CAT_SPEED_PXS = 52;             // 달리기 속도 (px/s)
    var CAT_RUN_DUR   = 2600;           // 달리기 지속 ms
    var catRafId = null, catLastT = 0, catAnyRunning = false;

    // DOM 삽입 후 실제 크기로 고양이 배치 (모바일 제외)
    requestAnimationFrame(function() {
      if (window.innerWidth < 768) return; // 모바일 미적용
      var W = indexWrap.offsetWidth, H = indexWrap.offsetHeight;
      if (!W || !H) return;
      catCanvas.width = W; catCanvas.height = H;
      var ctx = catCanvas.getContext('2d');
      var CX = W / 2;
      var usedPrev = [];
      var cardEls = indexWrap.querySelectorAll('.branch-row');

      cardEls.forEach(function(row) {
        var top = row.offsetTop, rH = row.offsetHeight;
        if (rH < 30) return;
        var isCasual = row.classList.contains('casual');
        // 카드 반대편 빈 공간만 사용 (피드 침범 방지)
        // casual(왼쪽 카드) → 오른쪽 빈 공간, info(오른쪽 카드) → 왼쪽 빈 공간
        var GAP = 14; // 중앙선·카드 경계 여백
        var emptyX = isCasual ? CX + GAP : GAP;
        var emptyW = isCasual ? W - CX - GAP * 2 : CX - GAP * 2;
        if (emptyW < 60) return;
        // 빈 공간을 3구역으로 나눠 랜덤 배치
        var subIdx = Math.floor(Math.random() * 3);
        var subW = Math.floor(emptyW / 3);
        var zoneX = emptyX + subIdx * subW;
        var zoneW = subW;
        var count = 1;
        var picked = catPickN(count, CAT_SPRITES.length, usedPrev.slice(-2));
        usedPrev = usedPrev.concat(picked).slice(-4);
        var maxSH = 0;
        picked.forEach(function(i){ maxSH = Math.max(maxSH, catSpriteSize(i).h); });
        var groundY = top + (rH - maxSH) / 2 + maxSH + 4;
        var totalW = 0;
        picked.forEach(function(i){ totalW += catSpriteSize(i).w; });
        var gap = Math.max(8, Math.min(20, (zoneW - totalW) / (picked.length + 1)));
        var curX = zoneX + Math.max(0, (zoneW - totalW - gap * (picked.length - 1)) / 2);
        catGroundLines.push({x: emptyX, y: groundY + 1, w: emptyW});
        picked.forEach(function(idx) {
          var sz = catSpriteSize(idx);
          var sW = sz.w, sH = sz.h;
          var sy = groundY - sH + (Math.random() - 0.5) * 8;
          catEntries.push({
            sceneIdx: idx, origX: Math.round(curX), origY: Math.round(sy),
            groundY: groundY, zoneX: emptyX, zoneW: emptyW, isCasual: isCasual, sW: sW, sH: sH
          });
          curX += sW + gap;
        });
      });

      // 각 고양이: 정적 포즈(staticIdx)와 달리기 상태 초기화
      catEntries.forEach(function(se) {
        se.staticIdx = se.sceneIdx;              // 원래 포즈 보존
        se.runX      = se.origX;                 // 현재 x (달리기 중 변경)
        se.runDir    = Math.random() < 0.5 ? 1 : -1;
        se.runPhase  = Math.random() * Math.PI * 2;
        se.frameTick = 0;
        se.frameIdx  = 0;
        se.running   = false;
        se.runEndT   = 0;
      });

      // 정적 그리기 (RAF 없이 1회)
      function catDrawStatic() {
        ctx.clearRect(0, 0, W, ctx.canvas.height);
        catGroundLines.forEach(function(gl) {
          ctx.fillStyle = 'rgba(0,98,65,0.06)';
          ctx.fillRect(gl.x, gl.y, gl.w, 1);
        });
        catEntries.forEach(function(se) {
          catDraw(ctx, se.staticIdx, se.origX, se.origY, false, CAT_ALPHA);
        });
      }
      catDrawStatic();

      // RAF 루프 — 달리는 고양이가 있을 때만 실행
      function catLoop(ts) {
        var dt = catLastT ? Math.min(ts - catLastT, 50) : 16;
        catLastT = ts;

        ctx.clearRect(0, 0, W, ctx.canvas.height);
        catGroundLines.forEach(function(gl) {
          ctx.fillStyle = 'rgba(0,98,65,0.06)';
          ctx.fillRect(gl.x, gl.y, gl.w, 1);
        });

        catAnyRunning = false;
        catEntries.forEach(function(se) {
          if (!se.running) {
            // 정적 포즈
            catDraw(ctx, se.staticIdx, se.origX, se.origY, false, CAT_ALPHA);
            return;
          }
          // 달리기 종료 체크
          if (Date.now() >= se.runEndT) {
            se.running = false;
            se.runX = se.origX;
            catDraw(ctx, se.staticIdx, se.origX, se.origY, false, CAT_ALPHA);
            return;
          }
          catAnyRunning = true;

          // 위치 · 바운스 업데이트
          se.runX += se.runDir * CAT_SPEED_PXS * dt / 1000;
          se.runPhase += dt / 1000 * Math.PI * 4;

          // 프레임 사이클
          se.frameTick += dt;
          if (se.frameTick >= CAT_FRAME_MS) {
            se.frameTick -= CAT_FRAME_MS;
            se.frameIdx = (se.frameIdx + 1) % CAT_RUN_FRAMES.length;
            se.sceneIdx = CAT_RUN_FRAMES[se.frameIdx];
            var sz = catSpriteSize(se.sceneIdx);
            se.sW = sz.w; se.sH = sz.h;
          }

          // 경계 반전
          var minX = se.zoneX, maxX = se.zoneX + se.zoneW - se.sW;
          if (se.runX <= minX) { se.runX = minX; se.runDir = 1; }
          if (se.runX >= maxX) { se.runX = maxX; se.runDir = -1; }

          var dy = Math.round(-Math.abs(Math.sin(se.runPhase)) * 5);
          catDraw(ctx, se.sceneIdx, Math.round(se.runX), se.origY + dy, se.runDir < 0, CAT_ALPHA);
        });

        if (catAnyRunning) requestAnimationFrame(catLoop);
        else { catRafId = null; catLastT = 0; }
      }

      function catStartRun(se) {
        var sz = catSpriteSize(CAT_RUN_FRAMES[0]);
        se.sceneIdx  = CAT_RUN_FRAMES[0];
        se.sW = sz.w; se.sH = sz.h;
        se.frameIdx  = 0;
        se.frameTick = 0;
        se.runPhase  = 0;
        se.runX      = se.origX;
        se.runEndT   = Date.now() + CAT_RUN_DUR;
        se.running   = true;
        if (!catRafId) {
          catLastT = 0;
          catRafId = requestAnimationFrame(catLoop);
        }
      }

      // 클릭/터치 — 정적 origX 기준 히트 판정
      function catHandleInteract(mx, my) {
        var wrapRect = indexWrap.getBoundingClientRect();
        var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        var cx = mx - wrapRect.left;
        var cy = my + scrollTop - (wrapRect.top + scrollTop);
        var hit = null;
        catEntries.forEach(function(se) {
          var hx = se.running ? Math.round(se.runX) : se.origX;
          if (!hit &&
              cx >= hx - 8 && cx <= hx + se.sW + 8 &&
              cy >= se.origY - 8 && cy <= se.origY + se.sH + 8) {
            hit = se;
          }
        });
        if (!hit) return;
        // 클릭된 고양이 즉시 달리기
        catStartRun(hit);
        // 주변 고양이들도 시간차로 달리기
        var others = catEntries.filter(function(se){ return se !== hit && !se.running; });
        others.sort(function(){ return Math.random() - 0.5; });
        var ripple = Math.min(Math.floor(Math.random() * 2) + 1, others.length);
        for (var i = 0; i < ripple; i++) {
          (function(target, delay) {
            setTimeout(function() { catStartRun(target); }, delay);
          })(others[i], 300 + i * (200 + Math.random() * 200));
        }
      }

      indexWrap.addEventListener('click', function(e) {
        catHandleInteract(e.clientX, e.clientY);
      });
      indexWrap.addEventListener('touchstart', function(e) {
        var t = e.touches[0];
        catHandleInteract(t.clientX, t.clientY);
      }, {passive: true});
    });

    btnCasual.onclick = function() {
      _feedTab = 'casual';
      btnCasual.classList.add('active'); btnLink.classList.remove('active');
      indexWrap.classList.remove('tab-link-active');
      indexWrap.querySelectorAll('.branch-row.info').forEach(function(r){ r.classList.add('tab-hidden'); });
      indexWrap.querySelectorAll('.branch-row.casual').forEach(function(r){ r.classList.remove('tab-hidden'); });
    };
    btnLink.onclick = function() {
      _feedTab = 'link';
      btnLink.classList.add('active'); btnCasual.classList.remove('active');
      indexWrap.classList.add('tab-link-active');
      indexWrap.querySelectorAll('.branch-row.casual').forEach(function(r){ r.classList.add('tab-hidden'); });
      indexWrap.querySelectorAll('.branch-row.info').forEach(function(r){ r.classList.remove('tab-hidden'); });
    };
    // 이전 탭 상태 복원
    if (_feedTab === 'link') btnLink.onclick();
  }
  wrap.appendChild(tabBar('/', me));
  return wrap;
}


function makeCard(post, me, idx, likedSet, avatarMap) {
  var branchMode = (idx == null);
  var url = branchMode ? extractUrl(post.txt) : null;
  var isInfo = !!url;

  var row = document.createElement('div');
  var tileWrap = document.createElement('div');

  if (branchMode) {
    row.className = 'branch-row ' + (isInfo ? 'info' : 'casual');
    tileWrap.className = 'branch-tile-wrap';
  } else {
    row.className = 'card-row';
    var idxEl = document.createElement('div');
    idxEl.className = 'card-idx';
    idxEl.textContent = String(idx).padStart(2, '0');
    row.appendChild(idxEl);
    tileWrap.className = 'card-tile-wrap';
  }

  var c = nick2color(post.nick);
  var tile = document.createElement('div');

  if (post.del) {
    tile.className = 'gcard';
    tile.innerHTML = [
      '<div class="gc-body">',
      '<div style="display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:12px;"><span>╳</span><span style="font-size:10px;font-style:italic;">삭제됨 · '+absTime(post.del)+'</span></div>',
      '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;font-style:italic;">이 흔적은 지워졌습니다</div>',
      '</div>'
    ].join('');
    tileWrap.appendChild(tile);
    row.appendChild(tileWrap);
    var remain = 60000 - (Date.now() - post.del);
    if (remain > 0) setTimeout(function(){ if(row.parentNode) row.parentNode.removeChild(row); }, remain);
    return row;
  }

  var avColors = ['#6B5BD0','#3A8F7A','#C2553F','#4A7FC1','#8B5A2B','#2E7D5E'];
  var avBg = avColors[Math.abs(post.nick.split('').reduce(function(h,ch){return ch.charCodeAt(0)+((h<<5)-h);},0)) % avColors.length];

  tile.className = 'gcard ' + (isInfo ? 'lnk' : 'cas');

  var liked = likedSet ? likedSet.has(post.id) : false;
  var cmtCount = Array.isArray(post._cmt) ? (post._cmt[0]&&post._cmt[0].count||0) : (post.comments_count||0);

  var headHtml = [
    '<div class="gc-head">',
    (avatarMap && avatarMap[post.uid])
      ? '<img src="'+esc(avatarMap[post.uid])+'" referrerpolicy="no-referrer" style="width:28px;height:28px;border-radius:8px;object-fit:cover;flex-shrink:0;">'
      : '<div class="gc-av" style="background:'+avBg+';">'+getInitial(post.nick)+'</div>',
    '<div class="gc-meta">',
    '<span class="gc-who">'+nickHtml(post.nick, post.pseudo, post.uid)+'</span>',
    '<span class="gc-ago">'+relTime(post.upd||post.at)+'</span>',
    '</div>',
    (isInfo && url)
      ? '<div id="ogslot-'+post.id+'" style="width:40px;height:40px;flex-shrink:0;margin-left:auto;cursor:pointer;">'
        + (post.og_image
            ? '<img src="'+esc(post.og_image)+'" id="ogimg-'+post.id+'" data-url="'+esc(url)+'" referrerpolicy="no-referrer" loading="lazy" onerror="this.outerHTML=window.serviceIconHtml(this.getAttribute(&quot;data-url&quot;))" title="'+esc(url)+'" style="width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid var(--card-border);">'
            : serviceIconHtml(url))
        + '</div>'
      : '',
    '</div>'
  ].join('');

  var bodyHtml;
  if (isInfo) {
    bodyHtml = '<p class="gc-txt" id="txt-'+post.id+'">'+linkify(post.txt)+'</p>';
  } else {
    bodyHtml = '<p class="gc-cas" id="txt-'+post.id+'" style="-webkit-line-clamp:4;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;">'+linkify(post.txt)+'</p>';
    if (post.txt.length > 100) {
      bodyHtml += '<button id="more-'+post.id+'" style="display:block;font:400 11.5px \'Inter\',sans-serif;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:4px 0 0;text-align:left;">더 보기 →</button>';
    }
  }

  var likeHtml = '<button class="gc-like-btn'+(liked?' liked':'')+'" id="lbtn-'+post.id+'"><span id="lico-'+post.id+'">'+heartIcon(liked)+'</span> <span id="lcnt-'+post.id+'">'+(post.likes_count||0)+'</span></button>';

  tile.innerHTML = [
    '<div class="gc-body">',
    headHtml,
    bodyHtml,
    '</div>',
    '<div class="gc-foot">',
    // 좌하: 댓글
    '<button class="gc-icon-btn" id="cmtbtn-'+post.id+'"><i class="ti ti-message-circle"></i> <span id="cmtcnt-'+post.id+'">'+cmtCount+'</span></button>',
    // 댓글 오른쪽: 해시태그
    (post.tags && post.tags.length ? post.tags.map(function(t){
      return '<span onclick="event.stopPropagation();_setTagFilter(\''+esc(t)+'\')" style="font:600 10px \'JetBrains Mono\',monospace;color:var(--accent);cursor:pointer;padding:2px 6px;border-radius:100px;background:rgba(0,117,74,.08);white-space:nowrap;">#'+esc(t)+'</span>';
    }).join('') : ''),
    '<div class="gc-foot-spacer"></div>',
    // 우하: X, Threads, 좋아요, 삭제
    '<button class="gc-icon-btn" id="xbtn-'+post.id+'" title="X(트위터)에 공유" style="font:700 17px \'JetBrains Mono\',monospace;">𝕏</button>',
    '<button class="gc-icon-btn" id="thbtn-'+post.id+'" title="Threads에 공유" style="display:inline-flex;align-items:center;"><svg viewBox="0 0 192 192" width="19" height="19" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M141.537 88.988a66.667 66.667 0 0 0-2.518-1.143c-1.482-27.307-16.403-42.94-41.457-43.1h-.34c-14.986 0-27.449 6.396-35.12 18.036l13.779 9.452c5.73-8.695 14.724-10.548 21.348-10.548h.23c8.248.054 14.474 2.452 18.502 7.13 2.932 3.405 4.893 8.111 5.864 14.05-7.314-1.244-15.224-1.626-23.68-1.14-23.82 1.371-39.134 15.264-38.105 34.568.522 9.792 5.4 18.216 13.735 23.719 7.047 4.652 16.124 6.927 25.557 6.412 12.458-.683 22.231-5.436 29.049-14.127 5.178-6.6 8.452-15.153 9.899-25.93 5.937 3.583 10.337 8.298 12.767 13.966 4.132 9.635 4.373 25.468-8.546 38.376-11.319 11.308-24.925 16.2-45.488 16.351-22.809-.169-40.06-7.484-51.275-21.742C35.236 139.966 29.808 120.682 29.605 96c.203-24.682 5.63-43.966 16.133-57.317C56.954 24.425 74.204 17.11 97.013 16.94c22.975.17 40.526 7.52 52.171 21.847 5.71 7.026 10.015 15.86 12.853 26.162l16.147-4.308c-3.44-12.68-8.853-23.606-16.219-32.668C147.036 9.607 125.202.195 97.07 0h-.113C68.882.195 47.292 9.642 32.788 28.08 19.882 44.485 13.224 67.315 13.001 96c.223 28.685 6.88 51.515 19.787 67.92 14.504 18.438 36.094 27.884 64.172 28.08h.113c24.94-.173 42.439-6.708 56.944-21.199 18.91-18.894 18.282-42.637 12.061-57.162-4.442-10.354-12.909-18.578-24.541-23.65Z"/></svg></button>',
    likeHtml,
    me.uid===post.uid ? '<button class="del-btn" id="delbtn-'+post.id+'">삭제</button>' : '',
    '</div>'
  ].join('');

  // URL tab above link cards
  if (isInfo) {
    var dispUrl = url.replace(/^https?:\/\//, '').replace(/\/$/, '');
    if (dispUrl.length > 40) dispUrl = dispUrl.slice(0, 40) + '…';
    var urlTab = document.createElement('span');
    urlTab.className = 'gurl-tab';
    urlTab.textContent = dispUrl;
    urlTab.onclick = function(e) {
      e.stopPropagation();
      window.open(url, '_blank', 'noopener,noreferrer');
    };
    tileWrap.appendChild(urlTab);
  }

  var ogSlotEl = (isInfo && url) ? tile.querySelector('#ogslot-'+post.id) : null;
  if (ogSlotEl) {
    ogSlotEl.onclick = function(e) {
      e.stopPropagation();
      window.open(url, '_blank', 'noopener,noreferrer');
    };
  }

  // dot node
  var nodeEl = document.createElement('span');
  nodeEl.className = 'gnode';
  tile.appendChild(nodeEl);

  tile.querySelector('#lbtn-'+post.id).onclick = async function(e) {
    e.stopPropagation();
    var btn = this;
    var icoEl = document.getElementById('lico-'+post.id);
    var wasLiked = btn.classList.contains('liked');
    btn.classList.toggle('liked', !wasLiked);
    icoEl.innerHTML = heartIcon(!wasLiked);
    var cntEl = document.getElementById('lcnt-'+post.id);
    cntEl.textContent = !wasLiked ? (parseInt(cntEl.textContent)||0)+1 : Math.max(0,(parseInt(cntEl.textContent)||0)-1);
    var { data: nowLiked } = await SB.rpc('toggle_like', { p_post_id: post.id, p_uid: me.uid });
    if (typeof nowLiked === 'boolean' && nowLiked !== !wasLiked) {
      btn.classList.toggle('liked', nowLiked);
      icoEl.innerHTML = heartIcon(nowLiked);
    }
  };
  var moreBtn = tile.querySelector('#more-'+post.id);
  if (moreBtn) {
    var expanded = false;
    moreBtn.onclick = function(e) {
      e.stopPropagation();
      expanded = !expanded;
      var txtEl = document.getElementById('txt-'+post.id);
      if (expanded) {
        txtEl.style.webkitLineClamp = 'unset';
        txtEl.style.display = 'block';
        this.textContent = '접기 ↑';
      } else {
        txtEl.style.webkitLineClamp = '4';
        txtEl.style.display = '-webkit-box';
        this.textContent = '더 보기 →';
      }
    };
  }
  if (me.uid===post.uid) {
    tile.querySelector('#delbtn-'+post.id).onclick = function(e) {
      e.stopPropagation();
      var pid = post.id;
      gModal('이 흔적을 지울까요?<br><span style="font-size:10px;color:var(--text-dim);">60초 후 완전히 사라집니다</span>', function() {
        scatterAndDelete(tile, async function() {
          await SB.from('posts').update({ del: Date.now() }).eq('id', pid);
          R.render();
        });
      }, '삭제');
    };
  }
  // 댓글 버튼 → 포스트 상세로 이동
  tile.querySelector('#cmtbtn-'+post.id).onclick = function(e) {
    e.stopPropagation();
    navigateWithTransition(e.clientX, e.clientY, '/post/'+post.id);
  };
  // X(트위터) 공유
  tile.querySelector('#xbtn-'+post.id).onclick = function(e) {
    e.stopPropagation();
    var shareUrl = location.origin + location.pathname + '#/post/' + post.id;
    var text = encodeURIComponent(post.txt.slice(0, 200) + '… ' + shareUrl);
    window.open('https://x.com/intent/tweet?text=' + text, '_blank', 'noopener,noreferrer');
  };
  // Threads 공유
  tile.querySelector('#thbtn-'+post.id).onclick = function(e) {
    e.stopPropagation();
    var shareUrl = location.origin + location.pathname + '#/post/' + post.id;
    var text = encodeURIComponent(post.txt.slice(0, 200) + '… ' + shareUrl);
    window.open('https://www.threads.net/intent/post?text=' + text, '_blank', 'noopener,noreferrer');
  };
  tile.onclick = function(e) {
    navigateWithTransition(e.clientX, e.clientY, '/post/'+post.id);
  };
  tileWrap.appendChild(tile);
  row.appendChild(tileWrap);
  return row;
}

// ── 글쓰기 페이지 ────────────────────────────────────────────────────
function writePage(me) {
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;display:flex;flex-direction:column;';

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  var cancelBtn = document.createElement('button');
  cancelBtn.textContent = '←';
  cancelBtn.style.cssText = 'font-size:22px;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:0;line-height:1;';
  cancelBtn.onclick = function() {
    var ta = document.getElementById('write-ta');
    if (ta && ta.value.trim()) {
      gModal('작성 중인 내용이 사라집니다.<br>취소할까요?', function() { history.back() || R.go('/'); });
      return;
    }
    history.back() || R.go('/');
  };
  var hdrTitle = document.createElement('span');
  hdrTitle.style.cssText = 'font:700 15px \'Inter\',\'Noto Sans KR\',sans-serif;color:var(--text);';
  hdrTitle.textContent = 'mark 남기기';
  var submitBtn = document.createElement('button');
  submitBtn.id = 'submit-btn';
  submitBtn.textContent = '남기기';
  submitBtn.disabled = true;
  submitBtn.style.cssText = 'font:700 13px \'Inter\',\'Noto Sans KR\',sans-serif;color:#ffffff;background:#1E3932;border:none;border-radius:100px;padding:7px 18px;cursor:pointer;opacity:.3;';
  submitBtn.onclick = async function() {
    var ta = document.getElementById('write-ta');
    if (!ta) return;
    var txt = ta.value.trim();
    if (!txt || txt.length > MAX) return;
    submitBtn.disabled = true;
    submitBtn.style.opacity = '.3';
    var now = Date.now();
    var allTags = extractTags(txt).concat(_writeTags).filter(function(t,i,a){ return a.indexOf(t)===i; });
    var postNick = anonOn ? '익명' : me.nick;
    var postPseudo = anonOn ? true : me.pseudo;
    var newPostId = mkId();
    await SB.from('posts').insert({ id: newPostId, uid: me.uid, nick: postNick, pseudo: postPseudo, txt: txt, tags: allTags, at: now, upd: now, likes_count: 0, comments_count: 0 });
    if (allTags.length) notifyConnectionCheck(newPostId);
    var submittedUrl = extractUrl(txt);
    if (submittedUrl) fetchOgImageAndSave(newPostId, submittedUrl);
    _writeTags = [];
    _writeDraft = '';
    R.go('/');
  };
  hdr.appendChild(cancelBtn);
  hdr.appendChild(hdrTitle);
  hdr.appendChild(submitBtn);
  wrap.appendChild(hdr);
  wrap.appendChild(tabBar('/write', me));

  var writeTabBar = document.createElement('div');
  writeTabBar.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;background:var(--paper);border-bottom:1px solid var(--border);';
  var wTabCasual = document.createElement('button');
  wTabCasual.style.cssText = 'text-align:center;padding:13px 0;font:600 13px \'JetBrains Mono\',monospace;color:var(--text-muted);background:none;border:none;cursor:pointer;';
  wTabCasual.textContent = 'casual mark';
  var wTabLink = document.createElement('button');
  wTabLink.style.cssText = 'text-align:center;padding:13px 0;font:600 13px \'JetBrains Mono\',monospace;color:var(--text-muted);background:none;border:none;cursor:pointer;';
  wTabLink.textContent = 'link mark';
  if (_writeType === 'link') {
    wTabLink.style.color = 'var(--accent)';
    wTabLink.style.boxShadow = 'inset 0 -2px 0 var(--accent)';
  } else {
    wTabCasual.style.color = 'var(--accent)';
    wTabCasual.style.boxShadow = 'inset 0 -2px 0 var(--accent)';
  }
  wTabCasual.onclick = function() {
    _writeType = 'casual';
    wTabCasual.style.color = 'var(--accent)'; wTabCasual.style.boxShadow = 'inset 0 -2px 0 var(--accent)';
    wTabLink.style.color = 'var(--text-muted)'; wTabLink.style.boxShadow = '';
    var ta = document.getElementById('write-ta');
    if (ta) ta.placeholder = window.innerWidth >= 768 ? '일상이나 공유를 마크하세요.' : '일상을 마크하세요.';
  };
  wTabLink.onclick = function() {
    _writeType = 'link';
    wTabLink.style.color = 'var(--accent)'; wTabLink.style.boxShadow = 'inset 0 -2px 0 var(--accent)';
    wTabCasual.style.color = 'var(--text-muted)'; wTabCasual.style.boxShadow = '';
    var ta = document.getElementById('write-ta');
    if (ta) ta.placeholder = window.innerWidth >= 768 ? '일상이나 공유를 마크하세요.' : '공유를 마크하세요.';
  };
  writeTabBar.appendChild(wTabCasual);
  writeTabBar.appendChild(wTabLink);
  wrap.appendChild(writeTabBar);

  var body = document.createElement('div');
  body.style.cssText = 'padding:12px 16px;flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;';

  // ── 붙일 곳 카드 — +casual mark / +link mark 알약 ─────────────────
  var attachCard = document.createElement('div');
  attachCard.style.cssText = 'border:1.5px dashed var(--border);border-radius:14px;padding:10px 14px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;';
  var attachLabel = document.createElement('span');
  attachLabel.style.cssText = 'font:500 11px \'JetBrains Mono\',monospace;color:var(--text-dim);margin-right:2px;flex-shrink:0;';
  attachLabel.textContent = '붙일 곳';
  attachCard.appendChild(attachLabel);

  function makePill(label, type) {
    var pill = document.createElement('span');
    var active = _writeType === type;
    pill.style.cssText = 'display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:100px;border:1.5px solid '+(active?'var(--accent)':'var(--border)')+';background:'+(active?'rgba(0,117,74,.08)':'transparent')+';font:600 11px \'JetBrains Mono\',monospace;color:'+(active?'var(--accent)':'var(--text-dim)')+';cursor:pointer;transition:all .15s;';
    pill.innerHTML = (active ? '' : '<span style="font-size:13px;line-height:1;">+</span> ') + label;
    pill.onclick = function() {
      _writeType = type;
      var ta = document.getElementById('write-ta');
      if (ta) ta.placeholder = type === 'link' ? '공유를 마크하세요.' : '일상을 마크하세요.';
      attachCard.querySelectorAll('.type-pill').forEach(function(p) {
        var t = p.dataset.type;
        var a = _writeType === t;
        p.style.borderColor = a ? 'var(--accent)' : 'var(--border)';
        p.style.background = a ? 'rgba(0,117,74,.08)' : 'transparent';
        p.style.color = a ? 'var(--accent)' : 'var(--text-dim)';
        p.innerHTML = (a ? '' : '<span style="font-size:13px;line-height:1;">+</span> ') + p.dataset.label;
      });
    };
    pill.className = 'type-pill';
    pill.dataset.type = type;
    pill.dataset.label = label;
    return pill;
  }
  attachCard.appendChild(makePill('casual mark', 'casual'));
  attachCard.appendChild(makePill('link mark', 'link'));
  body.appendChild(attachCard);

  // ── nickBar ───────────────────────────────────────────────────────
  var nickBar = document.createElement('div');
  nickBar.style.cssText = 'display:flex;align-items:center;gap:6px;';

  function writeAvatar() {
    return me.avatar_url
      ? '<img src="'+esc(me.avatar_url)+'" style="width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;" referrerpolicy="no-referrer">'
      : avatar(me.nick, 24);
  }

  function renderWriteNick(editing) {
    if (editing) {
      nickBar.innerHTML = [
        writeAvatar(),
        '<input id="w-nick-inp" class="input-field" type="text" value="'+esc(me.nick)+'" maxlength="20"',
        ' style="flex:1;padding:3px 8px;font-size:12px;height:28px;">',
        '<button id="w-nick-save" style="font-size:11px;padding:3px 8px;background:var(--bg-surface);border:0.5px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text);">저장</button>',
        '<button id="w-nick-cancel" style="font-size:11px;padding:3px 8px;background:none;border:none;cursor:pointer;color:var(--text-dim);">취소</button>'
      ].join('');
      var inp = nickBar.querySelector('#w-nick-inp');
      inp.focus(); inp.select();
      nickBar.querySelector('#w-nick-save').onclick = async function() {
        var v = inp.value.trim();
        if (!v) return;
        var pseudo = isPseudo(v);
        await SB.rpc('update_nick', { p_uid: me.uid, p_nick: v, p_pseudo: pseudo });
        me = Object.assign({}, me, { nick: v, pseudo: pseudo });
        renderWriteNick(false);
      };
      nickBar.querySelector('#w-nick-cancel').onclick = function() { renderWriteNick(false); };
    } else {
      nickBar.innerHTML = [
        writeAvatar(),
        '<span style="font-size:12px;">'+nickHtml(me.nick, me.pseudo)+'</span>',
        '<button id="w-nick-edit" class="edit-pill"><i class="ti ti-pencil" style="font-size:11px;"></i></button>'
      ].join('');
      nickBar.querySelector('#w-nick-edit').onclick = function() { renderWriteNick(true); };
    }
  }
  renderWriteNick(false);
  body.appendChild(nickBar);

  // textarea 카드 — 고정 높이, 카운트 우하단
  var taWrap = document.createElement('div');
  taWrap.style.cssText = 'position:relative;border:1.5px solid var(--border);border-radius:14px;padding:14px 14px 32px;background:var(--paper);';

  var ta = document.createElement('textarea');
  ta.id = 'write-ta';
  ta.placeholder = _writeType === 'link' ? '공유를 마크하세요.' : '일상을 마크하세요.';
  ta.style.cssText = 'font-size:15px;line-height:1.7;resize:none;height:196px;background:transparent;border:none;outline:none;width:100%;overflow-y:auto;';
  if (_writeDraft) ta.value = _writeDraft;
  ta.oninput = function() {
    _writeDraft = this.value;
    var len = this.value.length, rem = MAX - len, pct = Math.min(len/MAX*100,100);
    var bar = document.getElementById('w-bar'), cnt = document.getElementById('w-cnt'), btn = document.getElementById('submit-btn');
    if (bar) { bar.style.width = pct+'%'; bar.style.background = len>MAX?'#ef4444':pct>90?'#eab308':'var(--accent)'; }
    if (cnt) { cnt.textContent = rem; cnt.style.color = len>MAX?'#f87171':rem<20?'#eab308':'var(--text-muted)'; }
    if (btn) { var ok = len>0&&len<=MAX; btn.disabled=!ok; btn.style.opacity=ok?'1':'.3'; }
    if (typeof updateCatPosition === 'function') updateCatPosition();
  };
  taWrap.appendChild(ta);

  // 글자 수 카운트 — 우하단 고정
  var cntEl = document.createElement('span');
  cntEl.id = 'w-cnt';
  cntEl.style.cssText = 'position:absolute;bottom:10px;right:14px;font:500 11px \'JetBrains Mono\',monospace;color:var(--text-muted);pointer-events:none;';
  cntEl.textContent = MAX;
  taWrap.appendChild(cntEl);

  // 고양이 canvas: 기본은 박스 하단 여백에 위치, 글이 박스를 가득 채우면 살짝 아래로 밀림
  var wcCv = document.createElement('canvas');
  wcCv.style.cssText = 'position:absolute;left:0;right:0;bottom:6px;width:100%;cursor:pointer;touch-action:manipulation;z-index:2;pointer-events:auto;transition:bottom .25s ease;';
  taWrap.appendChild(wcCv);
  function updateCatPosition() {
    var overflow = Math.max(0, ta.scrollHeight - ta.clientHeight);
    wcCv.style.bottom = (6 - Math.min(overflow / 8, 20)) + 'px';
  }

  body.appendChild(taWrap);

  // ── 해시태그 입력 행 ──────────────────────────────────────────────
  var _writeTags = [];
  var tagRow = document.createElement('div');
  tagRow.style.cssText = 'border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;background:var(--paper);display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:46px;cursor:text;';

  function renderTagRow() {
    tagRow.innerHTML = '';
    var tagLabel = document.createElement('span');
    tagLabel.style.cssText = 'font:700 13px \'JetBrains Mono\',monospace;color:var(--text-dim);flex-shrink:0;';
    tagLabel.textContent = '#';
    tagRow.appendChild(tagLabel);
    _writeTags.forEach(function(t) {
      var chip = document.createElement('span');
      chip.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;background:rgba(0,117,74,.10);border:1px solid rgba(0,117,74,.28);font:600 11px \'JetBrains Mono\',monospace;color:var(--accent);';
      chip.innerHTML = '#'+esc(t)+' <span style="cursor:pointer;opacity:.6;font-size:12px;" data-rm="'+esc(t)+'">×</span>';
      chip.querySelector('[data-rm]').onclick = function(e) {
        e.stopPropagation();
        _writeTags = _writeTags.filter(function(x){ return x !== t; });
        renderTagRow();
      };
      tagRow.appendChild(chip);
    });
    var tagInp = document.createElement('input');
    tagInp.placeholder = _writeTags.length ? '' : '태그 추가…';
    tagInp.style.cssText = 'border:none;outline:none;background:transparent;font:500 12px \'JetBrains Mono\',monospace;color:var(--text);flex:1;min-width:80px;';
    tagInp.onkeydown = function(e) {
      var raw = this.value.replace(/^#+/, '').trim();
      if ((e.key === 'Enter' || e.key === ',' || e.key === ' ') && raw) {
        e.preventDefault();
        var tag = raw.toLowerCase().replace(/[^가-힣a-z0-9_]/g, '');
        if (tag && !_writeTags.includes(tag)) _writeTags.push(tag);
        renderTagRow();
      }
      if (e.key === 'Backspace' && !this.value && _writeTags.length) {
        _writeTags.pop();
        renderTagRow();
      }
    };
    tagRow.appendChild(tagInp);
    tagRow.onclick = function() { tagInp.focus(); };
  }
  renderTagRow();
  body.appendChild(tagRow);

  // ── 익명 토글 행 (디자인) ─────────────────────────────────────────
  var anonRow = document.createElement('div');
  anonRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1.5px solid var(--border);border-radius:14px;background:var(--paper);';
  var anonOn = false;
  anonRow.innerHTML = '<span style="font:500 13px \'Inter\',\'Noto Sans KR\',sans-serif;color:var(--text-muted);">익명</span>'
    + '<div id="anon-toggle" style="width:42px;height:24px;border-radius:100px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;">'
    + '<div style="position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;"></div></div>';

  var tools = document.createElement('div');
  tools.style.cssText = 'display:flex;gap:9px;align-items:center;';

  hashBtn.textContent = '#';
  hashBtn.style.cssText = 'font-size:15px;font-weight:700;font-family:\'JetBrains Mono\',monospace;color:var(--text-muted);cursor:pointer;padding:2px 6px;border-radius:6px;transition:background .12s,color .12s;';
  hashBtn.onmouseenter = function() { this.style.background = 'var(--bg-surface)'; this.style.color = 'var(--accent)'; };
  hashBtn.onmouseleave = function() { this.style.background = ''; this.style.color = 'var(--text-muted)'; };
  hashBtn.onclick = function() {
    var start = ta.selectionStart, end = ta.selectionEnd;
    var val = ta.value;
    // 커서 앞이 공백이거나 시작이면 바로 #, 아니면 공백 + #
    var prefix = (start === 0 || /\s/.test(val[start - 1])) ? '#' : ' #';
    ta.value = val.slice(0, start) + prefix + val.slice(end);
    var pos = start + prefix.length;
    ta.setSelectionRange(pos, pos);
    ta.focus();
    ta.dispatchEvent(new Event('input'));
  };
  tools.appendChild(hashBtn);
  var hint = document.createElement('span');
  hint.style.cssText = 'font:400 10px \'JetBrains Mono\',monospace;color:var(--text-dim);';
  hint.textContent = '흔적은 사라지지 않아요';
  toolRow.appendChild(tools);
  toolRow.appendChild(hint);
  footer.appendChild(toolRow);

  // 고양이 애니메이션 (body 중앙 canvas)
  {
    var WC_SCALE = 1.6;
    var WC_ALPHA = 0.12;
    var WC_RUN_FRAMES = [2, 10, 3, 10];
    var WC_FRAME_MS = 160;
    var WC_SPEED = 52;
    var WC_DUR = 2600;

    var wcIdx = Math.floor(Math.random() * CAT_SPRITES.length);
    var wcSz0 = catSpriteSize(wcIdx);
    var wcH = Math.round(wcSz0.h * WC_SCALE) + 6;

    requestAnimationFrame(function() {
      var CW = wcCv.offsetWidth || (window.innerWidth - 32);
      wcCv.width  = CW;
      wcCv.height = wcH;
      wcCv.style.height = wcH + 'px';
      updateCatPosition();
      var ctx2 = wcCv.getContext('2d');

      var wc = {
        staticIdx: wcIdx,
        sceneIdx:  wcIdx,
        x: Math.max(0, (CW - Math.round(wcSz0.w * WC_SCALE)) / 2),
        y: 3,
        w: Math.round(wcSz0.w * WC_SCALE),
        h: Math.round(wcSz0.h * WC_SCALE),
        dir: Math.random() < 0.5 ? 1 : -1,
        phase: Math.random() * Math.PI * 2,
        frameTick: 0, frameIdx: 0,
        running: false, runEndT: 0, lastT: 0
      };

      function wcDrawStatic() {
        ctx2.clearRect(0, 0, CW, wcH);
        catDraw(ctx2, wc.staticIdx, wc.x, wc.y, false, WC_ALPHA);
      }

      function wcLoop(ts) {
        var dt = wc.lastT ? Math.min(ts - wc.lastT, 50) : 16;
        wc.lastT = ts;
        if (Date.now() >= wc.runEndT) {
          wc.running = false;
          wc.sceneIdx = wc.staticIdx;
          var sz0 = catSpriteSize(wc.staticIdx);
          wc.w = Math.round(sz0.w * WC_SCALE);
          wc.h = Math.round(sz0.h * WC_SCALE);
          wc.x = Math.max(0, Math.min(CW - wc.w, wc.x));
          wcDrawStatic();
          return;
        }
        wc.x += wc.dir * WC_SPEED * dt / 1000;
        wc.phase += dt / 1000 * Math.PI * 4;
        wc.frameTick += dt;
        if (wc.frameTick >= WC_FRAME_MS) {
          wc.frameTick -= WC_FRAME_MS;
          wc.frameIdx = (wc.frameIdx + 1) % WC_RUN_FRAMES.length;
          wc.sceneIdx = WC_RUN_FRAMES[wc.frameIdx];
          var sz = catSpriteSize(wc.sceneIdx);
          wc.w = Math.round(sz.w * WC_SCALE); wc.h = Math.round(sz.h * WC_SCALE);
        }
        if (wc.x <= 0)        { wc.x = 0;        wc.dir =  1; }
        if (wc.x >= CW - wc.w){ wc.x = CW - wc.w; wc.dir = -1; }
        var dy = Math.round(-Math.abs(Math.sin(wc.phase)) * 4);
        ctx2.clearRect(0, 0, CW, wcH);
        catDraw(ctx2, wc.sceneIdx, Math.round(wc.x), wc.y + dy, wc.dir < 0, WC_ALPHA);
        requestAnimationFrame(wcLoop);
      }

      function wcStart() {
        if (wc.running) return;
        wc.running = true;
        wc.runEndT = Date.now() + WC_DUR;
        wc.frameIdx = 0; wc.frameTick = 0; wc.phase = 0;
        wc.sceneIdx = WC_RUN_FRAMES[0];
        var sz = catSpriteSize(wc.sceneIdx);
        wc.w = Math.round(sz.w * WC_SCALE); wc.h = Math.round(sz.h * WC_SCALE);
        wc.lastT = 0;
        requestAnimationFrame(wcLoop);
      }

      wcCv.addEventListener('click', wcStart);
      wcCv.addEventListener('touchstart', function(e){ e.preventDefault(); wcStart(); }, {passive:false});

      if (catSpriteImg.complete) wcDrawStatic();
      else catSpriteImg.addEventListener('load', wcDrawStatic);
    });
  }

  var barRow = document.createElement('div');
  barRow.style.cssText = 'padding:4px 16px 12px;';
  barRow.innerHTML = '<div style="height:3px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;"><div id="w-bar" style="height:100%;width:0;background:var(--accent);border-radius:2px;transition:width .1s,background .1s;"></div></div>';
  footer.appendChild(barRow);
  wrap.appendChild(footer);

  setTimeout(function() { var ta=document.getElementById('write-ta'); if(ta) ta.focus(); }, 50);
  return wrap;
}

  var authorAvatarUrl = post.uid === me.uid ? me.avatar_url : null;

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>gitmark</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── 라이트 — Starbucks ─────────────────────────────────────── */
    :root {
      --paper:      #ffffff;
      --bg:         #f9f9f9;
      --bg-surface: #edebe9;
      --bg-elevated:#f9f9f9;
      --border:     #e0ddd7;
      --border-sub: #e8e5df;
      --accent:     #00754A;
      --rail:       #006241;
      --text:       #1a1a1a;
      --text-muted: #696969;
      --text-dim:   #a0a0a0;
      --text-body:  #2d2d2d;
      --text-faint: #c0bcb8;
    }
    /* ── 다크 — House Green ──────────────────────────────────────── */
    body.dark {
      --paper:      #1E3932;
      --bg:         #0d1f1a;
      --bg-surface: #263d34;
      --bg-elevated:#2b5148;
      --border:     #3a5c52;
      --border-sub: #2d4a41;
      --accent:     #00754A;
      --rail:       #d4e9e2;
      --text:       #ffffff;
      --text-muted: #b3d4c8;
      --text-dim:   #6a9e8e;
      --text-body:  #e8f5f0;
      --text-faint: #4a7a6a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      font-size: 13px;
      min-height: 100vh;
      transition: background .2s, color .2s;
    }
    /* 본문 전용 폰트: 한글 Noto Sans KR, 영문 Inter */
    .body-font {
      font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
      font-weight: 400;
    }
    /* 도트 배경 패턴 */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(0,98,65,.10) 1.1px, transparent 1.1px);
      background-size: 19px 19px;
    }
    #app {
      max-width: 680px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative; z-index: 1;
    }
    @media (min-width: 768px) {
      #app {
        max-width: 960px;
        margin-left: max(108px, calc((100vw - 960px) / 2));
        margin-right: auto;
      }
    }
    input, textarea, button {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
    }
    ::-webkit-scrollbar { width: 0; }
    .screen { animation: fi .12s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
    .btn-ghost {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 11px; padding: 0;
      transition: color .15s;
    }
    .btn-ghost:hover { color: var(--text); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }
    .input-field {
      width: 100%; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 9px 12px; font-size: 13px;
      color: var(--text); outline: none;
      transition: border-color .15s;
    }
    .input-field:focus { border-color: var(--text-muted); }
    .input-field::placeholder { color: var(--text-dim); }
    .tab-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 680px;
      background: var(--paper); border-top: 1px solid var(--border);
      display: flex; z-index: 20;
      transition: transform .25s ease, opacity .25s ease;
    }
    .tab-bar.hide-bar {
      transform: translateX(-50%) translateY(100%);
      opacity: 0; pointer-events: none;
    }
    .tab-bar button {
      flex: 1; padding: 9px 0 11px;
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: var(--text-muted);
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      transition: color .15s;
    }
    .tab-bar button i { font-size: 16px; line-height: 1; }
    .tab-bar button span { font-size: 10px; font-weight: 500; }
    @media (min-width: 768px) {
      .tab-bar {
        bottom: auto; top: 50%;
        left: 20px; transform: translateY(-50%);
        flex-direction: column;
        border-radius: 20px; border: 1px solid var(--border);
        width: 72px; padding: 6px 4px; gap: 2px; max-width: none;
      }
      .tab-bar button { padding: 12px 8px; border-radius: 14px; width: 100%; }
      .tab-hidden { display: flex !important; }
      .feed-tab-switcher { display: none !important; }
    }
    .sticky-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--paper); border-bottom: 1px solid var(--rail);
      padding: 14px 16px; display: flex;
      align-items: center; justify-content: space-between;
    }
    /* 피드 전용: 두 헤더를 묶는 fixed 래퍼 */
    .feed-hdr-wrap {
      position: fixed; top: 0; z-index: 20;
      left: 0; right: 0;
      background: var(--paper);
    }
    @media (min-width: 768px) {
      .feed-hdr-wrap {
        left: max(108px, calc((100vw - 960px) / 2));
        right: auto;
        width: min(960px, calc(100vw - max(108px, calc((100vw - 960px) / 2))));
      }
    }
    .feed-fixed-hdr { position: static !important; }
    .write-pill {
      font-size: 13px; font-weight: 700;
      color: #ffffff;
      background: var(--accent);
      border: none;
      border-radius: 100px; padding: 6px 16px; cursor: pointer;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      transition: opacity .15s;
    }
    .write-pill:hover { opacity: .85; }
    .edit-pill {
      font-size: 10px; color: var(--text-dim);
      background: none; border: 0.5px solid var(--border);
      border-radius: 20px; padding: 2px 8px; cursor: pointer;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      transition: border-color .15s, color .15s;
    }
    .edit-pill:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── 커스텀 모달 ─────────────────────────────────────────────── */
    .gm-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .gm-dialog {
      background: var(--bg-surface);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 24px 20px 18px;
      width: 100%; max-width: 300px;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
    }
    .gm-msg {
      font-size: 13px; color: var(--text-body);
      line-height: 1.6; margin-bottom: 18px; text-align: center;
    }
    .gm-btns { display: flex; gap: 8px; }
    .gm-btn {
      flex: 1; padding: 9px; border-radius: 8px; cursor: pointer;
      font-size: 12px; font-family: 'Inter', 'Noto Sans KR', sans-serif;
      border: 0.5px solid var(--border); transition: opacity .15s;
    }
    .gm-btn:hover { opacity: .8; }
    .gm-btn-cancel { background: var(--bg-elevated); color: var(--text-muted); }
    .gm-btn-confirm { background: var(--text); color: var(--bg); }
    .avatar {
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 500; flex-shrink: 0;
    }
    .like-btn {
      cursor: pointer; display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-family: 'Inter', 'Noto Sans KR', sans-serif;
      padding: 3px 10px; border-radius: 20px;
      border: 0.5px solid var(--border);
      background: var(--bg-elevated);
      transition: color .15s, border-color .15s, background .15s;
    }
    .like-btn.liked { color: var(--accent); border-color: var(--accent); background: rgba(0,117,74,.08); }

    /* ── 새 카드 스타일 ─────────────────────────────────────────── */
    .gcard {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 14px;
      position: relative;
      box-shadow: 0 0 0.5px rgba(0,0,0,.14), 0 1px 1px rgba(0,0,0,.24);
      cursor: pointer;
      transition: box-shadow .15s;
    }
    .gcard:hover { box-shadow: 0 0 1px rgba(0,0,0,.14), 0 2px 4px rgba(0,0,0,.24); }
    .gcard.lnk { border-top: 3px solid var(--text); }
    .gcard .gnode {
      position: absolute; left: -22px; top: 22px;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--rail); z-index: 3;
    }
    /* 모바일 link 탭: 닷 우측 */
    .branch-row.info .gcard .gnode { left: auto; right: -22px; }
    .gc-body { padding: 14px 15px 12px; }
    .gc-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .gc-av { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font: 700 11px 'JetBrains Mono',monospace; color: #fff; flex-shrink: 0; }
    .gc-meta { display: flex; flex-direction: column; gap: 1px; }
    .gc-who { font: 700 12.5px 'Inter','Noto Sans KR',sans-serif; color: var(--text); }
    .gc-ago { font: 400 10.5px 'JetBrains Mono',monospace; color: var(--text-muted); }
    .gc-cas { font: 400 16px/1.6 'Inter','Noto Sans KR',sans-serif; color: var(--text); margin: 0; white-space: pre-line; word-break: break-word; }
    .gc-txt { font: 400 13.5px/1.6 'Inter','Noto Sans KR',sans-serif; color: var(--text); margin: 0; word-break: break-word; }
    .gc-link-url { display: block; font: 500 12px 'JetBrains Mono',monospace; color: var(--text-muted); text-decoration: underline; margin: 8px 0 0; word-break: break-all; }
    .gc-foot { display: flex; align-items: center; padding: 7px 10px; border-top: 1px solid var(--border); gap: 4px; }
    .gc-foot-spacer { flex: 1; }
    .gc-icon-btn { cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-family: 'Inter','Noto Sans KR',sans-serif; padding: 4px 9px; border-radius: 100px; border: 1px solid transparent; background: transparent; color: var(--text-muted); transition: all .15s; }
    .gc-icon-btn:hover { background: var(--bg-surface); }
    .gc-like-btn { cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-family: 'Inter','Noto Sans KR',sans-serif; padding: 4px 9px; border-radius: 100px; border: 1px solid transparent; background: transparent; color: var(--text-muted); transition: all .15s; }
    .gc-like-btn:hover { background: var(--bg-surface); }
    .gc-like-btn.liked { color: var(--accent); background: rgba(0,117,74,.10); border-color: rgba(0,117,74,.28); }
    /* URL tab above link card */
    .gurl-tab { font: 500 10.5px 'JetBrains Mono',monospace; color: var(--text-muted); background: var(--bg-surface); border: 1px solid var(--border); border-bottom: none; border-radius: 9px 9px 0 0; padding: 4px 12px; margin-left: 16px; display: inline-block; max-width: 78%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
    .gurl-tab:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .gcard-wrap { display: flex; flex-direction: column; align-items: flex-start; }
    .del-btn { background: none; border: none; cursor: pointer; padding: 0; font-size: 11px; color: var(--text-dim); transition: color .15s; }
    .del-btn:hover { color: #f87171; }
    textarea { resize: none; background: transparent; border: none; outline: none; color: var(--text); width: 100%; line-height: 1.7; }

    /* ── 인덱스 피드 레이아웃 ───────────────────────────────────── */
    .feed-index-wrap {
      padding: 20px 20px 0 20px;
    }
    .card-row {
      display: flex; align-items: flex-start;
      gap: 12px; margin-bottom: 10px;
    }
    .card-idx {
      font-size: 11px; color: var(--text-dim);
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      min-width: 28px; text-align: right;
      padding-top: 13px; flex-shrink: 0;
      user-select: none;
    }
    .card-tile-wrap { flex: 1; min-width: 0; }

    .tile {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s;
    }
    .tile:hover { transform: translateX(2px); }

    /* 상단 헤더: 내용 + 시간 */
    .tile-head {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      padding: 14px 16px 12px;
    }
    .tile-txt {
      font-size: 14px; font-weight: 500;
      color: var(--text-body); line-height: 1.7;
      word-break: break-word; flex: 1;
    }
    .tile-since {
      font-size: 11px; color: var(--text-dim);
      white-space: nowrap; flex-shrink: 0;
      margin-top: 2px;
    }

    /* 하단 메타 영역: 흰 배경 */
    .tile-rows {
      background: var(--bg-surface);
      border-top: 0.5px solid var(--border);
    }
    .tile-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      font-size: 12px; color: var(--text-muted);
      flex-wrap: wrap;
    }
    .tile-row-icon {
      width: 20px; flex-shrink: 0; font-size: 13px;
      color: var(--text-dim); text-align: center;
    }
    .tile-row-val {
      display: flex; align-items: center; gap: 6px; flex: 1;
      color: var(--text);
    }
    .tile-sep { color: var(--border-sub); font-size: 10px; }

    /* 삭제된 카드 */
    .tile-del-head {
      padding: 11px 14px 9px;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-dim);
    }
    .tile-del-sub { font-size: 10px; font-style: italic; }
    .tile-del-rows {
      background: var(--bg-surface);
      border-top: 0.5px solid var(--border);
      padding: 7px 14px;
      font-size: 10px; color: var(--text-dim); font-style: italic;
    }

    /* ── 테마 토글 버튼 ─────────────────────────────────────────── */

    /* ── 분기 타임라인 피드 ──────────────────────────────────── */
    .feed-branch-header {
      display: grid; grid-template-columns: 1fr 1px 1fr;
      background: var(--paper);
      border-bottom: 1px solid rgba(0,98,65,.28);
      font-size: 13px; font-weight: 700; color: var(--text-muted);
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
    }
    .s-hl { background: var(--text); color: var(--bg); border-radius: 2px; padding: 0 1px; }
    .fbh-left  { padding: 13px 16px; text-align: right; }
    .fbh-sep   { background: #006241; }
    .fbh-right { padding: 13px 16px; }
    .feed-branch-wrap {
      position: relative; padding: 16px 0 16px;
      margin: 8px 0 90px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background-image: radial-gradient(circle, rgba(0,98,65,.10) 1.1px, transparent 1.1px);
      background-size: 19px 19px;
      overflow: hidden;
    }
    .feed-branch-wrap::before {
      content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
      border-left: 1px solid #006241; pointer-events: none; z-index: 0;
    }
    .feed-branch-wrap.tab-link-active::before { left: auto; right: 5px; border-left: none; border-right: 2px solid #006241; }
    .branch-row {
      display: flex; margin-bottom: 15px; position: relative; z-index: 1;
    }
    .branch-row.casual {
      justify-content: flex-start;
      padding-left: 14px; padding-right: calc(50% + 10px);
    }
    .branch-row.info {
      justify-content: flex-end;
      padding-right: 14px; padding-left: calc(50% + 10px);
    }
    /* 데스크탑: casual 닷 우측(중앙 방향), info 닷 좌측(중앙 방향) */
    @media (min-width: 768px) {
      .branch-row.casual .gcard .gnode { left: auto; right: -30px; top: 22px; }
      .branch-row.info   .gcard .gnode { left: -30px; right: auto; top: 22px; }
      .branch-row.casual .gcard::after {
        content: ''; position: absolute; top: 26px; right: -26px;
        width: 26px; border-top: 2px solid var(--rail);
      }
      .branch-row.info .gcard::after {
        content: ''; position: absolute; top: 26px; left: -26px;
        width: 26px; border-top: 2px solid var(--rail);
      }
    }
    .branch-tile-wrap { flex: 1; min-width: 0; }
    .tile.info-tile { border-color: var(--border-sub); }
    /* ── 모바일 피드 탭 스타일 ──────────────────────────────── */
    .feed-tab-switcher { display: none; }
    .feed-tab-btn {
      flex: 1; padding: 14px 0;
      background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      font-size: 13px; font-weight: 600; color: var(--text-muted);
      transition: color .15s, border-color .15s;
    }
    .feed-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    @media (max-width: 767px) {
      .feed-index-wrap { padding: 0; }
      .feed-branch-wrap { border: none; border-radius: 0; margin: 0 0 90px; }
      .feed-tab-switcher {
        display: flex;
        background: var(--paper);
        border-bottom: 1px solid var(--border);
      }
      .feed-branch-header { display: none; }
      .feed-branch-wrap::before {
        left: 5px; border-left: 2px solid #006241;
      }
      .feed-branch-wrap.tab-link-active::before { left: auto; right: 5px; border-left: none; border-right: 2px solid #006241; }
      .branch-row.casual {
        padding-left: 28px; padding-right: 10px;
      }
      .branch-row.casual::before { left: 14px; }
      .branch-row.info {
        padding-left: 10px; padding-right: 28px;
      }
      .branch-row.info::before { left: auto; right: 14px; }
      .tab-hidden { display: none !important; }
    }
    .info-url-bar {
      display: block; padding: 5px 12px; font-size: 9px;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      color: var(--text-dim); background: var(--bg-surface);
      border-bottom: 0.5px solid var(--border);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-decoration: none; cursor: pointer;
    }
    .info-url-bar:hover { color: var(--text-body); }

    /* ── UX 인터랙션 효과 ──────────────────────────────────── */
    .ink-overlay {
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      background: var(--bg-surface);
      transition: clip-path .42s cubic-bezier(.4,0,.2,1);
    }
    .tile { transition: transform .12s; }
  </style>
</head>
<body>
<div id="app"><div style="text-align:center;padding:60px;color:var(--text-dim);font-size:11px;">로딩 중...</div></div>
<script>
'use strict';

// ── 상수 ────────────────────────────────────────────────────────────
var MAX = 280;
var SURNAMES = ['김','이','박','최','정','강','조','윤','장','임','한','오','서','신','권','황','안','송','류','전','홍','고','문','양','손','배','백','허','유','남'];
var EN_NAMES = ['james','john','robert','michael','william','david','mary','patricia','jennifer','minho','junho','jinho','soyeon','minji','hyunji'];
// ── 유틸 ────────────────────────────────────────────────────────────
function mkId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function isPseudo(nick) {
  var t = nick.trim();
  if (/^[가-힣]{2,4}$/.test(t) && SURNAMES.indexOf(t[0]) >= 0) return true;
  if (EN_NAMES.indexOf(t.toLowerCase()) >= 0) return true;
  return false;
}

function nick2color(nick) {
  var h = 0;
  for (var i = 0; i < nick.length; i++) h = nick.charCodeAt(i) + ((h << 5) - h);
  var n = Math.abs(h);
  var l = 22 + (n % 32); // 22–53% lightness
  return {
    border: 'hsl(0,0%,' + l + '%)',
    tint:   'hsla(0,0%,' + l + '%,0.13)',
    avBg:   'hsl(0,0%,' + l + '%)',
    avText: l > 38 ? 'hsl(0,0%,8%)' : 'hsl(0,0%,92%)'
  };
}

function getInitial(nick) { return (nick || '?')[0].toUpperCase(); }

function relTime(ts) {
  var d = Date.now() - ts, s = Math.floor(d/1000), m = Math.floor(s/60), h = Math.floor(m/60), day = Math.floor(h/24);
  if (s < 60) return '방금 전';
  if (m < 60) return m + '분 전';
  if (h < 24) return h + '시간 전';
  if (day < 7) return day + '일 전';
  return new Date(ts).toLocaleDateString('ko-KR');
}

function absTime(ts) {
  return new Date(ts).toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function avatar(nick, size) {
  size = size || 36;
  var c = nick2color(nick), fs = size < 30 ? 11 : size < 50 ? 14 : 20;

}

function linkify(txt) {
  return (txt || '').split(/(https?:\/\/[^\s]+|#[가-힣a-zA-Z0-9_]+)/g).map(function(part) {
    if (/^https?:\/\//.test(part)) {
      var disp = part.replace(/^https?:\/\//, '').replace(/\/$/, '');

      return '<span onclick="event.stopPropagation();_setTagFilter(\''+tag+'\')" style="color:var(--accent);font-weight:600;cursor:pointer;">'+esc(part)+'</span>';

    return esc(part);

async function getOrCreateProfile(user) {
  var meta = user.user_metadata || {};

    if (!data.nick) {
      updates.nick = meta.full_name || meta.name || ('객' + Math.floor(Math.random() * 9000 + 1000));
      updates.pseudo = false;
    }
    if (Object.keys(updates).length) {

  return profile;
}

// A: 잉크 방울 전환 — 탭한 지점에서 잉크가 번지며 화면 전환
function inkTransition(x, y, cb) {
  // prefers-reduced-motion 또는 클립패스 미지원 시 즉시 이동
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    cb(); return;
  }
  var ov = document.createElement('div');
  ov.className = 'ink-overlay';
  ov.style.clipPath = 'circle(0% at '+x+'px '+y+'px)';
  document.body.appendChild(ov);
  ov.getBoundingClientRect(); // force reflow
  ov.style.clipPath = 'circle(200% at '+x+'px '+y+'px)';
  var fired = false;
  function finish() {
    if (fired) return; fired = true;
    cb();
    setTimeout(function() {
      ov.style.transition = 'opacity .25s ease';
      ov.style.opacity = '0';
      setTimeout(function(){ if(ov.parentNode) document.body.removeChild(ov); }, 280);
    }, 30);
  }
  ov.addEventListener('transitionend', finish, {once:true});
  setTimeout(finish, 600); // 폴백: transitionend 미발화 시 강제 진행
}

// B: 글자 해체 삭제 — 각 글자가 사방으로 흩어지며 소멸
function scatterAndDelete(tile, onDone) {
  var txtEl = tile.querySelector('.tile-txt');
  if (!txtEl) { onDone(); return; }
  var txt = txtEl.textContent || '';
  txtEl.style.overflow = 'visible';
  txtEl.style.webkitLineClamp = 'unset';
  txtEl.style.display = 'block';
  var spans = txt.split('').map(function(ch) {
    var s = document.createElement('span');
    s.textContent = ch;
    s.style.display = 'inline-block';
    s.style.transition = 'transform .65s ease, opacity .65s ease';
    return s;
  });
  txtEl.innerHTML = '';
  spans.forEach(function(s){ txtEl.appendChild(s); });
  requestAnimationFrame(function() {
    spans.forEach(function(s) {
      var dx = (Math.random()-0.5)*300;
      var dy = (Math.random()-0.5)*200;
      var rot = (Math.random()-0.5)*640;
      s.style.transform = 'translate('+dx+'px,'+dy+'px) rotate('+rot+'deg)';
      s.style.opacity = '0';
    });
    setTimeout(onDone, 750);
  });
}

function stopOpacityLoop() {} // no-op (opacity loop removed)

// D: 타이핑 리듬 출현 — 자연스러운 타이핑 패턴으로 글자가 한 자씩 등장
function typewriterReveal(el, txt, onDone) {
  var i = 0;
  el.textContent = '';
  function tick() {
    if (i >= txt.length) { if (onDone) onDone(); return; }
    var ch = txt[i++];
    if (ch === '\n') el.appendChild(document.createElement('br'));
    else el.appendChild(document.createTextNode(ch));
    var delay;
    if ('.,。！？\n'.indexOf(ch) >= 0) delay = 260 + Math.random()*200;
    else if (Math.random() < 0.06) delay = 130 + Math.random()*90;
    else delay = 16 + Math.random()*42;
    setTimeout(tick, delay);
  }
  tick();
}

    ].join('');
  }

  window.__setMode = function(m) { mode = m; render(); };
  window.__togglePw = function() { var el = document.getElementById('f-pw'); if(el) el.type = el.type==='password'?'text':'password'; };
  window.__updateAv = function() {
    var nick = (document.getElementById('f-nick')||{value:''}).value.trim();
    var circle = document.getElementById('av-circle'), label = document.getElementById('av-label');
    if (!circle) return;
    if (nick) {
      var c = nick2color(nick);
      circle.style.background = c.avBg; circle.style.color = c.avText;
      circle.textContent = getInitial(nick);
      if (label) label.innerHTML = esc(nick) + (isPseudo(nick) ? ' <span style="color:#ca8a04">(가명)</span>' : '');
    } else {
      circle.style.background = '#2d1b69'; circle.style.color = '#c4b5fd';
      circle.textContent = '?';
      if (label) label.innerHTML = '';
    }
  };
  window.__doAuth = function() {
    var email = (document.getElementById('f-email')||{}).value.trim();
    var pw = (document.getElementById('f-pw')||{}).value;
    var nick = (document.getElementById('f-nick')||{}).value.trim();
    var err = document.getElementById('f-err');
    function showErr(msg) { if(err){ err.textContent=msg; err.style.display='block'; } }

    if (!email || !pw) { showErr('이메일과 비밀번호를 입력해주세요.'); return; }
    if (pw.length < 6) { showErr('비밀번호는 6자 이상이어야 합니다.'); return; }

    var users = S.users();
    if (mode === 'signup') {
      var dup = Object.values(users).find(function(u){ return u.email===email; });
      if (dup) { showErr('이미 사용 중인 이메일입니다.'); return; }
      var finalNick = nick || S.nextNick();
      var user = { uid: mkId(), email: email, pw: pw, nick: finalNick, pseudo: isPseudo(finalNick), at: Date.now() };
      S.saveUser(user); S.setMe(user); R.go('/');
    } else {
      var found = Object.values(users).find(function(u){ return u.email===email && u.pw===pw; });
      if (!found) { showErr('이메일 또는 비밀번호가 올바르지 않습니다.'); return; }
      S.setMe(found); R.go('/');
    }
  };

  render();
  return wrap;
}

var CAT_SPRITES = [
  [126,  356, 241, 226],  // 0: 앉아있는
  [434,  443, 421, 139],  // 1: 누워있는
  [898,  361, 394, 221],  // 2: 달리는
  [1339, 180, 337, 250],  // 3: 점프하는
  [1748, 317, 270, 265],  // 4: 그루밍
  [2109, 304, 343, 278],  // 5: 놀란/하이싱
  [2544, 325, 341, 306],  // 6: 긁는
  [2940, 423, 283, 167],  // 7: 잠자는
  [3395, 276, 272, 321],  // 8: 기지개/돌아보기
  [127,  778, 240, 226],  // 9: 앉아있는 v2
  [898,  784, 394, 220],  // 10: 달리는 v2
  [1339, 633, 337, 249],  // 11: 점프하는 v2
  [2121, 797, 311, 208],  // 12: 그루밍 v2
  [2901, 764, 345, 240],  // 13: 잠자는 v2
];
var CAT_MAX_H = 52, CAT_MAX_W = 84;
var catSpriteImg = (function() { var img = new Image(); img.src = 'assets/cat-sprites.png'; return img; })();
function catSpriteSize(i) {
  var sp = CAT_SPRITES[i], sc = Math.min(CAT_MAX_H / sp[3], CAT_MAX_W / sp[2]);
  return { w: Math.round(sp[2] * sc), h: Math.round(sp[3] * sc) };
}
function catDraw(ctx, spriteIdx, dx, dy, mirror, alpha) {
  var sp = CAT_SPRITES[spriteIdx], sz = catSpriteSize(spriteIdx);
  ctx.save();
  ctx.globalAlpha = alpha;
  if (mirror) {
    ctx.translate(dx + sz.w, dy);
    ctx.scale(-1, 1);
    ctx.drawImage(catSpriteImg, sp[0], sp[1], sp[2], sp[3], 0, 0, sz.w, sz.h);
  } else {
    ctx.drawImage(catSpriteImg, sp[0], sp[1], sp[2], sp[3], dx, dy, sz.w, sz.h);
  }
  ctx.restore();
}
function catPickN(n, total, exclude) {
  var pool = [];
  for (var i = 0; i < total; i++) if (exclude.indexOf(i) < 0) pool.push(i);
  var result = [];
  while (result.length < n && pool.length) {
    var ri = Math.floor(Math.random() * pool.length);
    result.push(pool.splice(ri, 1)[0]);
  }
  return result;
}

    var catEntries = [], catGroundLines = [];
    var CAT_ALPHA = 0.12;
    var CAT_RUN_FRAMES = [2, 10, 3, 10]; // 달리기 프레임 사이클
    var CAT_FRAME_MS  = 160;             // 프레임당 ms
    var CAT_SPEED_PXS = 52;             // 달리기 속도 (px/s)
    var CAT_RUN_DUR   = 2600;           // 달리기 지속 ms
    var catRafId = null, catLastT = 0, catAnyRunning = false;

      catCanvas.width = W; catCanvas.height = H;
      var ctx = catCanvas.getContext('2d');
      var CX = W / 2;
      var usedPrev = [];
      var cardEls = indexWrap.querySelectorAll('.branch-row');

      cardEls.forEach(function(row) {
        var top = row.offsetTop, rH = row.offsetHeight;
        if (rH < 30) return;
        var isCasual = row.classList.contains('casual');
        // 카드 반대편 빈 공간만 사용 (피드 침범 방지)
        // casual(왼쪽 카드) → 오른쪽 빈 공간, info(오른쪽 카드) → 왼쪽 빈 공간
        var GAP = 14; // 중앙선·카드 경계 여백
        var emptyX = isCasual ? CX + GAP : GAP;
        var emptyW = isCasual ? W - CX - GAP * 2 : CX - GAP * 2;
        if (emptyW < 60) return;
        // 빈 공간을 3구역으로 나눠 랜덤 배치
        var subIdx = Math.floor(Math.random() * 3);
        var subW = Math.floor(emptyW / 3);
        var zoneX = emptyX + subIdx * subW;
        var zoneW = subW;
        var count = 1;
        var picked = catPickN(count, CAT_SPRITES.length, usedPrev.slice(-2));
        usedPrev = usedPrev.concat(picked).slice(-4);
        var maxSH = 0;
        picked.forEach(function(i){ maxSH = Math.max(maxSH, catSpriteSize(i).h); });
        var groundY = top + (rH - maxSH) / 2 + maxSH + 4;
        var totalW = 0;
        picked.forEach(function(i){ totalW += catSpriteSize(i).w; });
        var gap = Math.max(8, Math.min(20, (zoneW - totalW) / (picked.length + 1)));
        var curX = zoneX + Math.max(0, (zoneW - totalW - gap * (picked.length - 1)) / 2);
        catGroundLines.push({x: emptyX, y: groundY + 1, w: emptyW});
        picked.forEach(function(idx) {
          var sz = catSpriteSize(idx);
          var sW = sz.w, sH = sz.h;
          var sy = groundY - sH + (Math.random() - 0.5) * 8;
          catEntries.push({
            sceneIdx: idx, origX: Math.round(curX), origY: Math.round(sy),
            groundY: groundY, zoneX: emptyX, zoneW: emptyW, isCasual: isCasual, sW: sW, sH: sH
          });
          curX += sW + gap;
        });
      });

      // 각 고양이: 정적 포즈(staticIdx)와 달리기 상태 초기화
      catEntries.forEach(function(se) {
        se.staticIdx = se.sceneIdx;              // 원래 포즈 보존
        se.runX      = se.origX;                 // 현재 x (달리기 중 변경)
        se.runDir    = Math.random() < 0.5 ? 1 : -1;
        se.runPhase  = Math.random() * Math.PI * 2;
        se.frameTick = 0;
        se.frameIdx  = 0;
        se.running   = false;
        se.runEndT   = 0;
      });

      // 정적 그리기 (RAF 없이 1회)
      function catDrawStatic() {
        ctx.clearRect(0, 0, W, ctx.canvas.height);
        catGroundLines.forEach(function(gl) {
          ctx.fillStyle = 'rgba(0,98,65,0.06)';
          ctx.fillRect(gl.x, gl.y, gl.w, 1);
        });
        catEntries.forEach(function(se) {
          catDraw(ctx, se.staticIdx, se.origX, se.origY, false, CAT_ALPHA);
        });
      }
      catDrawStatic();

      // RAF 루프 — 달리는 고양이가 있을 때만 실행
      function catLoop(ts) {
        var dt = catLastT ? Math.min(ts - catLastT, 50) : 16;
        catLastT = ts;

        ctx.clearRect(0, 0, W, ctx.canvas.height);
        catGroundLines.forEach(function(gl) {
          ctx.fillStyle = 'rgba(0,98,65,0.06)';
          ctx.fillRect(gl.x, gl.y, gl.w, 1);
        });

        catAnyRunning = false;
        catEntries.forEach(function(se) {
          if (!se.running) {
            // 정적 포즈
            catDraw(ctx, se.staticIdx, se.origX, se.origY, false, CAT_ALPHA);
            return;
          }
          // 달리기 종료 체크
          if (Date.now() >= se.runEndT) {
            se.running = false;
            se.runX = se.origX;
            catDraw(ctx, se.staticIdx, se.origX, se.origY, false, CAT_ALPHA);
            return;
          }
          catAnyRunning = true;

          // 위치 · 바운스 업데이트
          se.runX += se.runDir * CAT_SPEED_PXS * dt / 1000;
          se.runPhase += dt / 1000 * Math.PI * 4;

          // 프레임 사이클
          se.frameTick += dt;
          if (se.frameTick >= CAT_FRAME_MS) {
            se.frameTick -= CAT_FRAME_MS;
            se.frameIdx = (se.frameIdx + 1) % CAT_RUN_FRAMES.length;
            se.sceneIdx = CAT_RUN_FRAMES[se.frameIdx];
            var sz = catSpriteSize(se.sceneIdx);
            se.sW = sz.w; se.sH = sz.h;
          }

          // 경계 반전
          var minX = se.zoneX, maxX = se.zoneX + se.zoneW - se.sW;
          if (se.runX <= minX) { se.runX = minX; se.runDir = 1; }
          if (se.runX >= maxX) { se.runX = maxX; se.runDir = -1; }

          var dy = Math.round(-Math.abs(Math.sin(se.runPhase)) * 5);
          catDraw(ctx, se.sceneIdx, Math.round(se.runX), se.origY + dy, se.runDir < 0, CAT_ALPHA);
        });

        if (catAnyRunning) requestAnimationFrame(catLoop);
        else { catRafId = null; catLastT = 0; }
      }

      function catStartRun(se) {
        var sz = catSpriteSize(CAT_RUN_FRAMES[0]);
        se.sceneIdx  = CAT_RUN_FRAMES[0];
        se.sW = sz.w; se.sH = sz.h;
        se.frameIdx  = 0;
        se.frameTick = 0;
        se.runPhase  = 0;
        se.runX      = se.origX;
        se.runEndT   = Date.now() + CAT_RUN_DUR;
        se.running   = true;
        if (!catRafId) {
          catLastT = 0;
          catRafId = requestAnimationFrame(catLoop);
        }
      }

      // 클릭/터치 — 정적 origX 기준 히트 판정
      function catHandleInteract(mx, my) {
        var wrapRect = indexWrap.getBoundingClientRect();
        var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        var cx = mx - wrapRect.left;
        var cy = my + scrollTop - (wrapRect.top + scrollTop);
        var hit = null;
        catEntries.forEach(function(se) {
          var hx = se.running ? Math.round(se.runX) : se.origX;
          if (!hit &&
              cx >= hx - 8 && cx <= hx + se.sW + 8 &&
              cy >= se.origY - 8 && cy <= se.origY + se.sH + 8) {
            hit = se;
          }
        });
        if (!hit) return;
        // 클릭된 고양이 즉시 달리기
        catStartRun(hit);
        // 주변 고양이들도 시간차로 달리기
        var others = catEntries.filter(function(se){ return se !== hit && !se.running; });
        others.sort(function(){ return Math.random() - 0.5; });
        var ripple = Math.min(Math.floor(Math.random() * 2) + 1, others.length);
        for (var i = 0; i < ripple; i++) {
          (function(target, delay) {
            setTimeout(function() { catStartRun(target); }, delay);
          })(others[i], 300 + i * (200 + Math.random() * 200));
        }
      }

      indexWrap.addEventListener('click', function(e) {
        catHandleInteract(e.clientX, e.clientY);
      });
      indexWrap.addEventListener('touchstart', function(e) {
        var t = e.touches[0];
        catHandleInteract(t.clientX, t.clientY);
      }, {passive: true});
    });

    btnCasual.onclick = function() {
      _feedTab = 'casual';
      btnCasual.classList.add('active'); btnLink.classList.remove('active');
      indexWrap.classList.remove('tab-link-active');
      indexWrap.querySelectorAll('.branch-row.info').forEach(function(r){ r.classList.add('tab-hidden'); });
      indexWrap.querySelectorAll('.branch-row.casual').forEach(function(r){ r.classList.remove('tab-hidden'); });
    };
    btnLink.onclick = function() {
      _feedTab = 'link';
      btnLink.classList.add('active'); btnCasual.classList.remove('active');
      indexWrap.classList.add('tab-link-active');
      indexWrap.querySelectorAll('.branch-row.casual').forEach(function(r){ r.classList.add('tab-hidden'); });
      indexWrap.querySelectorAll('.branch-row.info').forEach(function(r){ r.classList.remove('tab-hidden'); });
    };
    // 이전 탭 상태 복원
    if (_feedTab === 'link') btnLink.onclick();
  }
  wrap.appendChild(tabBar('/', me));
  return wrap;
}


function makeCard(post, me, idx, likedSet, avatarMap) {
  var branchMode = (idx == null);
  var url = branchMode ? extractUrl(post.txt) : null;
  var isInfo = !!url;

  var row = document.createElement('div');
  var tileWrap = document.createElement('div');

  if (branchMode) {
    row.className = 'branch-row ' + (isInfo ? 'info' : 'casual');
    tileWrap.className = 'branch-tile-wrap';
  } else {
    row.className = 'card-row';
    var idxEl = document.createElement('div');
    idxEl.className = 'card-idx';
    idxEl.textContent = String(idx).padStart(2, '0');
    row.appendChild(idxEl);
    tileWrap.className = 'card-tile-wrap';
  }

  var c = nick2color(post.nick);
  var tile = document.createElement('div');

  if (post.del) {
    tile.className = 'gcard';
    tile.innerHTML = [
      '<div class="gc-body">',
      '<div style="display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:12px;"><span>╳</span><span style="font-size:10px;font-style:italic;">삭제됨 · '+absTime(post.del)+'</span></div>',
      '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;font-style:italic;">이 흔적은 지워졌습니다</div>',
      '</div>'
    ].join('');
    tileWrap.appendChild(tile);
    row.appendChild(tileWrap);
    var remain = 60000 - (Date.now() - post.del);
    if (remain > 0) setTimeout(function(){ if(row.parentNode) row.parentNode.removeChild(row); }, remain);
    return row;
  }

  var avColors = ['#6B5BD0','#3A8F7A','#C2553F','#4A7FC1','#8B5A2B','#2E7D5E'];
  var avBg = avColors[Math.abs(post.nick.split('').reduce(function(h,ch){return ch.charCodeAt(0)+((h<<5)-h);},0)) % avColors.length];

  tile.className = 'gcard ' + (isInfo ? 'lnk' : 'cas');

  var liked = likedSet ? likedSet.has(post.id) : false;
  var cmtCount = Array.isArray(post._cmt) ? (post._cmt[0]&&post._cmt[0].count||0) : (post.comments_count||0);

  var headHtml = [
    '<div class="gc-head">',
    (avatarMap && avatarMap[post.uid])
      ? '<img src="'+esc(avatarMap[post.uid])+'" referrerpolicy="no-referrer" style="width:28px;height:28px;border-radius:8px;object-fit:cover;flex-shrink:0;">'
      : '<div class="gc-av" style="background:'+avBg+';">'+getInitial(post.nick)+'</div>',
    '<div class="gc-meta">',
    '<span class="gc-who">'+nickHtml(post.nick, post.pseudo)+'</span>',
    '<span class="gc-ago">'+relTime(post.upd||post.at)+'</span>',
    '</div></div>'
  ].join('');

  var bodyHtml;
  if (isInfo) {
    bodyHtml = '<p class="gc-txt" id="txt-'+post.id+'">'+linkify(post.txt)+'</p>';
  } else {
    bodyHtml = '<p class="gc-cas" id="txt-'+post.id+'" style="-webkit-line-clamp:4;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;">'+linkify(post.txt)+'</p>';
    if (post.txt.length > 100) {
      bodyHtml += '<button id="more-'+post.id+'" style="display:block;font:400 11.5px \'Inter\',sans-serif;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:4px 0 0;text-align:left;">더 보기 →</button>';
    }
  }

  var likeHtml = '<button class="gc-like-btn'+(liked?' liked':'')+'" id="lbtn-'+post.id+'">'+(liked?'♥':'♡')+' <span id="lcnt-'+post.id+'">'+(post.likes_count||0)+'</span></button>';

  tile.innerHTML = [
    '<div class="gc-body">',
    headHtml,
    bodyHtml,
    '</div>',
    '<div class="gc-foot">',
    // 좌하: 댓글
    '<button class="gc-icon-btn" id="cmtbtn-'+post.id+'">💬 <span id="cmtcnt-'+post.id+'">'+cmtCount+'</span></button>',
    '<div class="gc-foot-spacer"></div>',
    // 우하: 공유, 좋아요, 삭제
    '<button class="gc-icon-btn" id="shbtn-'+post.id+'" title="공유">↗</button>',
    likeHtml,
    me.uid===post.uid ? '<button class="del-btn" id="delbtn-'+post.id+'">삭제</button>' : '',
    '</div>'
  ].join('');

  // URL tab above link cards
  if (isInfo) {
    var dispUrl = url.replace(/^https?:\/\//, '').replace(/\/$/, '');
    if (dispUrl.length > 40) dispUrl = dispUrl.slice(0, 40) + '…';
    var urlTab = document.createElement('span');
    urlTab.className = 'gurl-tab';
    urlTab.textContent = dispUrl;
    urlTab.onclick = function(e) {
      e.stopPropagation();
      window.open(url, '_blank', 'noopener,noreferrer');
    };
    tileWrap.appendChild(urlTab);
  }

  // dot node
  var nodeEl = document.createElement('span');
  nodeEl.className = 'gnode';
  tile.appendChild(nodeEl);

  tile.querySelector('#lbtn-'+post.id).onclick = async function(e) {
    e.stopPropagation();
    var btn = this;
    var wasLiked = btn.classList.contains('liked');
    btn.classList.toggle('liked', !wasLiked);
    btn.firstChild.textContent = !wasLiked ? '♥' : '♡';
    var cntEl = document.getElementById('lcnt-'+post.id);
    cntEl.textContent = !wasLiked ? (parseInt(cntEl.textContent)||0)+1 : Math.max(0,(parseInt(cntEl.textContent)||0)-1);
    var { data: nowLiked } = await SB.rpc('toggle_like', { p_post_id: post.id, p_uid: me.uid });
    if (typeof nowLiked === 'boolean' && nowLiked !== !wasLiked) {
      btn.classList.toggle('liked', nowLiked);
      btn.firstChild.textContent = nowLiked ? '♥' : '♡';
    }
  };
  var moreBtn = tile.querySelector('#more-'+post.id);
  if (moreBtn) {
    var expanded = false;
    moreBtn.onclick = function(e) {
      e.stopPropagation();
      expanded = !expanded;
      var txtEl = document.getElementById('txt-'+post.id);
      if (expanded) {
        txtEl.style.webkitLineClamp = 'unset';
        txtEl.style.display = 'block';
        this.textContent = '접기 ↑';
      } else {
        txtEl.style.webkitLineClamp = '4';
        txtEl.style.display = '-webkit-box';
        this.textContent = '더 보기 →';
      }
    };
  }
  if (me.uid===post.uid) {
    tile.querySelector('#delbtn-'+post.id).onclick = function(e) {
      e.stopPropagation();
      var pid = post.id;
      gModal('이 흔적을 지울까요?<br><span style="font-size:10px;color:var(--text-dim);">60초 후 완전히 사라집니다</span>', function() {
        scatterAndDelete(tile, async function() {
          await SB.from('posts').update({ del: Date.now() }).eq('id', pid);
          R.render();
        });
      }, '삭제');
    };
  }
  // 댓글 버튼 → 포스트 상세로 이동
  tile.querySelector('#cmtbtn-'+post.id).onclick = function(e) {
    e.stopPropagation();
    inkTransition(e.clientX, e.clientY, function() { R.go('/post/'+post.id); });
  };
  // 공유 버튼
  tile.querySelector('#shbtn-'+post.id).onclick = function(e) {
    e.stopPropagation();
    var shareUrl = location.origin + location.pathname + '#/post/' + post.id;
    if (navigator.share) {
      navigator.share({ title: 'gitmark', text: post.txt.slice(0, 60), url: shareUrl });
    } else {
      navigator.clipboard.writeText(shareUrl).then(function() {
        var btn = tile.querySelector('#shbtn-'+post.id);
        btn.textContent = '✓';
        setTimeout(function() { btn.textContent = '↗'; }, 1500);
      });
    }
  };
  tile.onclick = function(e) {
    inkTransition(e.clientX, e.clientY, function() { R.go('/post/'+post.id); });
  };
  tileWrap.appendChild(tile);
  row.appendChild(tileWrap);
  return row;
}

  }
  wTabCasual.onclick = function() {

        '<button id="w-nick-cancel" style="font-size:11px;padding:3px 8px;background:none;border:none;cursor:pointer;color:var(--text-dim);">취소</button>'
      ].join('');
      var inp = nickBar.querySelector('#w-nick-inp');

        var pseudo = isPseudo(v);
        await SB.rpc('update_nick', { p_uid: me.uid, p_nick: v, p_pseudo: pseudo });
        me = Object.assign({}, me, { nick: v, pseudo: pseudo });
        renderWriteNick(false);
      };

    var bar = document.getElementById('w-bar'), cnt = document.getElementById('w-cnt'), btn = document.getElementById('submit-btn');
    if (bar) { bar.style.width = pct+'%'; bar.style.background = len>MAX?'#ef4444':pct>90?'#eab308':'var(--accent)'; }

  hashBtn.textContent = '#';

  hashBtn.onmouseleave = function() { this.style.background = ''; this.style.color = 'var(--text-muted)'; };
  hashBtn.onclick = function() {
    var start = ta.selectionStart, end = ta.selectionEnd;
    var val = ta.value;
    // 커서 앞이 공백이거나 시작이면 바로 #, 아니면 공백 + #
    var prefix = (start === 0 || /\s/.test(val[start - 1])) ? '#' : ' #';
    ta.value = val.slice(0, start) + prefix + val.slice(end);
    var pos = start + prefix.length;
    ta.setSelectionRange(pos, pos);
    ta.focus();
    ta.dispatchEvent(new Event('input'));
  };
  tools.appendChild(hashBtn);
  var hint = document.createElement('span');
  hint.style.cssText = 'font:400 10px \'JetBrains Mono\',monospace;color:var(--text-dim);';
  hint.textContent = '흔적은 사라지지 않아요';
  toolRow.appendChild(tools);
  toolRow.appendChild(hint);
  footer.appendChild(toolRow);

  // 고양이 애니메이션 (body 중앙 canvas)
  {
    var WC_SCALE = 1.6;
    var WC_ALPHA = 0.12;
    var WC_RUN_FRAMES = [2, 10, 3, 10];
    var WC_FRAME_MS = 160;
    var WC_SPEED = 52;
    var WC_DUR = 2600;

    var wcIdx = Math.floor(Math.random() * CAT_SPRITES.length);
    var wcSz0 = catSpriteSize(wcIdx);
    var wcH = Math.round(wcSz0.h * WC_SCALE) + 6;

    requestAnimationFrame(function() {
      var CW = wcCv.offsetWidth || (window.innerWidth - 32);
      wcCv.width  = CW;
      wcCv.height = wcH;
      wcCv.style.height = wcH + 'px';
      var ctx2 = wcCv.getContext('2d');

      var wc = {
        staticIdx: wcIdx,
        sceneIdx:  wcIdx,
        x: Math.max(0, (CW - Math.round(wcSz0.w * WC_SCALE)) / 2),
        y: 3,
        w: Math.round(wcSz0.w * WC_SCALE),
        h: Math.round(wcSz0.h * WC_SCALE),
        dir: Math.random() < 0.5 ? 1 : -1,
        phase: Math.random() * Math.PI * 2,
        frameTick: 0, frameIdx: 0,
        running: false, runEndT: 0, lastT: 0
      };

      function wcDrawStatic() {
        ctx2.clearRect(0, 0, CW, wcH);
        catDraw(ctx2, wc.staticIdx, wc.x, wc.y, false, WC_ALPHA);
      }

      function wcLoop(ts) {
        var dt = wc.lastT ? Math.min(ts - wc.lastT, 50) : 16;
        wc.lastT = ts;
        if (Date.now() >= wc.runEndT) {
          wc.running = false;
          wc.sceneIdx = wc.staticIdx;
          var sz0 = catSpriteSize(wc.staticIdx);
          wc.w = Math.round(sz0.w * WC_SCALE);
          wc.h = Math.round(sz0.h * WC_SCALE);
          wc.x = Math.max(0, Math.min(CW - wc.w, wc.x));
          wcDrawStatic();
          return;
        }
        wc.x += wc.dir * WC_SPEED * dt / 1000;
        wc.phase += dt / 1000 * Math.PI * 4;
        wc.frameTick += dt;
        if (wc.frameTick >= WC_FRAME_MS) {
          wc.frameTick -= WC_FRAME_MS;
          wc.frameIdx = (wc.frameIdx + 1) % WC_RUN_FRAMES.length;
          wc.sceneIdx = WC_RUN_FRAMES[wc.frameIdx];
          var sz = catSpriteSize(wc.sceneIdx);
          wc.w = Math.round(sz.w * WC_SCALE); wc.h = Math.round(sz.h * WC_SCALE);
        }
        if (wc.x <= 0)        { wc.x = 0;        wc.dir =  1; }
        if (wc.x >= CW - wc.w){ wc.x = CW - wc.w; wc.dir = -1; }
        var dy = Math.round(-Math.abs(Math.sin(wc.phase)) * 4);
        ctx2.clearRect(0, 0, CW, wcH);
        catDraw(ctx2, wc.sceneIdx, Math.round(wc.x), wc.y + dy, wc.dir < 0, WC_ALPHA);
        requestAnimationFrame(wcLoop);
      }

      function wcStart() {
        if (wc.running) return;
        wc.running = true;
        wc.runEndT = Date.now() + WC_DUR;
        wc.frameIdx = 0; wc.frameTick = 0; wc.phase = 0;
        wc.sceneIdx = WC_RUN_FRAMES[0];
        var sz = catSpriteSize(wc.sceneIdx);
        wc.w = Math.round(sz.w * WC_SCALE); wc.h = Math.round(sz.h * WC_SCALE);
        wc.lastT = 0;
        requestAnimationFrame(wcLoop);
      }

      wcCv.addEventListener('click', wcStart);
      wcCv.addEventListener('touchstart', function(e){ e.preventDefault(); wcStart(); }, {passive:false});

      if (catSpriteImg.complete) wcDrawStatic();
      else catSpriteImg.addEventListener('load', wcDrawStatic);
    });
  }

  var barRow = document.createElement('div');
  barRow.style.cssText = 'padding:4px 16px 12px;';
  barRow.innerHTML = '<div style="height:3px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;"><div id="w-bar" style="height:100%;width:0;background:var(--accent);border-radius:2px;transition:width .1s,background .1s;"></div></div>';
  footer.appendChild(barRow);
  wrap.appendChild(footer);

  setTimeout(function() { var ta=document.getElementById('write-ta'); if(ta) ta.focus(); }, 50);
  return wrap;
}

// ── 상세 페이지 ──────────────────────────────────────────────────────
async function detailPage(pid, me) {
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;padding-bottom:70px;';

  var hdr = document.createElement('div');

  backBtn.onclick = function() { R.go('/'); };
  hdr.appendChild(backBtn);
  wrap.appendChild(hdr);

  var [postRes, likeRes, cmtRes] = await Promise.all([
    SB.from('posts').select('*').eq('id', pid).maybeSingle(),
    SB.from('likes').select('post_id').eq('post_id', pid).eq('uid', me.uid).maybeSingle(),
    SB.from('comments').select('*').eq('post_id', pid).order('at')
  ]);
  var post = postRes.data;
  if (!post) {
    wrap.innerHTML += '<div style="text-align:center;padding:60px;color:var(--text-dim);">게시물을 찾을 수 없습니다.</div>';
    return wrap;
  }

  var authorAvatarUrl = post.uid === me.uid ? me.avatar_url : null;
  if (!authorAvatarUrl) {
    var { data: authorProfs } = await SB.rpc('get_public_profiles', { user_ids: [post.uid] });
    var authorProf = authorProfs && authorProfs[0] ? authorProfs[0] : null;
    authorAvatarUrl = authorProf && authorProf.avatar_url ? authorProf.avatar_url : null;
  }
  function authorAvatar(size) {
    return authorAvatarUrl
      ? '<img src="'+esc(authorAvatarUrl)+'" referrerpolicy="no-referrer" style="width:'+size+'px;height:'+size+'px;border-radius:50%;object-fit:cover;flex-shrink:0;">'
      : avatar(post.nick, size);
  }

  var postEl = document.createElement('div');
  postEl.style.cssText = 'padding:16px;border-bottom:1px solid var(--border);';
  if (post.del) {
    postEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">╳ 삭제됨 · '+absTime(post.del)+'</div><div style="font-size:11px;color:var(--text-dim);margin-top:4px;">이 흔적은 지워졌습니다</div>';
  } else {
    var liked = !!likeRes.data;
    postEl.innerHTML = [
      '<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;">',
      authorAvatar(42),
      '<div><div style="font-size:13px;color:var(--text);">'+nickHtml(post.nick,post.pseudo)+'</div>',
      '<div style="font-size:11px;color:var(--text-muted);margin-top:3px;">'+relTime(post.upd||post.at)+'</div></div></div>',
      '<div id="d-post-body" style="font-size:14px;color:var(--text-body);line-height:1.7;word-break:break-word;margin-bottom:14px;min-height:1.7em;"></div>',
      '<div style="display:flex;align-items:center;gap:14px;">',
      '<button class="like-btn'+(liked?' liked':'')+'" id="d-lbtn"><span id="d-lico">'+(liked?'♥':'♡')+'</span><span style="font-size:12px;" id="d-lcnt">'+(post.likes_count||0)+'</span></button>',
      '<span style="font-size:12px;color:var(--text-muted);">💬 <span id="d-cmt-cnt">'+(post.comments_count||0)+'</span></span>',
      me.uid===post.uid ? '<button class="del-btn" id="d-del">삭제</button>' : '',
      '</div>'
    ].join('');
    postEl.querySelector('#d-lbtn').onclick = async function() {
      var wasLiked = this.classList.contains('liked');
      this.classList.toggle('liked', !wasLiked);
      document.getElementById('d-lico').textContent = !wasLiked?'♥':'♡';
      var cntEl = document.getElementById('d-lcnt');
      cntEl.textContent = !wasLiked?(parseInt(cntEl.textContent)||0)+1:Math.max(0,(parseInt(cntEl.textContent)||0)-1);
      await SB.rpc('toggle_like', { p_post_id: pid, p_uid: me.uid });
    };
    if (me.uid===post.uid) {
      postEl.querySelector('#d-del').onclick = function() {
        gModal('이 흔적을 지울까요?<br><span style="font-size:10px;color:var(--text-dim);">60초 후 완전히 사라집니다</span>', async function() {
          await SB.from('posts').update({ del: Date.now() }).eq('id', pid);
          R.go('/');
        }, '삭제');
      };
    }
  }
  wrap.appendChild(postEl);
  var bodyEl = postEl.querySelector('#d-post-body');
  if (bodyEl) typewriterReveal(bodyEl, post.txt, function() { bodyEl.innerHTML = linkify(post.txt); });

  // ── 댓글 입력창 (포스트 바로 아래, 인라인) ──
  var cInput = document.createElement('div');
  cInput.style.cssText = 'display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);';
  var myAv = me.avatar_url
    ? '<img src="'+esc(me.avatar_url)+'" referrerpolicy="no-referrer" style="width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;">'
    : avatar(me.nick, 26);
  cInput.innerHTML = myAv;
  var inp = document.createElement('input');
  inp.id = 'd-inp';
  inp.type = 'text';
  inp.className = 'input-field';
  inp.placeholder = '댓글을 남기세요…';
  inp.style.cssText = 'flex:1;padding:6px 10px;font-size:12px;height:32px;';
  var sendBtn = document.createElement('button');
  sendBtn.innerHTML = '<i class="ti ti-send" style="font-size:14px;"></i>';
  sendBtn.style.cssText = 'background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;transition:color .15s;flex-shrink:0;';
  sendBtn.onmouseover = function(){this.style.color='var(--text)';};
  sendBtn.onmouseout = function(){this.style.color='var(--text-muted)';};
  cInput.appendChild(inp);
  cInput.appendChild(sendBtn);
  wrap.appendChild(cInput);

  // ── 댓글 목록 ──
  var cList = document.createElement('div');
  cList.id = 'd-clist';
  wrap.appendChild(cList);

  var replyTo = null;
  var allComments = cmtRes.data || [];

  // 댓글 작성자 프로필 사진 맵
  var cmtAvatarMap = {};
  cmtAvatarMap[me.uid] = me.avatar_url || null;
  var cmtUids = [...new Set(allComments.map(function(c){ return c.uid; }).filter(function(uid){ return uid !== me.uid; }))];
  if (cmtUids.length) {
    var { data: cmtProfs } = await SB.rpc('get_public_profiles', { user_ids: cmtUids });
    (cmtProfs || []).forEach(function(p){ if (p.avatar_url) cmtAvatarMap[p.id] = p.avatar_url; });
  }

  function cmtAvatar(uid, nick, size) {
    return cmtAvatarMap[uid]
      ? '<img src="'+esc(cmtAvatarMap[uid])+'" referrerpolicy="no-referrer" style="width:'+size+'px;height:'+size+'px;border-radius:50%;object-fit:cover;flex-shrink:0;">'
      : avatar(nick, size);
  }

  function appendCommentEl(c) {
    var replies = allComments.filter(function(r){ return r.parent_id===c.id; });
    cList.appendChild(c.parent_id ? mkReply(c) : mkComment(c, replies));
  }

  function renderComments() {
    var top = allComments.filter(function(c){ return !c.parent_id; });
    cList.innerHTML = '';
    top.forEach(function(c) {
      cList.appendChild(mkComment(c, allComments.filter(function(r){ return r.parent_id===c.id; })));
    });
  }

  function mkComment(c, replies) {
    var el = document.createElement('div');
    if (c.del) {
      el.innerHTML = '<div style="padding:10px 16px;border-bottom:1px solid var(--border-sub);color:var(--text-dim);font-size:11px;">● 삭제됨 · '+absTime(c.del)+'</div>';
    } else {
      var isOwner = c.uid === me.uid;
      el.innerHTML = [
        '<div style="padding:10px 16px;border-bottom:1px solid var(--border-sub);">',
        '<div style="display:flex;gap:8px;">',
        cmtAvatar(c.uid, c.nick, 28),
        '<div style="flex:1;"><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px;">',
        '<span style="font-size:12px;color:var(--text);">'+nickHtml(c.nick,c.pseudo)+'</span>',
        '<span style="font-size:10px;color:var(--text-dim);">· '+relTime(c.at)+'</span></div>',
        '<div id="ctxt-'+c.id+'" style="font-size:12px;color:var(--text-body);line-height:1.55;word-break:break-word;min-height:1.2em;"></div>',
        '<div style="display:flex;gap:10px;margin-top:6px;">',
        '<button class="btn-ghost" id="rep-'+c.id+'">답글</button>',
        isOwner ? '<button class="del-btn" style="margin-left:0;" id="dc-'+c.id+'">삭제</button>' : '',
        '</div></div></div></div>'
      ].join('');
      typewriterReveal(el.querySelector('#ctxt-'+c.id), c.txt);
      el.querySelector('#rep-'+c.id).onclick = function() { replyTo = c.id; inp.placeholder='@'+c.nick+'에 답글'; inp.focus(); };
      if (isOwner) {
        el.querySelector('#dc-'+c.id).onclick = (function(cid) { return function() {
          gModal('이 댓글을 삭제할까요?', async function() {
            await SB.from('comments').update({ del: Date.now() }).eq('id', cid);
            allComments = allComments.map(function(cm){ return cm.id===cid ? Object.assign({},cm,{del:Date.now()}) : cm; });
            post.comments_count = Math.max(0,(post.comments_count||0)-1);
            await SB.from('posts').update({ comments_count: post.comments_count }).eq('id', pid);
            var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=post.comments_count;
            renderComments();
          }, '삭제');
        }; })(c.id);
      }
    }
    replies.forEach(function(r) { el.appendChild(mkReply(r)); });
    return el;
  }

  function mkReply(r) {
    var el = document.createElement('div');
    if (r.del) {
      el.innerHTML = '<div style="padding:8px 16px 8px 52px;border-bottom:1px solid var(--border-sub);color:var(--text-dim);font-size:10px;">● 삭제됨 · '+absTime(r.del)+'</div>';
      return el;
    }
    var isOwner = r.uid === me.uid;
    el.innerHTML = [
      '<div style="padding:8px 16px 8px 52px;border-bottom:1px solid var(--border-sub);">',
      '<div style="display:flex;gap:8px;">',
      cmtAvatar(r.uid, r.nick, 24),
      '<div style="flex:1;"><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:3px;">',
      '<span style="font-size:11px;color:var(--text);">'+nickHtml(r.nick,r.pseudo)+'</span>',
      '<span style="font-size:10px;color:var(--text-dim);">· '+relTime(r.at)+'</span></div>',
      '<div id="rtxt-'+r.id+'" style="font-size:11px;color:var(--text-faint);line-height:1.5;word-break:break-word;min-height:1.1em;"></div>',
      isOwner ? '<button class="del-btn" style="margin-left:0;margin-top:4px;" id="dr-'+r.id+'">삭제</button>' : '',
      '</div></div></div>'
    ].join('');
    typewriterReveal(el.querySelector('#rtxt-'+r.id), r.txt);
    if (isOwner) {
      el.querySelector('#dr-'+r.id).onclick = (function(rid) { return function() {
        gModal('이 댓글을 삭제할까요?', async function() {
          await SB.from('comments').update({ del: Date.now() }).eq('id', rid);
          allComments = allComments.map(function(cm){ return cm.id===rid ? Object.assign({},cm,{del:Date.now()}) : cm; });
          post.comments_count = Math.max(0,(post.comments_count||0)-1);
          await SB.from('posts').update({ comments_count: post.comments_count }).eq('id', pid);
          var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=post.comments_count;
          renderComments();
        }, '삭제');
      }; })(r.id);
    }
    return el;
  }

  var _submitting = false;
  function submit() {
    if (_submitting) return;
    var txt = inp.value.trim();
    if (!txt) return;
    _submitting = true;
    var parentId = replyTo;
    inp.value = ''; inp.placeholder = '댓글을 남기세요…'; replyTo = null;
    var newComment = { id: mkId(), post_id: pid, parent_id: parentId, uid: me.uid, nick: me.nick, pseudo: me.pseudo, txt: txt, at: Date.now(), del: null };
    // 즉시 UI에 추가
    allComments.push(newComment);
    if (parentId) {
      renderComments();
    } else {
      cList.appendChild(mkComment(newComment, []));
    }
    // 서버에 저장
    SB.from('comments').insert(newComment).then(function() {
      post.comments_count = (post.comments_count||0)+1;
      SB.from('posts').update({ comments_count: post.comments_count }).eq('id', pid);
      var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=post.comments_count;
    });
    setTimeout(function(){ _submitting = false; }, 300);
  }
  inp.onkeydown = function(e){ if(e.key==='Enter'){ e.preventDefault(); submit(); } };
  sendBtn.onclick = function(e){ e.preventDefault(); submit(); };

  // ── Supabase Realtime: 다른 사용자 댓글 실시간 반영 ──
  var channel = SB.channel('comments-'+pid)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments', filter: 'post_id=eq.'+pid },
      function(payload) {
        var c = payload.new;
        if (allComments.some(function(x){ return x.id===c.id; })) return; // 내가 올린 것 중복 방지
        allComments.push(c);
        if (c.parent_id) {
          renderComments();
        } else {
          cList.appendChild(mkComment(c, []));
        }
        post.comments_count = (post.comments_count||0)+1;
        var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=post.comments_count;
      }
    ).subscribe();

  // 페이지 이동 시 구독 해제
  var _unsubDetail = function() { SB.removeChannel(channel); };
  window.addEventListener('hashchange', _unsubDetail, { once: true });

  renderComments();
  return wrap;
}

        : avatar(me.nick, 64);
      prof.innerHTML = [
        '<div id="prof-av-wrap">'+editAvatar+'</div>',
        '<div style="width:100%;max-width:260px;">',
        '<input id="prof-nick-inp" class="input-field" type="text" value="'+esc(me.nick)+'" maxlength="20" placeholder="닉네임 입력" style="text-align:center;margin-bottom:6px;">',
        '<div id="prof-nick-preview" style="text-align:center;font-size:11px;color:var(--text-muted);min-height:16px;margin-bottom:12px;">'+nickHtml(me.nick, me.pseudo)+'</div>',
        '<div style="display:flex;gap:8px;">',
        '<button id="prof-save" style="flex:1;background:var(--bg-surface);border:0.5px solid var(--border);border-radius:6px;padding:8px;font-size:12px;color:var(--text);cursor:pointer;">저장</button>',
        '<button id="prof-cancel" class="btn-ghost" style="flex:1;padding:8px;border:0.5px solid var(--border);border-radius:6px;">취소</button>',
        '</div></div>'
      ].join('');
      var inp = prof.querySelector('#prof-nick-inp');
      var preview = prof.querySelector('#prof-nick-preview');
      var avWrap = prof.querySelector('#prof-av-wrap');
      inp.focus(); inp.select();
      inp.oninput = function() {
        var v = this.value.trim() || me.nick;
        if (!me.avatar_url) {
          var c = nick2color(v);
          avWrap.innerHTML = '<div class="avatar" style="width:64px;height:64px;background:'+c.avBg+';color:'+c.avText+';font-size:24px;">'+getInitial(v)+'</div>';
        }
        preview.innerHTML = nickHtml(v, isPseudo(v));
      };
      prof.querySelector('#prof-save').onclick = async function() {
        var newNick = inp.value.trim();
        if (!newNick) { inp.focus(); return; }
        var pseudo = isPseudo(newNick);
        await SB.rpc('update_nick', { p_uid: me.uid, p_nick: newNick, p_pseudo: pseudo });
        me = Object.assign({}, me, { nick: newNick, pseudo: pseudo });
        renderProf(false);
      };
      prof.querySelector('#prof-cancel').onclick = function() { renderProf(false); };
    } else {
      var gAvatar = me.avatar_url
        ? '<img src="'+esc(me.avatar_url)+'" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:0.5px solid var(--border);" referrerpolicy="no-referrer">'
        : avatar(me.nick, 64);
      var gNameLine = me.google_name
        ? '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">'+esc(me.google_name)+'</div>'
        : '';
      var emailLine = me.email
        ? '<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">'+esc(me.email)+'</div>'
        : '';
      prof.innerHTML = [
        gAvatar,
        '<div style="text-align:center;">',
        '<div style="display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:2px;">',
        '<span style="font-size:15px;font-weight:500;">'+nickHtml(me.nick, me.pseudo)+'</span>',
        '<button id="prof-edit-btn" class="edit-pill"><i class="ti ti-pencil" style="font-size:11px;"></i></button>',
        '</div>',
        gNameLine,
        emailLine,
        '</div>'
      ].join('');
      prof.querySelector('#prof-edit-btn').onclick = function() { renderProf(true); };
    }
  }
  renderProf(false);
  wrap.appendChild(prof);

  // 테마 설정 섹션
  var themeOpts = [
    { key: 'light',  label: 'light',         svg: _SVG_SUN },
    { key: 'dark',   label: 'dark',           svg: _SVG_MOON },
    { key: 'system', label: 'system setting', svg: _SVG_SYSTEM }
  ];
  var themeSec = document.createElement('div');
  themeSec.style.cssText = 'border-bottom:0.5px solid var(--border);padding:4px 0 6px;';
  var themeHdr = document.createElement('div');
  themeHdr.style.cssText = 'padding:10px 16px 4px;font-size:9px;color:var(--text-dim);letter-spacing:.12em;font-family:"Inter","Noto Sans KR",sans-serif;';
  themeHdr.textContent = 'THEME';
  themeSec.appendChild(themeHdr);

  function renderThemeRows() {
    var cur = S.theme();
    themeSec.querySelectorAll('.theme-opt-row').forEach(function(el){ el.remove(); });
    themeOpts.forEach(function(opt) {
      var row = document.createElement('button');
      row.className = 'theme-opt-row';
      row.style.cssText = 'display:flex;align-items:center;width:100%;background:none;border:none;padding:9px 16px;cursor:pointer;font-family:"Inter","Noto Sans KR",sans-serif;font-size:11px;color:var(--text);gap:10px;text-align:left;transition:background .12s;';
      row.onmouseenter = function(){ row.style.background = 'var(--bg-elevated)'; };
      row.onmouseleave = function(){ row.style.background = 'none'; };

      var icon = document.createElement('span');
      icon.innerHTML = opt.svg;
      icon.style.cssText = 'display:flex;align-items:center;flex-shrink:0;';
      row.appendChild(icon);

      var lbl = document.createElement('span');
      lbl.textContent = opt.label;
      lbl.style.flex = '1';
      row.appendChild(lbl);

      if (cur === opt.key) {
        var chk = document.createElement('span');
        chk.textContent = '✓';
        chk.style.cssText = 'font-size:13px;color:var(--text-dim);';
        row.appendChild(chk);
      }

      row.onclick = function() {
        S.setTheme(opt.key);
        applyTheme(opt.key);
        renderThemeRows();
      };
      themeSec.appendChild(row);
    });
  }
  renderThemeRows();
  wrap.appendChild(themeSec);

  wrap.appendChild(tabBar('/profile', me));
  return wrap;
}

async function myPage(me) {
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;padding-bottom:64px;';

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  hdr.innerHTML = '<span style="font-size:13px;letter-spacing:.05em;">내 흔적</span>';
  wrap.appendChild(hdr);

  var now60m = Date.now() - 60000;
  var [postsRes, likesRes] = await Promise.all([
    SB.from('posts').select('*').eq('uid', me.uid).or('del.is.null,del.gt.'+now60m).order('at', { ascending: false }),
    SB.from('likes').select('post_id').eq('uid', me.uid)
  ]);
  var posts = postsRes.data || [];
  var likedSet = new Set((likesRes.data || []).map(function(l){ return l.post_id; }));

  var tabLabel = document.createElement('div');
  tabLabel.style.cssText = 'padding:10px 16px;border-bottom:0.5px solid var(--border);font-size:11px;color:var(--text-muted);';
  tabLabel.textContent = '총 '+posts.length+'개';
  wrap.appendChild(tabLabel);

  if (posts.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:40px;color:var(--text-dim);font-size:11px;';
    empty.textContent = '아직 남긴 흔적이 없어요.';
    wrap.appendChild(empty);
  } else {
    var indexWrapM = document.createElement('div');
    indexWrapM.className = 'feed-index-wrap';
    var totalM = posts.length;
    var myAvatarMap = {}; myAvatarMap[me.uid] = me.avatar_url || null;
    posts.forEach(function(p, i) {
      indexWrapM.appendChild(makeCard(p, me, totalM - i, likedSet, myAvatarMap));
    });
    wrap.appendChild(indexWrapM);
  }

  wrap.appendChild(tabBar('/my', me));
  return wrap;
}

// ── 시작 ────────────────────────────────────────────────────────────
applyTheme(S.theme());
R.render();

</script>
</body>

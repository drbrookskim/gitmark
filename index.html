<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>gitmark</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
  <style>
    /* ── 라이트 (기본) ──────────────────────────────────────────── */
    :root {
      --bg:         #fafaf9;
      --bg-surface: #f5f5f4;
      --bg-elevated:#ececea;
      --border:     #e5e5e4;
      --border-sub: #ededeb;
      --text:       #1c1917;
      --text-muted: #78716c;
      --text-dim:   #a8a29e;
      --text-body:  #44403c;
      --text-faint: #78716c;
    }
    /* ── 다크 ───────────────────────────────────────────────────── */
    body.dark {
      --bg:         #0d0d0d;
      --bg-surface: #1a1a1a;
      --bg-elevated:#111111;
      --border:     #2a2a2a;
      --border-sub: #1e1e1e;
      --text:       #e8e8e8;
      --text-muted: #555555;
      --text-dim:   #333333;
      --text-body:  #cccccc;
      --text-faint: #aaaaaa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 13px;
      min-height: 100vh;
      transition: background .2s, color .2s;
    }
    /* 본문 전용 폰트: 한글 Noto Sans KR, 영문 Inter */
    .body-font {
      font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
      font-weight: 400;
    }
    /* 도트 배경 패턴 */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: .45;
    }
    /* 좌/우 워터마크 */
    body::after {
      content: 'gitmark · 흔적 · gitmark · 흔적 · gitmark · 흔적';
      position: fixed; left: 14px; top: 50%; z-index: 0; pointer-events: none;
      writing-mode: vertical-rl; letter-spacing: .3em;
      font-size: 10px; color: var(--border); transform: translateY(-50%);
      white-space: nowrap; user-select: none;
    }
    #app {
      max-width: 680px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative; z-index: 1;
    }
    input, textarea, button {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }
    ::-webkit-scrollbar { width: 0; }
    .screen { animation: fi .12s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
    .btn-ghost {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 11px; padding: 0;
      transition: color .15s;
    }
    .btn-ghost:hover { color: var(--text); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 0; }
    .input-field {
      width: 100%; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 9px 12px; font-size: 13px;
      color: var(--text); outline: none;
      transition: border-color .15s;
    }
    .input-field:focus { border-color: var(--text-muted); }
    .input-field::placeholder { color: var(--text-dim); }
    .tab-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 680px;
      background: var(--bg); border-top: 0.5px solid var(--border);
      display: flex; z-index: 20;
    }
    .tab-bar button {
      flex: 1; padding: 10px 0 13px;
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: color .15s;
    }
    .tab-bar button i { font-size: 20px; }
    .tab-bar button span { font-size: 10px; }
    .sticky-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg); border-bottom: 0.5px solid var(--border);
      padding: 10px 20px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .write-pill {
      font-size: 11px; color: var(--text-muted);
      background: none; border: 0.5px solid var(--border);
      border-radius: 20px; padding: 5px 12px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: border-color .15s, color .15s;
    }
    .write-pill:hover { border-color: var(--text-muted); color: var(--text); }
    .edit-pill {
      font-size: 10px; color: var(--text-dim);
      background: none; border: 0.5px solid var(--border);
      border-radius: 20px; padding: 2px 8px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: border-color .15s, color .15s;
    }
    .edit-pill:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── 커스텀 모달 ─────────────────────────────────────────────── */
    .gm-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .gm-dialog {
      background: var(--bg-surface);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 24px 20px 18px;
      width: 100%; max-width: 300px;
      font-family: 'JetBrains Mono', monospace;
    }
    .gm-msg {
      font-size: 13px; color: var(--text-body);
      line-height: 1.6; margin-bottom: 18px; text-align: center;
    }
    .gm-btns { display: flex; gap: 8px; }
    .gm-btn {
      flex: 1; padding: 9px; border-radius: 8px; cursor: pointer;
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      border: 0.5px solid var(--border); transition: opacity .15s;
    }
    .gm-btn:hover { opacity: .8; }
    .gm-btn-cancel { background: var(--bg-elevated); color: var(--text-muted); }
    .gm-btn-confirm { background: var(--text); color: var(--bg); }
    .avatar {
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 500; flex-shrink: 0;
    }
    .like-btn {
      cursor: pointer; display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      padding: 3px 10px; border-radius: 20px;
      border: 0.5px solid var(--border);
      background: var(--bg-elevated);
      transition: color .15s, border-color .15s, background .15s;
    }
    .like-btn.liked { color: #f472b6; border-color: #f472b6; background: rgba(244,114,182,.08); }
    .del-btn { background: none; border: none; cursor: pointer; padding: 0; font-size: 11px; color: var(--text-dim); transition: color .15s; }
    .del-btn:hover { color: #f87171; }
    textarea { resize: none; background: transparent; border: none; outline: none; color: var(--text); width: 100%; line-height: 1.7; }

    /* ── 인덱스 피드 레이아웃 ───────────────────────────────────── */
    .feed-index-wrap {
      padding: 20px 20px 0 20px;
    }
    .card-row {
      display: flex; align-items: flex-start;
      gap: 12px; margin-bottom: 10px;
    }
    .card-idx {
      font-size: 11px; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      min-width: 28px; text-align: right;
      padding-top: 13px; flex-shrink: 0;
      user-select: none;
    }
    .card-tile-wrap { flex: 1; min-width: 0; }

    .tile {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .12s;
    }
    .tile:hover { transform: translateX(2px); }

    /* 상단 헤더: 내용 + 시간 */
    .tile-head {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      padding: 12px 14px 10px;
    }
    .tile-txt {
      font-size: 13px; font-weight: 500;
      color: var(--text-body); line-height: 1.65;
      word-break: break-word; flex: 1;
    }
    .tile-since {
      font-size: 10px; color: var(--text-dim);
      white-space: nowrap; flex-shrink: 0;
      margin-top: 3px;
    }

    /* 하단 메타 영역: 흰 배경 */
    .tile-rows {
      background: var(--bg-surface);
      border-top: 0.5px solid var(--border);
    }
    .tile-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      font-size: 11px; color: var(--text-muted);
      flex-wrap: wrap;
    }
    .tile-row-icon {
      width: 16px; flex-shrink: 0; font-size: 12px;
      color: var(--text-dim); text-align: center;
    }
    .tile-row-val {
      display: flex; align-items: center; gap: 6px; flex: 1;
      color: var(--text);
    }
    .tile-sep { color: var(--border-sub); font-size: 10px; }

    /* 삭제된 카드 */
    .tile-del-head {
      padding: 11px 14px 9px;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-dim);
    }
    .tile-del-sub { font-size: 10px; font-style: italic; }
    .tile-del-rows {
      background: var(--bg-surface);
      border-top: 0.5px solid var(--border);
      padding: 7px 14px;
      font-size: 10px; color: var(--text-dim); font-style: italic;
    }

    /* ── 테마 토글 버튼 ─────────────────────────────────────────── */
    #theme-toggle {
      position: fixed; top: 10px; right: 12px; z-index: 100;
      background: none; border: none; cursor: pointer;
      font-size: 16px; padding: 4px 6px;
      border-radius: 6px;
      transition: background .15s;
      line-height: 1;
    }
    #theme-toggle:hover { background: var(--bg-elevated); }

    /* ── 분기 타임라인 피드 ──────────────────────────────────── */
    .feed-branch-header {
      display: grid; grid-template-columns: 1fr 0.5px 1fr;
      background: var(--bg-surface); border-bottom: 0.5px solid var(--border);
      font-size: 9px; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace; letter-spacing: .05em;
      position: sticky; top: 45px; z-index: 9;
    }
    .fbh-left  { padding: 5px 12px; text-align: right; }
    .fbh-sep   { background: var(--border); }
    .fbh-right { padding: 5px 12px; }
    .feed-branch-wrap {
      position: relative; padding: 14px 0 0;
    }
    .feed-branch-wrap::before {
      content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
      width: 0.5px; background: var(--border-sub);
      transform: translateX(-50%); pointer-events: none;
    }
    .branch-row {
      display: flex; margin-bottom: 10px; position: relative;
    }
    .branch-row::before {
      content: ''; position: absolute; left: 50%; top: 15px;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--bg); border: 0.5px solid var(--border-sub);
      transform: translateX(-50%); z-index: 2;
    }
    .branch-row.casual {
      justify-content: flex-start;
      padding-left: 14px; padding-right: calc(50% + 10px);
    }
    .branch-row.info {
      justify-content: flex-end;
      padding-right: 14px; padding-left: calc(50% + 10px);
    }
    .branch-tile-wrap { flex: 1; min-width: 0; }
    .tile.info-tile { border-color: var(--border-sub); }
    .info-url-bar {
      display: block; padding: 5px 12px; font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim); background: var(--bg-surface);
      border-bottom: 0.5px solid var(--border);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-decoration: none; cursor: pointer;
    }
    .info-url-bar:hover { color: var(--text-body); }

    /* ── UX 인터랙션 효과 ──────────────────────────────────── */
    .ink-overlay {
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      background: var(--bg-surface);
      transition: clip-path .42s cubic-bezier(.4,0,.2,1);
    }
    .tile { transition: transform .12s, opacity .9s ease; }
  </style>
</head>
<body>
<button id="theme-toggle" title="테마 전환">☀️</button>
<div id="app"><div style="text-align:center;padding:60px;color:var(--text-dim);font-size:11px;">로딩 중...</div></div>
<script>
'use strict';

// ── 상수 ────────────────────────────────────────────────────────────
var MAX = 280;
var SURNAMES = ['김','이','박','최','정','강','조','윤','장','임','한','오','서','신','권','황','안','송','류','전','홍','고','문','양','손','배','백','허','유','남'];
var EN_NAMES = ['james','john','robert','michael','william','david','mary','patricia','jennifer','minho','junho','jinho','soyeon','minji','hyunji'];
// ── 유틸 ────────────────────────────────────────────────────────────
function mkId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function isPseudo(nick) {
  var t = nick.trim();
  if (/^[가-힣]{2,4}$/.test(t) && SURNAMES.indexOf(t[0]) >= 0) return true;
  if (EN_NAMES.indexOf(t.toLowerCase()) >= 0) return true;
  return false;
}

function nick2color(nick) {
  var h = 0;
  for (var i = 0; i < nick.length; i++) h = nick.charCodeAt(i) + ((h << 5) - h);
  var n = Math.abs(h);
  var l = 22 + (n % 32); // 22–53% lightness
  return {
    border: 'hsl(0,0%,' + l + '%)',
    tint:   'hsla(0,0%,' + l + '%,0.13)',
    avBg:   'hsl(0,0%,' + l + '%)',
    avText: l > 38 ? 'hsl(0,0%,8%)' : 'hsl(0,0%,92%)'
  };
}

function getInitial(nick) { return (nick || '?')[0].toUpperCase(); }

function relTime(ts) {
  var d = Date.now() - ts, s = Math.floor(d/1000), m = Math.floor(s/60), h = Math.floor(m/60), day = Math.floor(h/24);
  if (s < 60) return '방금 전';
  if (m < 60) return m + '분 전';
  if (h < 24) return h + '시간 전';
  if (day < 7) return day + '일 전';
  return new Date(ts).toLocaleDateString('ko-KR');
}

function absTime(ts) {
  return new Date(ts).toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function avatar(nick, size) {
  size = size || 36;
  var c = nick2color(nick), fs = size < 30 ? 11 : size < 50 ? 14 : 20;
  return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;background:'+c.avBg+';color:'+c.avText+';font-size:'+fs+'px;">'+getInitial(nick)+'</div>';
}

function nickHtml(nick, pseudo) {
  return esc(nick) + (pseudo ? ' <span style="color:#ca8a04;font-size:10px;">(가명)</span>' : '');
}

function extractUrl(txt) {
  var m = (txt || '').match(/https?:\/\/[^\s]+/);
  return m ? m[0] : null;
}

function linkify(txt) {
  return (txt || '').split(/(https?:\/\/[^\s]+)/g).map(function(part) {
    if (/^https?:\/\//.test(part)) {
      var disp = part.replace(/^https?:\/\//, '').replace(/\/$/, '');
      if (disp.length > 42) disp = disp.slice(0, 42) + '…';
      return '<a href="'+esc(part)+'" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="color:var(--text-dim);text-decoration:underline;text-underline-offset:2px;word-break:break-all;">'+esc(disp)+'</a>';
    }
    return esc(part);
  }).join('');
}

// ── 스토어 ──────────────────────────────────────────────────────────
var S = {
  get: function(k) { try { return JSON.parse(localStorage.getItem('gm2_'+k)||'null'); } catch(e){ return null; } },
  set: function(k,v) { try { localStorage.setItem('gm2_'+k, JSON.stringify(v)); } catch(e){} },
  me: function() { return S.get('me'); },
  setMe: function(u) { S.set('me', u); },
  users: function() { return S.get('users') || {}; },
  saveUser: function(u) { var m = S.users(); m[u.uid] = u; S.set('users', m); },
  posts: function() { return S.get('posts') || []; },
  setPosts: function(ps) { S.set('posts', ps); },
  addPost: function(p) { var ps = S.posts(); ps.unshift(p); S.set('posts', ps); },
  getPost: function(id) { return S.posts().find(function(p){ return p.id === id; }); },
  deletePost: function(id) { var ps = S.posts(); var i = ps.findIndex(function(p){return p.id===id;}); if(i>=0){ps[i].del=Date.now(); S.set('posts',ps);} },
  comments: function(pid) { return (S.get('comments')||{})[pid]||[]; },
  addComment: function(pid, c) { var all = S.get('comments')||{}; all[pid]=all[pid]||[]; all[pid].push(c); S.set('comments',all); },
  delComment: function(pid, cid) { var all = S.get('comments')||{}; var cs=all[pid]||[]; var i=cs.findIndex(function(c){return c.id===cid;}); if(i>=0){cs[i].del=Date.now(); S.set('comments',all);} },
  likes: function() { return S.get('likes')||{}; },
  isLiked: function(pid,uid) { return !!(S.likes()[pid+'_'+uid]); },
  toggleLike: function(pid,uid) {
    var key=pid+'_'+uid, likes=S.likes(), ps=S.posts(), i=ps.findIndex(function(p){return p.id===pid;});
    if(likes[key]){ delete likes[key]; if(i>=0)ps[i].likes=Math.max(0,(ps[i].likes||0)-1); }
    else { likes[key]=true; if(i>=0)ps[i].likes=(ps[i].likes||0)+1; }
    S.set('likes',likes); S.set('posts',ps);
    return !!likes[key];
  },
  incComments: function(pid, n) {
    var ps=S.posts(), i=ps.findIndex(function(p){return p.id===pid;});
    if(i>=0){ps[i].comments=Math.max(0,(ps[i].comments||0)+n); S.set('posts',ps);}
  },
  theme: function() { return S.get('theme') || 'light'; },
  setTheme: function(t) { S.set('theme', t); },
  nextNick: function() {
    var n = (S.get('nickCounter') || 0) + 1;
    S.set('nickCounter', n);
    return '객' + n;
  },
  updateNick: function(nick) {
    var me = S.me(); if (!me) return;
    var pseudo = isPseudo(nick);
    var updated = Object.assign({}, me, { nick: nick, pseudo: pseudo });
    S.setMe(updated);
    S.saveUser(updated);
    var ps = S.posts().map(function(p) {
      return p.uid === me.uid ? Object.assign({}, p, { nick: nick, pseudo: pseudo }) : p;
    });
    S.setPosts(ps);
  }
};

// ── 테마 ────────────────────────────────────────────────────────────
function applyTheme(t) {
  var btn = document.getElementById('theme-toggle');
  if (t === 'dark') {
    document.body.classList.add('dark');
    if (btn) btn.textContent = '🌙';
  } else {
    document.body.classList.remove('dark');
    if (btn) btn.textContent = '☀️';
  }
}

document.getElementById('theme-toggle').onclick = function() {
  var next = S.theme() === 'dark' ? 'light' : 'dark';
  S.setTheme(next);
  applyTheme(next);
};

// ── 커스텀 모달 ──────────────────────────────────────────────────────
function gModal(msg, onConfirm, confirmLabel) {
  confirmLabel = confirmLabel || '확인';
  var ov = document.createElement('div');
  ov.className = 'gm-overlay';
  ov.innerHTML = [
    '<div class="gm-dialog">',
    '<div class="gm-msg">'+msg+'</div>',
    '<div class="gm-btns">',
    '<button class="gm-btn gm-btn-cancel">취소</button>',
    '<button class="gm-btn gm-btn-confirm">'+confirmLabel+'</button>',
    '</div></div>'
  ].join('');
  ov.querySelector('.gm-btn-cancel').onclick = function() { document.body.removeChild(ov); };
  ov.querySelector('.gm-btn-confirm').onclick = function() { document.body.removeChild(ov); onConfirm(); };
  ov.onclick = function(e) { if (e.target === ov) document.body.removeChild(ov); };
  document.body.appendChild(ov);
}

// ── 인터랙션 효과 ────────────────────────────────────────────────────

// A: 잉크 방울 전환 — 탭한 지점에서 잉크가 번지며 화면 전환
function inkTransition(x, y, cb) {
  // prefers-reduced-motion 또는 클립패스 미지원 시 즉시 이동
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    cb(); return;
  }
  var ov = document.createElement('div');
  ov.className = 'ink-overlay';
  ov.style.clipPath = 'circle(0% at '+x+'px '+y+'px)';
  document.body.appendChild(ov);
  ov.getBoundingClientRect(); // force reflow
  ov.style.clipPath = 'circle(200% at '+x+'px '+y+'px)';
  var fired = false;
  function finish() {
    if (fired) return; fired = true;
    cb();
    setTimeout(function() {
      ov.style.transition = 'opacity .25s ease';
      ov.style.opacity = '0';
      setTimeout(function(){ if(ov.parentNode) document.body.removeChild(ov); }, 280);
    }, 30);
  }
  ov.addEventListener('transitionend', finish, {once:true});
  setTimeout(finish, 600); // 폴백: transitionend 미발화 시 강제 진행
}

// B: 글자 해체 삭제 — 각 글자가 사방으로 흩어지며 소멸
function scatterAndDelete(tile, onDone) {
  var txtEl = tile.querySelector('.tile-txt');
  if (!txtEl) { onDone(); return; }
  var txt = txtEl.textContent || '';
  txtEl.style.overflow = 'visible';
  txtEl.style.webkitLineClamp = 'unset';
  txtEl.style.display = 'block';
  var spans = txt.split('').map(function(ch) {
    var s = document.createElement('span');
    s.textContent = ch;
    s.style.display = 'inline-block';
    s.style.transition = 'transform .65s ease, opacity .65s ease';
    return s;
  });
  txtEl.innerHTML = '';
  spans.forEach(function(s){ txtEl.appendChild(s); });
  requestAnimationFrame(function() {
    spans.forEach(function(s) {
      var dx = (Math.random()-0.5)*300;
      var dy = (Math.random()-0.5)*200;
      var rot = (Math.random()-0.5)*640;
      s.style.transform = 'translate('+dx+'px,'+dy+'px) rotate('+rot+'deg)';
      s.style.opacity = '0';
    });
    setTimeout(onDone, 750);
  });
}

// C: 실시간 opacity 감쇠 — rAF 루프로 시간에 따라 카드가 서서히 투명해짐
var _opRafId = null;
function liveOpacity(at) {
  var h = (Date.now() - at) / 3600000;
  if (h < 1)  return 1;
  if (h < 6)  return 0.88;
  if (h < 24) return 0.72;
  if (h < 72) return 0.58;
  return 0.46;
}
function startOpacityLoop() {
  if (_opRafId) return;
  function loop() {
    document.querySelectorAll('.tile[data-at]').forEach(function(el) {
      el.style.opacity = liveOpacity(+el.dataset.at);
    });
    _opRafId = requestAnimationFrame(loop);
  }
  _opRafId = requestAnimationFrame(loop);
}
function stopOpacityLoop() {
  if (_opRafId) { cancelAnimationFrame(_opRafId); _opRafId = null; }
}

// D: 타이핑 리듬 출현 — 자연스러운 타이핑 패턴으로 글자가 한 자씩 등장
function typewriterReveal(el, txt) {
  var i = 0;
  el.textContent = '';
  function tick() {
    if (i >= txt.length) return;
    var ch = txt[i++];
    if (ch === '\n') el.appendChild(document.createElement('br'));
    else el.appendChild(document.createTextNode(ch));
    var delay;
    if ('.,。！？\n'.indexOf(ch) >= 0) delay = 260 + Math.random()*200;
    else if (Math.random() < 0.06) delay = 130 + Math.random()*90;
    else delay = 16 + Math.random()*42;
    setTimeout(tick, delay);
  }
  tick();
}

function postOpacity(post) {
  if (post.del) return 0.45;
  var h = (Date.now() - (post.upd || post.at)) / 3600000;
  if (h < 1) return 1;
  if (h < 6) return 0.88;
  if (h < 24) return 0.72;
  if (h < 72) return 0.58;
  return 0.46;
}

function makeCard(post, me, idx) {
  var branchMode = (idx == null);
  var url = branchMode ? extractUrl(post.txt) : null;
  var isInfo = !!url;

  var row = document.createElement('div');
  var tileWrap = document.createElement('div');

  if (branchMode) {
    row.className = 'branch-row ' + (isInfo ? 'info' : 'casual');
    tileWrap.className = 'branch-tile-wrap';
  } else {
    row.className = 'card-row';
    var idxEl = document.createElement('div');
    idxEl.className = 'card-idx';
    idxEl.textContent = String(idx).padStart(2, '0');
    row.appendChild(idxEl);
    tileWrap.className = 'card-tile-wrap';
  }

  var c = nick2color(post.nick);
  var tile = document.createElement('div');
  tile.className = 'tile' + (isInfo ? ' info-tile' : '');

  if (post.del) {
    tile.style.opacity = postOpacity(post);
    tile.innerHTML = [
      '<div class="tile-del-head"><span>╳</span><span class="tile-del-sub">삭제됨 · '+absTime(post.del)+'</span></div>',
      '<div class="tile-del-rows">이 흔적은 지워졌습니다</div>'
    ].join('');
    tileWrap.appendChild(tile);
    row.appendChild(tileWrap);
    var remain = 60000 - (Date.now() - post.del);
    if (remain > 0) setTimeout(function(){ if(row.parentNode) row.parentNode.removeChild(row); }, remain);
    return row;
  }

  tile.dataset.at = String(post.upd || post.at);
  tile.style.opacity = liveOpacity(post.upd || post.at);

  var infoBar = '';
  if (isInfo) {
    var disp = url.replace(/^https?:\/\//, '').replace(/\/$/, '');
    if (disp.length > 38) disp = disp.slice(0, 38) + '…';
    infoBar = '<a class="info-url-bar" href="'+esc(url)+'" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">'+esc(disp)+'</a>';
  }

  var liked = S.isLiked(post.id, me.uid);
  tile.innerHTML = [
    infoBar,
    '<div class="tile-head">',
    '<div class="tile-txt body-font" id="txt-'+post.id+'" style="-webkit-line-clamp:3;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;">'+linkify(post.txt)+'</div>',
    '<div class="tile-since">'+relTime(post.upd||post.at)+'</div>',
    '</div>',
    post.txt.length > 80 ? '<button id="more-'+post.id+'" style="display:block;width:100%;text-align:left;padding:2px 14px 8px;font-size:10px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:\'JetBrains Mono\',monospace;">더 보기 →</button>' : '',
    '<div class="tile-rows" style="background:'+c.tint+';">',
    '<div class="tile-row">',
    '<span class="tile-row-icon">'+avatar(post.nick, 16)+'</span>',
    '<span class="tile-row-val">'+nickHtml(post.nick, post.pseudo)+
      (me.uid===post.uid ? ' <button id="nick-edit-'+post.id+'" class="edit-pill">✏ 수정</button>' : '')+
    '</span>',
    '<span class="tile-sep">·</span>',
    '<button class="like-btn'+(liked?' liked':'')+'" id="lbtn-'+post.id+'">',
    '<span id="lico-'+post.id+'">'+(liked?'♥':'♡')+'</span>',
    '<span id="lcnt-'+post.id+'">'+(post.likes||0)+'</span>',
    '</button>',
    '<span style="display:flex;align-items:center;gap:3px;color:var(--text-dim);font-size:11px;"><i class="ti ti-message" aria-hidden="true" style="font-size:12px;"></i>'+(post.comments||0)+'</span>',
    me.uid===post.uid ? '<button class="del-btn" id="delbtn-'+post.id+'">삭제</button>' : '',
    '</div>',
    '</div>'
  ].join('');

  tile.querySelector('#lbtn-'+post.id).onclick = function(e) {
    e.stopPropagation();
    var now = S.toggleLike(post.id, me.uid);

    document.getElementById('lcnt-'+post.id).textContent = (S.getPost(post.id)||{}).likes||0;
  };
  var moreBtn = tile.querySelector('#more-'+post.id);
  if (moreBtn) {
    var expanded = false;
    moreBtn.onclick = function(e) {
      e.stopPropagation();

        scatterAndDelete(tile, function() { S.deletePost(pid); R.render(); });

  var footer = document.createElement('div');
  footer.style.cssText = 'position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;';
  footer.innerHTML = '<div style="display:flex;align-items:center;gap:10px;"><div style="flex:1;height:3px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;"><div id="w-bar" style="height:100%;width:0;background:var(--text-muted);border-radius:2px;transition:width .1s,background .1s;"></div></div><span id="w-cnt" style="font-size:11px;color:var(--text-muted);min-width:28px;text-align:right;">'+MAX+'</span></div>';
  wrap.appendChild(footer);

  setTimeout(function() { var ta=document.getElementById('write-ta'); if(ta) ta.focus(); }, 50);
  return wrap;
}

// ── 상세 페이지 ──────────────────────────────────────────────────────
function detailPage(pid) {
  var me = S.me();
  var post = S.getPost(pid);
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;padding-bottom:70px;';

  if (!post) {
    wrap.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-dim);">게시물을 찾을 수 없습니다.</div>';
    return wrap;
  }

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  var backBtn = document.createElement('button');
  backBtn.className = 'btn-ghost';
  backBtn.textContent = '← 피드로';
  backBtn.onclick = function() { R.go('/'); };
  hdr.appendChild(backBtn);
  wrap.appendChild(hdr);

  var postEl = document.createElement('div');
  postEl.style.cssText = 'padding:16px;border-bottom:1px solid var(--border);';
  if (post.del) {
    postEl.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">╳ 삭제됨 · '+absTime(post.del)+'</div><div style="font-size:11px;color:var(--text-dim);margin-top:4px;">이 흔적은 지워졌습니다</div>';
  } else {
    var liked = S.isLiked(pid, me.uid);
    postEl.innerHTML = [
      '<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;">',
      avatar(post.nick, 42),
      '<div><div style="font-size:13px;color:var(--text);">'+nickHtml(post.nick,post.pseudo)+'</div>',
      '<div style="font-size:11px;color:var(--text-muted);margin-top:3px;">'+relTime(post.upd||post.at)+'</div></div></div>',
      '<div id="d-post-body" style="font-size:14px;color:var(--text-body);line-height:1.7;word-break:break-word;margin-bottom:14px;min-height:1.7em;"></div>',
      '<div style="display:flex;align-items:center;gap:14px;">',
      '<button class="like-btn" id="d-lbtn" style="color:'+(liked?'#f472b6':'var(--text-muted)')+'"><span id="d-lico">'+(liked?'♥':'♡')+'</span><span style="font-size:12px;" id="d-lcnt">'+(post.likes||0)+'</span></button>',
      '<span style="font-size:12px;color:var(--text-muted);">💬 <span id="d-cmt-cnt">'+(post.comments||0)+'</span></span>',
      me.uid===post.uid ? '<button class="del-btn" id="d-del">삭제</button>' : '',
      '</div>'
    ].join('');
    postEl.querySelector('#d-lbtn').onclick = function() {
      var now = S.toggleLike(pid, me.uid);
      this.style.color = now?'#f472b6':'var(--text-muted)';
      document.getElementById('d-lico').textContent = now?'♥':'♡';
      document.getElementById('d-lcnt').textContent = (S.getPost(pid)||{}).likes||0;
    };
    if (me.uid===post.uid) {
      postEl.querySelector('#d-del').onclick = function() {
        gModal('이 흔적을 지울까요?<br><span style="font-size:10px;color:var(--text-dim);">60초 후 완전히 사라집니다</span>', function() {
          S.deletePost(pid); R.go('/');
        }, '삭제');
      };
    }
  }
  wrap.appendChild(postEl);
  var bodyEl = postEl.querySelector('#d-post-body');
  if (bodyEl) typewriterReveal(bodyEl, post.txt);

  var cList = document.createElement('div');
  cList.id = 'd-clist';
  wrap.appendChild(cList);

  var replyTo = null;
  function renderComments() {
    var all = S.comments(pid);
    var top = all.filter(function(c){ return !c.parent; });
    cList.innerHTML = '';
    top.forEach(function(c) {
      cList.appendChild(mkComment(c, all.filter(function(r){ return r.parent===c.id; })));
    });
  }

  function mkComment(c, replies) {
    var el = document.createElement('div');
    if (c.del) {
      el.innerHTML = '<div style="padding:10px 16px;border-bottom:1px solid var(--border-sub);color:var(--text-dim);font-size:11px;">● 삭제됨 · '+absTime(c.del)+'</div>';
    } else {
      var isOwner = c.uid === me.uid;
      el.innerHTML = [
        '<div style="padding:10px 16px;border-bottom:1px solid var(--border-sub);">',
        '<div style="display:flex;gap:8px;">',
        avatar(c.nick, 28),
        '<div style="flex:1;"><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px;">',
        '<span style="font-size:12px;color:var(--text);">'+nickHtml(c.nick,c.pseudo)+'</span>',
        '<span style="font-size:10px;color:var(--text-dim);">· '+relTime(c.at)+'</span></div>',
        '<div style="font-size:12px;color:var(--text-body);line-height:1.55;word-break:break-word;">'+esc(c.txt)+'</div>',
        '<div style="display:flex;gap:10px;margin-top:6px;">',
        '<button class="btn-ghost" id="rep-'+c.id+'">답글</button>',
        isOwner ? '<button class="del-btn" style="margin-left:0;" id="dc-'+c.id+'">삭제</button>' : '',
        '</div></div></div></div>'
      ].join('');
      el.querySelector('#rep-'+c.id).onclick = function() { replyTo = c.id; var inp=document.getElementById('d-inp'); if(inp){inp.placeholder='@'+c.nick+'에 답글'; inp.focus();} };
      if (isOwner) {
        el.querySelector('#dc-'+c.id).onclick = (function(cid) { return function() {
          gModal('이 댓글을 삭제할까요?', function() {
            S.delComment(pid, cid); S.incComments(pid,-1); renderComments();
            var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=(S.getPost(pid)||{}).comments||0;
          }, '삭제');
        }; })(c.id);
      }
    }
    replies.forEach(function(r) { el.appendChild(mkReply(r)); });
    return el;
  }

  function mkReply(r) {
    var el = document.createElement('div');
    if (r.del) {
      el.innerHTML = '<div style="padding:8px 16px 8px 52px;border-bottom:1px solid var(--border-sub);color:var(--text-dim);font-size:10px;">● 삭제됨 · '+absTime(r.del)+'</div>';
      return el;
    }
    var isOwner = r.uid === me.uid;
    el.innerHTML = [
      '<div style="padding:8px 16px 8px 52px;border-bottom:1px solid var(--border-sub);">',
      '<div style="display:flex;gap:8px;">',
      avatar(r.nick, 24),
      '<div style="flex:1;"><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:3px;">',
      '<span style="font-size:11px;color:var(--text);">'+nickHtml(r.nick,r.pseudo)+'</span>',
      '<span style="font-size:10px;color:var(--text-dim);">· '+relTime(r.at)+'</span></div>',
      '<div style="font-size:11px;color:var(--text-faint);line-height:1.5;word-break:break-word;">'+esc(r.txt)+'</div>',
      isOwner ? '<button class="del-btn" style="margin-left:0;margin-top:4px;" id="dr-'+r.id+'">삭제</button>' : '',
      '</div></div></div>'
    ].join('');
    if (isOwner) {
      el.querySelector('#dr-'+r.id).onclick = (function(rid) { return function() {
        gModal('이 댓글을 삭제할까요?', function() {
          S.delComment(pid, rid); S.incComments(pid,-1); renderComments();
          var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=(S.getPost(pid)||{}).comments||0;
        }, '삭제');
      }; })(r.id);
    }
    return el;
  }

  var cInput = document.createElement('div');
  cInput.style.cssText = 'position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:680px;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;z-index:10;';
  var inp = document.createElement('input');
  inp.id = 'd-inp';
  inp.type = 'text';
  inp.className = 'input-field';
  inp.placeholder = '흔적을 남기세요';
  inp.style.cssText = 'width:calc(100% - 36px);padding-right:8px;';
  var sendBtn = document.createElement('button');
  sendBtn.textContent = '↑';
  sendBtn.style.cssText = 'background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);padding:0 0 0 8px;vertical-align:middle;transition:color .15s;';
  sendBtn.onmouseover = function(){this.style.color='var(--text)';};
  sendBtn.onmouseout = function(){this.style.color='var(--text-muted)';};

  var _submitting = false;
  function submit() {
    if (_submitting) return;
    var txt = inp.value.trim();
    if (!txt) return;
    _submitting = true;
    inp.value = ''; inp.placeholder = '흔적을 남기세요'; replyTo = null;
    S.addComment(pid, { id:mkId(), pid:pid, parent:replyTo, uid:me.uid, nick:me.nick, pseudo:me.pseudo, txt:txt, at:Date.now(), del:null });
    S.incComments(pid, 1);
    renderComments();
    var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=(S.getPost(pid)||{}).comments||0;
    setTimeout(function(){ _submitting = false; }, 300);
  }
  inp.onkeydown = function(e){ if(e.key==='Enter'){ e.preventDefault(); submit(); } };
  sendBtn.onclick = function(e){ e.preventDefault(); submit(); };
  cInput.appendChild(inp);
  cInput.appendChild(sendBtn);
  wrap.appendChild(cInput);

  renderComments();
  return wrap;
}

// ── 마이페이지 ───────────────────────────────────────────────────────
function profilePage() {
  var me = S.me();
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;padding-bottom:64px;';

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  hdr.innerHTML = '<span style="font-size:13px;letter-spacing:.05em;">마이페이지</span>';
  var logoutBtn = document.createElement('button');
  logoutBtn.className = 'btn-ghost';
  logoutBtn.textContent = '로그아웃';
  logoutBtn.onclick = function() { S.setMe(null); R.go('/auth'); };
  hdr.appendChild(logoutBtn);
  wrap.appendChild(hdr);

  var prof = document.createElement('div');
  prof.style.cssText = 'display:flex;flex-direction:column;align-items:center;padding:32px 16px 24px;border-bottom:0.5px solid var(--border);gap:12px;';

  function renderProf(editing) {
    me = S.me();
    if (editing) {
      prof.innerHTML = [
        '<div id="prof-av-wrap">'+avatar(me.nick, 64)+'</div>',
        '<div style="width:100%;max-width:260px;">',
        '<input id="prof-nick-inp" class="input-field" type="text" value="'+esc(me.nick)+'" maxlength="20" placeholder="닉네임 입력" style="text-align:center;margin-bottom:6px;">',
        '<div id="prof-nick-preview" style="text-align:center;font-size:11px;color:var(--text-muted);min-height:16px;margin-bottom:12px;">'+nickHtml(me.nick, me.pseudo)+'</div>',
        '<div style="display:flex;gap:8px;">',
        '<button id="prof-save" style="flex:1;background:var(--bg-surface);border:0.5px solid var(--border);border-radius:6px;padding:8px;font-size:12px;color:var(--text);cursor:pointer;">저장</button>',
        '<button id="prof-cancel" class="btn-ghost" style="flex:1;padding:8px;border:0.5px solid var(--border);border-radius:6px;">취소</button>',
        '</div></div>'
      ].join('');
      var inp = prof.querySelector('#prof-nick-inp');
      var preview = prof.querySelector('#prof-nick-preview');
      var avWrap = prof.querySelector('#prof-av-wrap');
      inp.focus(); inp.select();
      inp.oninput = function() {
        var v = this.value.trim() || me.nick;
        var c = nick2color(v);
        avWrap.innerHTML = '<div class="avatar" style="width:64px;height:64px;background:'+c.avBg+';color:'+c.avText+';font-size:24px;">'+getInitial(v)+'</div>';
        preview.innerHTML = nickHtml(v, isPseudo(v));
      };
      prof.querySelector('#prof-save').onclick = function() {
        var newNick = inp.value.trim();
        if (!newNick) { inp.focus(); return; }
        S.updateNick(newNick);
        me = S.me();
        renderProf(false);
      };
      prof.querySelector('#prof-cancel').onclick = function() { renderProf(false); };
    } else {
      var postCount = S.posts().filter(function(p){ return p.uid===me.uid && !p.del; }).length;
      prof.innerHTML = [
        avatar(me.nick, 64),
        '<div style="text-align:center;">',
        '<div style="display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:4px;">',
        '<span style="font-size:15px;font-weight:500;">'+nickHtml(me.nick, me.pseudo)+'</span>',
        '<button id="prof-edit-btn" class="edit-pill">✏ 수정</button>',
        '</div>',
        '<div style="font-size:11px;color:var(--text-dim);">흔적 '+postCount+'개</div>',
        '</div>'
      ].join('');
      prof.querySelector('#prof-edit-btn').onclick = function() { renderProf(true); };
    }
  }
  renderProf(false);
  wrap.appendChild(prof);
  wrap.appendChild(tabBar('/profile'));
  return wrap;
}

function myPage() {
  var me = S.me();
  var posts = S.posts().filter(function(p){ return p.uid===me.uid; });
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;padding-bottom:64px;';

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  hdr.innerHTML = '<span style="font-size:13px;letter-spacing:.05em;">내 흔적</span>';
  wrap.appendChild(hdr);

  var tabLabel = document.createElement('div');
  tabLabel.style.cssText = 'padding:10px 16px;border-bottom:0.5px solid var(--border);font-size:11px;color:var(--text-muted);';
  tabLabel.textContent = '총 '+posts.length+'개';
  wrap.appendChild(tabLabel);

  if (posts.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:40px;color:var(--text-dim);font-size:11px;';
    empty.textContent = '아직 남긴 흔적이 없어요.';
    wrap.appendChild(empty);
  } else {
    var indexWrapM = document.createElement('div');
    indexWrapM.className = 'feed-index-wrap';
    var now60m = Date.now();
    var visibleM = posts.filter(function(p){ return !(p.del && now60m - p.del >= 60000); });
    var totalM = visibleM.length;
    visibleM.forEach(function(p, i) {
      indexWrapM.appendChild(makeCard(p, me, totalM - i));
    });
    wrap.appendChild(indexWrapM);
  }

  wrap.appendChild(tabBar('/my'));
  return wrap;
}

// ── 시작 ────────────────────────────────────────────────────────────
applyTheme(S.theme());
R.render();
</script>
</body>
</html>

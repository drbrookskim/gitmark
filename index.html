<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>gitmark</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 13px;
      min-height: 100vh;
    }
    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }
    input, textarea, button {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }
    ::-webkit-scrollbar { width: 0; }
    .screen { animation: fi .12s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
    .card:hover { background: #111 !important; }
    .btn-ghost {
      background: none; border: none; cursor: pointer;
      color: #555; font-size: 11px; padding: 0;
      transition: color .15s;
    }
    .btn-ghost:hover { color: #e8e8e8; }
    .divider { border: none; border-top: 1px solid #2a2a2a; margin: 0; }
    .input-field {
      width: 100%; background: #1a1a1a;
      border: 1px solid #2a2a2a; border-radius: 4px;
      padding: 9px 12px; font-size: 13px;
      color: #e8e8e8; outline: none;
      transition: border-color .15s;
    }
    .input-field:focus { border-color: #555; }
    .input-field::placeholder { color: #3a3a3a; }
    .tab-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: #0d0d0d; border-top: 1px solid #2a2a2a;
      display: flex; z-index: 20;
    }
    .tab-bar button {
      flex: 1; padding: 13px 0; font-size: 11px;
      background: none; border: none; cursor: pointer;
      transition: color .15s;
    }
    .sticky-header {
      position: sticky; top: 0; z-index: 10;
      background: #0d0d0d; border-bottom: 1px solid #2a2a2a;
      padding: 12px 16px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .avatar {
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 500; flex-shrink: 0;
    }
    .like-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 4px; transition: color .15s; }
    .del-btn { background: none; border: none; cursor: pointer; padding: 0; font-size: 11px; color: #444; transition: color .15s; margin-left: auto; }
    .del-btn:hover { color: #f87171; }
    textarea { resize: none; background: transparent; border: none; outline: none; color: #e8e8e8; width: 100%; line-height: 1.7; }
  </style>
</head>
<body>
<div id="app"><div style="text-align:center;padding:60px;color:#333;font-size:11px;">로딩 중...</div></div>
<script>
'use strict';

// ── 상수 ────────────────────────────────────────────────────────────
var MAX = 280;
var SURNAMES = ['김','이','박','최','정','강','조','윤','장','임','한','오','서','신','권','황','안','송','류','전','홍','고','문','양','손','배','백','허','유','남'];
var EN_NAMES = ['james','john','robert','michael','william','david','mary','patricia','jennifer','minho','junho','jinho','soyeon','minji','hyunji'];
var COLORS = [['#2d1b69','#c4b5fd'],['#1e3a5f','#93c5fd'],['#14532d','#86efac'],['#713f12','#fde68a'],['#7f1d1d','#fca5a5'],['#1e1b4b','#a5b4fc']];

// ── 유틸 ────────────────────────────────────────────────────────────
function mkId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function isPseudo(nick) {
  var t = nick.trim();
  if (/^[가-힣]{2,4}$/.test(t) && SURNAMES.indexOf(t[0]) >= 0) return true;
  if (EN_NAMES.indexOf(t.toLowerCase()) >= 0) return true;
  return false;
}

function nick2color(nick) {
  var h = 0;
  for (var i = 0; i < nick.length; i++) h = nick.charCodeAt(i) + ((h << 5) - h);
  return COLORS[Math.abs(h) % COLORS.length];
}

function getInitial(nick) { return (nick || '?')[0].toUpperCase(); }

function relTime(ts) {
  var d = Date.now() - ts, s = Math.floor(d/1000), m = Math.floor(s/60), h = Math.floor(m/60), day = Math.floor(h/24);
  if (s < 60) return '방금 전';
  if (m < 60) return m + '분 전';
  if (h < 24) return h + '시간 전';
  if (day < 7) return day + '일 전';
  return new Date(ts).toLocaleDateString('ko-KR');
}

function absTime(ts) {
  return new Date(ts).toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function avatar(nick, size) {
  size = size || 36;
  var c = nick2color(nick), fs = size < 30 ? 11 : size < 50 ? 14 : 20;
  return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;background:'+c[0]+';color:'+c[1]+';font-size:'+fs+'px;">'+getInitial(nick)+'</div>';
}

function nickHtml(nick, pseudo) {
  return esc(nick) + (pseudo ? ' <span style="color:#ca8a04;font-size:10px;">(가명)</span>' : '');
}

// ── 스토어 ──────────────────────────────────────────────────────────
var S = {
  get: function(k) { try { return JSON.parse(localStorage.getItem('gm2_'+k)||'null'); } catch(e){ return null; } },
  set: function(k,v) { try { localStorage.setItem('gm2_'+k, JSON.stringify(v)); } catch(e){} },
  me: function() { return S.get('me'); },
  setMe: function(u) { S.set('me', u); },
  users: function() { return S.get('users') || {}; },
  saveUser: function(u) { var m = S.users(); m[u.uid] = u; S.set('users', m); },
  posts: function() { return S.get('posts') || []; },
  setPosts: function(ps) { S.set('posts', ps); },
  addPost: function(p) { var ps = S.posts(); ps.unshift(p); S.set('posts', ps); },
  getPost: function(id) { return S.posts().find(function(p){ return p.id === id; }); },
  deletePost: function(id) { var ps = S.posts(); var i = ps.findIndex(function(p){return p.id===id;}); if(i>=0){ps[i].del=Date.now(); S.set('posts',ps);} },
  comments: function(pid) { return (S.get('comments')||{})[pid]||[]; },
  addComment: function(pid, c) { var all = S.get('comments')||{}; all[pid]=all[pid]||[]; all[pid].push(c); S.set('comments',all); },
  delComment: function(pid, cid) { var all = S.get('comments')||{}; var cs=all[pid]||[]; var i=cs.findIndex(function(c){return c.id===cid;}); if(i>=0){cs[i].del=Date.now(); S.set('comments',all);} },
  likes: function() { return S.get('likes')||{}; },
  isLiked: function(pid,uid) { return !!(S.likes()[pid+'_'+uid]); },
  toggleLike: function(pid,uid) {
    var key=pid+'_'+uid, likes=S.likes(), ps=S.posts(), i=ps.findIndex(function(p){return p.id===pid;});
    if(likes[key]){ delete likes[key]; if(i>=0)ps[i].likes=Math.max(0,(ps[i].likes||0)-1); }
    else { likes[key]=true; if(i>=0)ps[i].likes=(ps[i].likes||0)+1; }
    S.set('likes',likes); S.set('posts',ps);
    return !!likes[key];
  },
  incComments: function(pid, n) {
    var ps=S.posts(), i=ps.findIndex(function(p){return p.id===pid;});
    if(i>=0){ps[i].comments=Math.max(0,(ps[i].comments||0)+n); S.set('posts',ps);}
  }
};

// ── 라우터 (해시 기반) ───────────────────────────────────────────────
var R = {
  path: function() { return location.hash.replace(/^#/,'') || '/'; },
  go: function(p) { location.hash = p; },
  render: function() {
    var p = R.path(), me = S.me();
    var app = document.getElementById('app');
    if (!app) return;
    if (!me && p !== '/auth') { R.go('/auth'); return; }
    if (me && p === '/auth') { R.go('/'); return; }
    app.innerHTML = '';
    if (p === '/auth') app.appendChild(authPage());
    else if (p === '/write') app.appendChild(writePage());
    else if (p.indexOf('/post/') === 0) app.appendChild(detailPage(p.slice(6)));
    else if (p === '/my') app.appendChild(myPage());
    else app.appendChild(feedPage());
  }
};
window.addEventListener('hashchange', function() { R.render(); });

// ── 공통: 탭바 ──────────────────────────────────────────────────────
function tabBar(active) {
  var tabs = [{icon:'🏠',label:'피드',path:'/'},{icon:'✏',label:'쓰기',path:'/write'},{icon:'👤',label:'내 글',path:'/my'}];
  var nav = document.createElement('nav');
  nav.className = 'tab-bar';
  tabs.forEach(function(t) {
    var btn = document.createElement('button');
    btn.innerHTML = t.icon + ' ' + t.label;
    btn.style.color = active === t.path ? '#e8e8e8' : '#555';
    btn.onclick = function() { R.go(t.path); };
    nav.appendChild(btn);
  });
  return nav;
}

// ── 인증 페이지 ──────────────────────────────────────────────────────
function authPage() {
  var mode = 'login';
  var wrap = document.createElement('div');
  wrap.className = 'screen';

  function render() {
    wrap.innerHTML = [
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">',
      '<div style="width:100%;max-width:340px;">',

      // 로고
      '<div style="text-align:center;margin-bottom:28px;">',
      '<div style="font-size:20px;letter-spacing:.35em;color:#e8e8e8;margin-bottom:6px;">g i t m a r k</div>',
      '<div style="font-size:11px;color:#555;">왔다 갔다는 흔적을 남기는 곳</div>',
      '</div>',

      // 아바타 미리보기 (가입 시)
      mode==='signup' ? [
        '<div id="av-wrap" style="display:flex;flex-direction:column;align-items:center;margin-bottom:20px;">',
        '<div id="av-circle" style="width:52px;height:52px;background:#2d1b69;color:#c4b5fd;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;">?</div>',
        '<div id="av-label" style="font-size:11px;color:#555;margin-top:6px;min-height:16px;"></div>',
        '</div>'
      ].join('') : '',

      // 탭
      '<div style="display:flex;border-bottom:1px solid #2a2a2a;margin-bottom:18px;">',
      '<button onclick="__setMode(\'login\')" style="flex:1;padding:8px;font-size:12px;background:none;border:none;border-bottom:'+(mode==='login'?'1px solid #e8e8e8':'none')+';color:'+(mode==='login'?'#e8e8e8':'#555')+';cursor:pointer;">로그인</button>',
      '<button onclick="__setMode(\'signup\')" style="flex:1;padding:8px;font-size:12px;background:none;border:none;border-bottom:'+(mode==='signup'?'1px solid #e8e8e8':'none')+';color:'+(mode==='signup'?'#e8e8e8':'#555')+';cursor:pointer;">가입하기</button>',
      '</div>',

      // 폼
      mode==='signup' ? '<div style="margin-bottom:12px;"><div style="font-size:10px;color:#666;margin-bottom:4px;">닉네임</div><input id="f-nick" class="input-field" type="text" placeholder="나를 부를 이름" maxlength="20" oninput="__updateAv()"></div>' : '',
      '<div style="margin-bottom:12px;"><div style="font-size:10px;color:#666;margin-bottom:4px;">이메일</div><input id="f-email" class="input-field" type="email" placeholder="you@email.com"></div>',
      '<div style="margin-bottom:18px;"><div style="font-size:10px;color:#666;margin-bottom:4px;">비밀번호</div>',
      '<div style="position:relative;">',
      '<input id="f-pw" class="input-field" type="password" placeholder="6자 이상" style="padding-right:44px;">',
      '<button onclick="__togglePw()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;font-size:10px;cursor:pointer;">표시</button>',
      '</div></div>',
      '<div id="f-err" style="color:#f87171;font-size:11px;margin-bottom:10px;display:none;"></div>',
      '<button onclick="__doAuth()" style="width:100%;background:#1a1a1a;border:1px solid #3a3a3a;border-radius:4px;padding:11px;font-size:13px;color:#e8e8e8;cursor:pointer;transition:border-color .15s;" onmouseover="this.style.borderColor=\'#666\'" onmouseout="this.style.borderColor=\'#3a3a3a\'">',
      mode==='login' ? '로그인' : '▶ 흔적 남기기 시작',
      '</button>',
      '</div></div>'
    ].join('');
  }

  window.__setMode = function(m) { mode = m; render(); };
  window.__togglePw = function() { var el = document.getElementById('f-pw'); if(el) el.type = el.type==='password'?'text':'password'; };
  window.__updateAv = function() {
    var nick = (document.getElementById('f-nick')||{value:''}).value.trim();
    var circle = document.getElementById('av-circle'), label = document.getElementById('av-label');
    if (!circle) return;
    if (nick) {
      var c = nick2color(nick);
      circle.style.background = c[0]; circle.style.color = c[1];
      circle.textContent = getInitial(nick);
      if (label) label.innerHTML = esc(nick) + (isPseudo(nick) ? ' <span style="color:#ca8a04">(가명)</span>' : '');
    } else {
      circle.style.background = '#2d1b69'; circle.style.color = '#c4b5fd';
      circle.textContent = '?';
      if (label) label.innerHTML = '';
    }
  };
  window.__doAuth = function() {
    var email = (document.getElementById('f-email')||{}).value.trim();
    var pw = (document.getElementById('f-pw')||{}).value;
    var nick = (document.getElementById('f-nick')||{}).value.trim();
    var err = document.getElementById('f-err');
    function showErr(msg) { if(err){ err.textContent=msg; err.style.display='block'; } }

    if (!email || !pw) { showErr('이메일과 비밀번호를 입력해주세요.'); return; }
    if (pw.length < 6) { showErr('비밀번호는 6자 이상이어야 합니다.'); return; }

    var users = S.users();
    if (mode === 'signup') {
      if (!nick) { showErr('닉네임을 입력해주세요.'); return; }
      var dup = Object.values(users).find(function(u){ return u.email===email; });
      if (dup) { showErr('이미 사용 중인 이메일입니다.'); return; }
      var user = { uid: mkId(), email: email, pw: pw, nick: nick, pseudo: isPseudo(nick), at: Date.now() };
      S.saveUser(user); S.setMe(user); R.go('/');
    } else {
      var found = Object.values(users).find(function(u){ return u.email===email && u.pw===pw; });
      if (!found) { showErr('이메일 또는 비밀번호가 올바르지 않습니다.'); return; }
      S.setMe(found); R.go('/');
    }
  };

  render();
  return wrap;
}

// ── 피드 페이지 ──────────────────────────────────────────────────────
function feedPage() {
  var me = S.me();
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;padding-bottom:64px;';

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  hdr.innerHTML = '<span style="font-size:13px;letter-spacing:.2em;">gitmark</span>';
  var writeBtn = document.createElement('button');
  writeBtn.className = 'btn-ghost';
  writeBtn.style.fontSize = '12px';
  writeBtn.textContent = '✏ 흔적 남기기';
  writeBtn.onclick = function() { R.go('/write'); };
  hdr.appendChild(writeBtn);
  wrap.appendChild(hdr);

  var list = document.createElement('div');
  var posts = S.posts();
  if (posts.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:60px 16px;color:#444;"><div style="margin-bottom:14px;">아직 아무도 다녀가지 않았어요.</div><button onclick="R.go(\'/write\')" style="font-size:11px;color:#666;background:none;border:none;cursor:pointer;">첫 번째 흔적을 남겨보세요 →</button></div>';
  } else {
    posts.forEach(function(post) { list.appendChild(makeCard(post, me)); });
  }
  wrap.appendChild(list);
  wrap.appendChild(tabBar('/'));
  return wrap;
}

function makeCard(post, me) {
  var el = document.createElement('div');
  el.className = 'card';
  el.style.cssText = 'border-bottom:1px solid #2a2a2a;padding:14px 16px;cursor:pointer;transition:background .12s;';

  if (post.del) {
    el.innerHTML = '<div style="display:flex;align-items:center;gap:8px;color:#333;"><span>╳</span><span style="font-size:11px;">삭제됨 · '+absTime(post.del)+'</span></div><div style="font-size:11px;color:#252525;margin-top:4px;">이 흔적은 지워졌습니다</div>';
    return el;
  }

  var liked = S.isLiked(post.id, me.uid);
  el.innerHTML = [
    '<div style="display:flex;gap:10px;">',
    avatar(post.nick),
    '<div style="flex:1;min-width:0;">',
    '<div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;margin-bottom:8px;">',
    '<span style="font-size:13px;color:#e8e8e8;">'+nickHtml(post.nick, post.pseudo)+'</span>',
    '<span style="font-size:11px;color:#555;">· '+relTime(post.upd||post.at)+'</span>',
    '</div>',
    '<div style="font-size:13px;color:#ccc;line-height:1.65;word-break:break-word;">'+esc(post.txt)+'</div>',
    '<div style="display:flex;align-items:center;gap:14px;margin-top:10px;">',
    '<button class="like-btn" id="lbtn-'+post.id+'" style="color:'+(liked?'#f472b6':'#555')+';">',
    '<span id="lico-'+post.id+'">'+(liked?'♥':'♡')+'</span>',
    '<span style="font-size:12px;" id="lcnt-'+post.id+'">'+(post.likes||0)+'</span>',
    '</button>',
    '<span style="font-size:12px;color:#555;">💬 '+(post.comments||0)+'</span>',
    me.uid===post.uid ? '<button class="del-btn" id="delbtn-'+post.id+'">삭제</button>' : '',
    '</div></div></div>'
  ].join('');

  el.querySelector('#lbtn-'+post.id).onclick = function(e) {
    e.stopPropagation();
    var now = S.toggleLike(post.id, me.uid);
    this.style.color = now ? '#f472b6' : '#555';
    document.getElementById('lico-'+post.id).textContent = now ? '♥' : '♡';
    document.getElementById('lcnt-'+post.id).textContent = (S.getPost(post.id)||{}).likes||0;
  };
  if (me.uid===post.uid) {
    el.querySelector('#delbtn-'+post.id).onclick = function(e) {
      e.stopPropagation();
      if (!confirm('이 흔적을 지우시겠어요? 삭제 시각은 남습니다.')) return;
      S.deletePost(post.id); R.render();
    };
  }
  el.onclick = function() { R.go('/post/'+post.id); };
  return el;
}

// ── 글쓰기 페이지 ────────────────────────────────────────────────────
function writePage() {
  var me = S.me();
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;display:flex;flex-direction:column;';

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn-ghost';
  cancelBtn.style.fontSize = '12px';
  cancelBtn.textContent = '취소';
  cancelBtn.onclick = function() {
    var ta = document.getElementById('write-ta');
    if (ta && ta.value.trim() && !confirm('작성 중인 내용이 사라집니다. 취소할까요?')) return;
    history.back() || R.go('/');
  };
  var submitBtn = document.createElement('button');
  submitBtn.id = 'submit-btn';
  submitBtn.textContent = '남기기';
  submitBtn.disabled = true;
  submitBtn.style.cssText = 'background:#1a1a1a;border:1px solid #3a3a3a;border-radius:4px;padding:6px 14px;font-size:12px;color:#e8e8e8;cursor:pointer;opacity:.3;';
  submitBtn.onclick = function() {
    var ta = document.getElementById('write-ta');
    if (!ta) return;
    var txt = ta.value.trim();
    if (!txt || txt.length > MAX) return;
    var now = Date.now();
    S.addPost({ id: mkId(), uid: me.uid, nick: me.nick, pseudo: me.pseudo, txt: txt, at: now, upd: now, likes: 0, comments: 0, del: null });
    R.go('/');
  };
  hdr.appendChild(cancelBtn);
  hdr.appendChild(submitBtn);
  wrap.appendChild(hdr);

  var body = document.createElement('div');
  body.style.cssText = 'padding:14px 16px;flex:1;';
  body.innerHTML = '<div style="font-size:11px;color:#555;margin-bottom:10px;">'+nickHtml(me.nick, me.pseudo)+'</div>';
  var ta = document.createElement('textarea');
  ta.id = 'write-ta';
  ta.placeholder = '왔다 갔다는 흔적을 남기세요';
  ta.style.cssText = 'min-height:calc(100vh - 180px);font-size:13px;';
  ta.oninput = function() {
    var len = this.value.length, rem = MAX - len, pct = Math.min(len/MAX*100,100);
    var bar = document.getElementById('w-bar'), cnt = document.getElementById('w-cnt'), btn = document.getElementById('submit-btn');
    if (bar) { bar.style.width = pct+'%'; bar.style.background = len>MAX?'#ef4444':pct>90?'#eab308':'#555'; }
    if (cnt) { cnt.textContent = rem; cnt.style.color = len>MAX?'#f87171':rem<20?'#eab308':'#555'; }
    if (btn) { var ok = len>0&&len<=MAX; btn.disabled=!ok; btn.style.opacity=ok?'1':'.3'; }
  };
  body.appendChild(ta);
  wrap.appendChild(body);

  var footer = document.createElement('div');
  footer.style.cssText = 'position:sticky;bottom:0;background:#0d0d0d;border-top:1px solid #2a2a2a;padding:10px 16px;';
  footer.innerHTML = '<div style="display:flex;align-items:center;gap:10px;"><div style="flex:1;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden;"><div id="w-bar" style="height:100%;width:0;background:#555;border-radius:2px;transition:width .1s,background .1s;"></div></div><span id="w-cnt" style="font-size:11px;color:#555;min-width:28px;text-align:right;">'+MAX+'</span></div>';
  wrap.appendChild(footer);

  setTimeout(function() { var ta=document.getElementById('write-ta'); if(ta) ta.focus(); }, 50);
  return wrap;
}

// ── 상세 페이지 ──────────────────────────────────────────────────────
function detailPage(pid) {
  var me = S.me();
  var post = S.getPost(pid);
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;padding-bottom:70px;';

  if (!post) {
    wrap.innerHTML = '<div style="text-align:center;padding:60px;color:#444;">게시물을 찾을 수 없습니다.</div>';
    return wrap;
  }

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  var backBtn = document.createElement('button');
  backBtn.className = 'btn-ghost';
  backBtn.textContent = '← 피드로';
  backBtn.onclick = function() { R.go('/'); };
  hdr.appendChild(backBtn);
  wrap.appendChild(hdr);

  // 본문
  var postEl = document.createElement('div');
  postEl.style.cssText = 'padding:16px;border-bottom:1px solid #2a2a2a;';
  if (post.del) {
    postEl.innerHTML = '<div style="color:#333;font-size:12px;">╳ 삭제됨 · '+absTime(post.del)+'</div><div style="font-size:11px;color:#252525;margin-top:4px;">이 흔적은 지워졌습니다</div>';
  } else {
    var liked = S.isLiked(pid, me.uid);
    postEl.innerHTML = [
      '<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;">',
      avatar(post.nick, 42),
      '<div><div style="font-size:13px;color:#e8e8e8;">'+nickHtml(post.nick,post.pseudo)+'</div>',
      '<div style="font-size:11px;color:#555;margin-top:3px;">'+relTime(post.upd||post.at)+'</div></div></div>',
      '<div style="font-size:14px;color:#ccc;line-height:1.7;word-break:break-word;margin-bottom:14px;">'+esc(post.txt)+'</div>',
      '<div style="display:flex;align-items:center;gap:14px;">',
      '<button class="like-btn" id="d-lbtn" style="color:'+(liked?'#f472b6':'#555')+'"><span id="d-lico">'+(liked?'♥':'♡')+'</span><span style="font-size:12px;" id="d-lcnt">'+(post.likes||0)+'</span></button>',
      '<span style="font-size:12px;color:#555;">💬 <span id="d-cmt-cnt">'+(post.comments||0)+'</span></span>',
      me.uid===post.uid ? '<button class="del-btn" id="d-del">삭제</button>' : '',
      '</div>'
    ].join('');
    postEl.querySelector('#d-lbtn').onclick = function() {
      var now = S.toggleLike(pid, me.uid);
      this.style.color = now?'#f472b6':'#555';
      document.getElementById('d-lico').textContent = now?'♥':'♡';
      document.getElementById('d-lcnt').textContent = (S.getPost(pid)||{}).likes||0;
    };
    if (me.uid===post.uid) {
      postEl.querySelector('#d-del').onclick = function() {
        if (!confirm('이 흔적을 지우시겠어요? 삭제 시각은 남습니다.')) return;
        S.deletePost(pid); R.go('/');
      };
    }
  }
  wrap.appendChild(postEl);

  // 댓글
  var cList = document.createElement('div');
  cList.id = 'd-clist';
  wrap.appendChild(cList);

  var replyTo = null;
  function renderComments() {
    var all = S.comments(pid);
    var top = all.filter(function(c){ return !c.parent; });
    cList.innerHTML = '';
    top.forEach(function(c) {
      cList.appendChild(mkComment(c, all.filter(function(r){ return r.parent===c.id; })));
    });
  }

  function mkComment(c, replies) {
    var el = document.createElement('div');
    if (c.del) {
      el.innerHTML = '<div style="padding:10px 16px;border-bottom:1px solid #1e1e1e;color:#2d2d2d;font-size:11px;">● 삭제됨 · '+absTime(c.del)+'</div>';
    } else {
      var isOwner = c.uid === me.uid;
      el.innerHTML = [
        '<div style="padding:10px 16px;border-bottom:1px solid #1e1e1e;">',
        '<div style="display:flex;gap:8px;">',
        avatar(c.nick, 28),
        '<div style="flex:1;"><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px;">',
        '<span style="font-size:12px;color:#e8e8e8;">'+nickHtml(c.nick,c.pseudo)+'</span>',
        '<span style="font-size:10px;color:#444;">· '+relTime(c.at)+'</span></div>',
        '<div style="font-size:12px;color:#bbb;line-height:1.55;word-break:break-word;">'+esc(c.txt)+'</div>',
        '<div style="display:flex;gap:10px;margin-top:6px;">',
        '<button class="btn-ghost" id="rep-'+c.id+'">답글</button>',
        isOwner ? '<button class="del-btn" style="margin-left:0;" id="dc-'+c.id+'">삭제</button>' : '',
        '</div></div></div></div>'
      ].join('');
      el.querySelector('#rep-'+c.id).onclick = function() { replyTo = c.id; var inp=document.getElementById('d-inp'); if(inp){inp.placeholder='@'+c.nick+'에 답글'; inp.focus();} };
      if (isOwner) {
        el.querySelector('#dc-'+c.id).onclick = function() {
          if (!confirm('댓글을 삭제할까요?')) return;
          S.delComment(pid, c.id); S.incComments(pid,-1); renderComments();
          var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=(S.getPost(pid)||{}).comments||0;
        };
      }
    }
    replies.forEach(function(r) { el.appendChild(mkReply(r)); });
    return el;
  }

  function mkReply(r) {
    var el = document.createElement('div');
    if (r.del) {
      el.innerHTML = '<div style="padding:8px 16px 8px 52px;border-bottom:1px solid #191919;color:#222;font-size:10px;">● 삭제됨 · '+absTime(r.del)+'</div>';
      return el;
    }
    var isOwner = r.uid === me.uid;
    el.innerHTML = [
      '<div style="padding:8px 16px 8px 52px;border-bottom:1px solid #191919;">',
      '<div style="display:flex;gap:8px;">',
      avatar(r.nick, 24),
      '<div style="flex:1;"><div style="display:flex;align-items:baseline;gap:6px;margin-bottom:3px;">',
      '<span style="font-size:11px;color:#e8e8e8;">'+nickHtml(r.nick,r.pseudo)+'</span>',
      '<span style="font-size:10px;color:#444;">· '+relTime(r.at)+'</span></div>',
      '<div style="font-size:11px;color:#aaa;line-height:1.5;word-break:break-word;">'+esc(r.txt)+'</div>',
      isOwner ? '<button class="del-btn" style="margin-left:0;margin-top:4px;" id="dr-'+r.id+'">삭제</button>' : '',
      '</div></div></div>'
    ].join('');
    if (isOwner) {
      el.querySelector('#dr-'+r.id).onclick = function() {
        if (!confirm('댓글을 삭제할까요?')) return;
        S.delComment(pid, r.id); S.incComments(pid,-1); renderComments();
        var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=(S.getPost(pid)||{}).comments||0;
      };
    }
    return el;
  }

  // 댓글 입력
  var cInput = document.createElement('div');
  cInput.style.cssText = 'position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0d0d0d;border-top:1px solid #2a2a2a;padding:10px 16px;z-index:10;';
  var inp = document.createElement('input');
  inp.id = 'd-inp';
  inp.type = 'text';
  inp.className = 'input-field';
  inp.placeholder = '흔적을 남기세요';
  inp.style.cssText = 'width:calc(100% - 36px);padding-right:8px;';
  var sendBtn = document.createElement('button');
  sendBtn.textContent = '↑';
  sendBtn.style.cssText = 'background:none;border:none;cursor:pointer;font-size:18px;color:#555;padding:0 0 0 8px;vertical-align:middle;transition:color .15s;';
  sendBtn.onmouseover = function(){this.style.color='#e8e8e8';};
  sendBtn.onmouseout = function(){this.style.color='#555';};

  function submit() {
    var txt = inp.value.trim();
    if (!txt) return;
    S.addComment(pid, { id:mkId(), pid:pid, parent:replyTo, uid:me.uid, nick:me.nick, pseudo:me.pseudo, txt:txt, at:Date.now(), del:null });
    S.incComments(pid, 1);
    inp.value = ''; inp.placeholder = '흔적을 남기세요'; replyTo = null;
    renderComments();
    var cnt=document.getElementById('d-cmt-cnt'); if(cnt)cnt.textContent=(S.getPost(pid)||{}).comments||0;
  }
  inp.onkeydown = function(e){ if(e.key==='Enter') submit(); };
  sendBtn.onclick = submit;
  cInput.appendChild(inp);
  cInput.appendChild(sendBtn);
  wrap.appendChild(cInput);

  renderComments();
  return wrap;
}

// ── 마이페이지 ───────────────────────────────────────────────────────
function myPage() {
  var me = S.me();
  var posts = S.posts().filter(function(p){ return p.uid===me.uid; });
  var wrap = document.createElement('div');
  wrap.className = 'screen';
  wrap.style.cssText = 'min-height:100vh;padding-bottom:64px;';

  var hdr = document.createElement('div');
  hdr.className = 'sticky-header';
  var backBtn = document.createElement('button');
  backBtn.className = 'btn-ghost';
  backBtn.textContent = '←';
  backBtn.onclick = function() { R.go('/'); };
  var title = document.createElement('span');
  title.textContent = '내 흔적 모음';
  title.style.cssText = 'font-size:12px;color:#888;';
  var logoutBtn = document.createElement('button');
  logoutBtn.className = 'btn-ghost';
  logoutBtn.textContent = '로그아웃';
  logoutBtn.onclick = function() { S.setMe(null); R.go('/auth'); };
  hdr.appendChild(backBtn); hdr.appendChild(title); hdr.appendChild(logoutBtn);
  wrap.appendChild(hdr);

  // 프로필
  var prof = document.createElement('div');
  prof.style.cssText = 'display:flex;flex-direction:column;align-items:center;padding:24px 16px;border-bottom:1px solid #2a2a2a;gap:10px;';
  prof.innerHTML = avatar(me.nick, 52)+'<div style="text-align:center;"><div style="font-size:13px;color:#e8e8e8;">'+nickHtml(me.nick,me.pseudo)+'</div><div style="font-size:11px;color:#444;margin-top:4px;">내가 남긴 흔적 '+posts.filter(function(p){return !p.del;}).length+'개</div></div>';
  wrap.appendChild(prof);

  var tabLabel = document.createElement('div');
  tabLabel.style.cssText = 'padding:10px 16px;border-bottom:1px solid #2a2a2a;font-size:11px;color:#888;';
  tabLabel.textContent = '내 글 ('+posts.length+')';
  wrap.appendChild(tabLabel);

  if (posts.length === 0) {
    var empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:40px;color:#444;font-size:11px;';
    empty.textContent = '아직 남긴 흔적이 없어요.';
    wrap.appendChild(empty);
  } else {
    var list = document.createElement('div');
    posts.forEach(function(p) { list.appendChild(makeCard(p, me)); });
    wrap.appendChild(list);
  }

  wrap.appendChild(tabBar('/my'));
  return wrap;
}

// ── 시작 ────────────────────────────────────────────────────────────
R.render();
</script>
</body>
</html>
